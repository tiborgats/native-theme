name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "native-theme", package: "native-theme" }
          - { name: "native-theme-build", package: "native-theme-build" }
          - { name: "gpui connector", package: "native-theme-gpui" }
          - { name: "iced connector", package: "native-theme-iced" }
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p ${{ matrix.package }} --all-targets

  test:
    name: Test ${{ matrix.name }}
    needs: fmt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Linux (no features)", os: ubuntu-latest, flags: "--no-default-features" }
          - { name: "Linux (kde)", os: ubuntu-latest, flags: "--features kde" }
          - { name: "Linux (portal-tokio)", os: ubuntu-latest, flags: "--features portal-tokio" }
          - { name: "Linux (portal-async-io)", os: ubuntu-latest, flags: "--features portal-async-io" }
          - { name: "Linux (linux-async-io)", os: ubuntu-latest, flags: "--features linux-async-io" }
          - { name: "Linux (native-async-io)", os: ubuntu-latest, flags: "--features native-async-io" }
          - { name: "Linux (icons)", os: ubuntu-latest, flags: "--features material-icons,lucide-icons,system-icons,svg-rasterize" }
          - { name: "Windows (no features)", os: windows-latest, flags: "--no-default-features" }
          - { name: "Windows (windows)", os: windows-latest, flags: "--features windows" }
          - { name: "macOS (no features)", os: macos-latest, flags: "--no-default-features" }
          - { name: "macOS (macos)", os: macos-latest, flags: "--features macos" }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p native-theme ${{ matrix.flags }}

  test-build-crate:
    name: Test native-theme-build
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p native-theme-build

  test-connectors:
    name: Test ${{ matrix.name }}
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "iced connector", package: "native-theme-iced" }
          - { name: "gpui connector", package: "native-theme-gpui" }
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (gpui)
        if: matrix.package == 'native-theme-gpui'
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p ${{ matrix.package }}

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    needs: fmt
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo install cargo-audit
      - run: cargo audit
