name: Publish to crates.io

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run full CI checks before publishing
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all crates)
        env:
          RUSTFLAGS: -Dwarnings
        run: |
          cargo clippy -p native-theme --all-targets
          cargo clippy -p native-theme-build --all-targets
          cargo clippy -p native-theme-iced --all-targets

      - name: Test native-theme
        run: cargo test -p native-theme --features material-icons,lucide-icons,system-icons,svg-rasterize

      - name: Test native-theme-build
        run: cargo test -p native-theme-build

      - name: Test native-theme-iced
        run: cargo test -p native-theme-iced

      - name: Documentation
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc --workspace --no-deps

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish native-theme
        continue-on-error: true
        run: cargo publish -p native-theme
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish native-theme-build
        continue-on-error: true
        run: cargo publish -p native-theme-build
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Wait for crates.io index to update before publishing dependents
      - name: Wait for index
        run: sleep 30

      - name: Publish native-theme-iced
        continue-on-error: true
        run: cargo publish -p native-theme-iced
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish native-theme-gpui
        continue-on-error: true
        run: cargo publish -p native-theme-gpui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
