name: Publish to crates.io

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run full CI checks before publishing
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (gpui)
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (core crates)
        env:
          RUSTFLAGS: -Dwarnings
        run: |
          cargo clippy -p native-theme-derive --all-targets
          cargo clippy -p native-theme-build --all-targets
          cargo clippy -p native-theme --all-targets
          cargo clippy -p native-theme-iced --all-targets

      # native-theme-gpui: soft-gated due to upstream G11 incompatibility
      # (naga 27.0.3 vs codespan-reporting 0.12.0). See docs/todo_v0.5.7_gaps.md §G11.
      - name: Clippy native-theme-gpui (soft)
        continue-on-error: true
        env:
          RUSTFLAGS: -Dwarnings
        run: cargo clippy -p native-theme-gpui --all-targets

      - name: Test native-theme-derive
        run: cargo test -p native-theme-derive

      - name: Test native-theme-build
        run: cargo test -p native-theme-build

      - name: Test native-theme
        run: cargo test -p native-theme --features material-icons,lucide-icons,system-icons,svg-rasterize

      - name: Test native-theme-iced
        run: cargo test -p native-theme-iced

      - name: Test native-theme-gpui (soft)
        continue-on-error: true
        run: cargo test -p native-theme-gpui

      - name: Documentation (core)
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: |
          cargo doc -p native-theme-derive --no-deps
          cargo doc -p native-theme-build --no-deps
          cargo doc -p native-theme --no-deps
          cargo doc -p native-theme-iced --no-deps

      - name: Documentation native-theme-gpui (soft)
        continue-on-error: true
        env:
          RUSTDOCFLAGS: -Dwarnings
        run: cargo doc -p native-theme-gpui --no-deps

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      # Publish order is dictated by the workspace dependency graph:
      #   native-theme-derive  (proc-macro, no workspace deps)
      #   native-theme-build   (depends on derive)
      #   native-theme         (depends on derive + build)
      #   native-theme-iced    (depends on native-theme)
      #   native-theme-gpui    (depends on native-theme; soft-gated for G11)
      #
      # Waits between publishes let the crates.io sparse index settle so the
      # next `cargo publish` can resolve the prior crate from the registry.

      - name: Publish native-theme-derive
        run: |
          OUTPUT=$(cargo publish -p native-theme-derive 2>&1) || {
            if echo "$OUTPUT" | grep -qi "already.*uploaded\|already.*published"; then
              echo "::notice::native-theme-derive already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for index (derive)
        run: sleep 45

      - name: Publish native-theme-build
        run: |
          OUTPUT=$(cargo publish -p native-theme-build 2>&1) || {
            if echo "$OUTPUT" | grep -qi "already.*uploaded\|already.*published"; then
              echo "::notice::native-theme-build already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for index (build)
        run: sleep 45

      - name: Publish native-theme
        run: |
          OUTPUT=$(cargo publish -p native-theme 2>&1) || {
            if echo "$OUTPUT" | grep -qi "already.*uploaded\|already.*published"; then
              echo "::notice::native-theme already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for index (native-theme)
        run: sleep 45

      - name: Publish native-theme-iced
        run: |
          OUTPUT=$(cargo publish -p native-theme-iced 2>&1) || {
            if echo "$OUTPUT" | grep -qi "already.*uploaded\|already.*published"; then
              echo "::notice::native-theme-iced already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # native-theme-gpui: soft-gated. Upstream G11 (naga 27.0.3 vs
      # codespan-reporting 0.12.0) can block the publish-time verify compile.
      # See docs/todo_v0.5.7_gaps.md §G11.
      - name: Publish native-theme-gpui (soft)
        continue-on-error: true
        run: |
          OUTPUT=$(cargo publish -p native-theme-gpui 2>&1) || {
            if echo "$OUTPUT" | grep -qi "already.*uploaded\|already.*published"; then
              echo "::notice::native-theme-gpui already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
