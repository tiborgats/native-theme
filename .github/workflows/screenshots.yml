name: Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os_name: macos
            toolkit: iced
          - os: macos-latest
            os_name: macos
            toolkit: gpui
          - os: windows-latest
            os_name: windows
            toolkit: iced
          - os: windows-latest
            os_name: windows
            toolkit: gpui

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.toolkit }}

      - name: Set display resolution (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Grant screen recording permission (macOS)
        if: runner.os == 'macOS'
        run: |
          # screencapture -l needs kTCCServiceScreenCapture on macOS 14+
          # Grant to the shell process so the showcase can invoke screencapture
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version) \
             VALUES ('kTCCServiceScreenCapture', '/bin/bash', 1, 2, 4, 1);"
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version) \
             VALUES ('kTCCServiceScreenCapture', '/bin/zsh', 1, 2, 4, 1);"

      - name: Build showcase
        run: cargo build -p native-theme-${{ matrix.toolkit }} --example showcase --release

      - name: Create output directory
        run: mkdir -p docs/assets
        shell: bash

      - name: Capture screenshots (macOS)
        if: runner.os == 'macOS'
        run: |
          themes=(
            "macos-sonoma:light:system"
            "macos-sonoma:dark:system"
          )
          for entry in "${themes[@]}"; do
            IFS=':' read -r theme variant icon_set <<< "$entry"
            echo "Capturing ${{ matrix.toolkit }}: $theme $variant (icons: $icon_set)"
            cargo run -p native-theme-${{ matrix.toolkit }} --example showcase --release -- \
              --theme "$theme" --variant "$variant" --icon-set "$icon_set" \
              --tab buttons \
              --screenshot "docs/assets/${{ matrix.toolkit }}-${{ matrix.os_name }}-${theme}-${variant}.png"
          done

      - name: Capture screenshots (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          themes=(
            "windows-11:light:system"
            "windows-11:dark:system"
          )
          for entry in "${themes[@]}"; do
            IFS=':' read -r theme variant icon_set <<< "$entry"
            echo "Capturing ${{ matrix.toolkit }}: $theme $variant (icons: $icon_set)"
            cargo run -p native-theme-${{ matrix.toolkit }} --example showcase --release -- \
              --theme "$theme" --variant "$variant" --icon-set "$icon_set" \
              --tab buttons \
              --screenshot "docs/assets/${{ matrix.toolkit }}-${{ matrix.os_name }}-${theme}-${variant}.png"
          done

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-${{ matrix.toolkit }}-${{ matrix.os_name }}
          path: docs/assets/${{ matrix.toolkit }}-${{ matrix.os_name }}-*.png
