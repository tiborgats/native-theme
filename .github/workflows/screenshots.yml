name: Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
          - os: macos-latest
            os_name: macos
          - os: windows-latest
            os_name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-dev libxkbcommon-x11-dev libvulkan-dev mesa-vulkan-drivers

      - name: Build showcase (release)
        run: cargo build -p native-theme-iced --example showcase --release

      - name: Create output directory
        run: mkdir -p docs/assets
        shell: bash

      - name: Capture screenshots (Linux)
        if: runner.os == 'Linux'
        run: |
          # Linux-native presets with matching icon sets
          # Format: theme:variant:icon-set
          themes=(
            "kde-breeze:dark:freedesktop"
            "material:light:material"
            "catppuccin-mocha:dark:lucide"
            "kde-breeze:light:freedesktop"
          )
          for entry in "${themes[@]}"; do
            IFS=':' read -r theme variant icon_set <<< "$entry"
            echo "Capturing: $theme $variant (icons: $icon_set)"
            xvfb-run -a --server-args="-screen 0 1920x1080x24" \
              cargo run -p native-theme-iced --example showcase --release -- \
                --theme "$theme" --variant "$variant" --icon-set "$icon_set" \
                --tab buttons \
                --screenshot "docs/assets/iced-${{ matrix.os_name }}-${theme}-${variant}.png"
          done

      - name: Capture screenshots (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS-native + community presets, all using OS icon set (SF Symbols)
          themes=(
            "macos-sonoma:light:system"
            "macos-sonoma:dark:system"
            "catppuccin-mocha:dark:system"
            "material:light:system"
          )
          for entry in "${themes[@]}"; do
            IFS=':' read -r theme variant icon_set <<< "$entry"
            echo "Capturing: $theme $variant (icons: $icon_set)"
            cargo run -p native-theme-iced --example showcase --release -- \
              --theme "$theme" --variant "$variant" --icon-set "$icon_set" \
              --tab buttons \
              --screenshot "docs/assets/iced-${{ matrix.os_name }}-${theme}-${variant}.png"
          done

      - name: Capture screenshots (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Windows-native + community presets, all using OS icon set (Segoe Fluent)
          themes=(
            "windows-11:light:system"
            "windows-11:dark:system"
            "catppuccin-mocha:dark:system"
            "material:light:system"
          )
          for entry in "${themes[@]}"; do
            IFS=':' read -r theme variant icon_set <<< "$entry"
            echo "Capturing: $theme $variant (icons: $icon_set)"
            cargo run -p native-theme-iced --example showcase --release -- \
              --theme "$theme" --variant "$variant" --icon-set "$icon_set" \
              --tab buttons \
              --screenshot "docs/assets/iced-${{ matrix.os_name }}-${theme}-${variant}.png"
          done

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.os_name }}
          path: docs/assets/iced-*.png
