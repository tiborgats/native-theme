danger_foreground = "#ffffff"
warning = "#ff9f0a"
warning_foreground = "#000000"
success = "#30d158"
success_foreground = "#ffffff"
info = "#0a84ff"
info_foreground = "#ffffff"

[dark.colors.interactive]
selection = "#0a84ff"
selection_foreground = "#ffffff"
link = "#0a84ff"
focus_ring = "#0a84ff"

[dark.colors.panel]
sidebar = "#1c1c1e"
sidebar_foreground = "#ffffff"
tooltip = "#2c2c2e"
tooltip_foreground = "#ffffff"
popover = "#1c1c1e"
popover_foreground = "#ffffff"

[dark.colors.component]
button = "#2c2c2e"
button_foreground = "#ffffff"
input = "#1c1c1e"
input_foreground = "#ffffff"
disabled = "#3a3a3c"
separator = "#38383a"
alternate_row = "#1c1c1e"

[dark.fonts]
family = "SF Pro"
size = 17.0
mono_family = "SF Mono"
mono_size = 17.0

[dark.geometry]
radius = 10.0
frame_width = 0.5
disabled_opacity = 0.3
border_opacity = 0.15
scroll_width = 6.0

[dark.spacing]
