# iOS system theme
# Source: Apple UIColor system colors, Human Interface Guidelines
name = "iOS"

# === Light variant ===

[light.colors.core]
accent = "#007aff"
background = "#ffffff"
foreground = "#000000"
surface = "#f2f2f7"
border = "#c6c6c8"
muted = "#8e8e93"
shadow = "#00000018"

[light.colors.primary]
background = "#007aff"
foreground = "#ffffff"

[light.colors.secondary]
background = "#e5e5ea"
foreground = "#000000"

[light.colors.status]
danger = "#ff3b30"
danger_foreground = "#ffffff"
warning = "#ff9500"
warning_foreground = "#000000"
success = "#34c759"
success_foreground = "#ffffff"
info = "#007aff"
info_foreground = "#ffffff"

[light.colors.interactive]
selection = "#007aff"
selection_foreground = "#ffffff"
link = "#007aff"
focus_ring = "#007aff"

[light.colors.panel]
sidebar = "#f2f2f7"
sidebar_foreground = "#000000"
tooltip = "#2c2c2e"
tooltip_foreground = "#ffffff"
popover = "#ffffff"
popover_foreground = "#000000"

[light.colors.component]
button = "#e5e5ea"
button_foreground = "#000000"
input = "#ffffff"
input_foreground = "#000000"
disabled = "#c7c7cc"
separator = "#c6c6c8"
alternate_row = "#f2f2f7"

[light.fonts]
family = "SF Pro"
size = 17.0
mono_family = "SF Mono"
mono_size = 17.0

[light.geometry]
radius = 10.0
frame_width = 0.5
disabled_opacity = 0.3
border_opacity = 0.15
scroll_width = 6.0

[light.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 20.0
xxl = 32.0

# === Dark variant ===

[dark.colors.core]
accent = "#0a84ff"
background = "#000000"
foreground = "#ffffff"
surface = "#1c1c1e"
border = "#38383a"
muted = "#8e8e93"
shadow = "#00000040"

[dark.colors.primary]
background = "#0a84ff"
foreground = "#ffffff"

[dark.colors.secondary]
background = "#2c2c2e"
foreground = "#ffffff"

[dark.colors.status]
