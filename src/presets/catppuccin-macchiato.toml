danger_foreground = "#24273a"
warning = "#eed49f"
warning_foreground = "#24273a"
success = "#a6da95"
success_foreground = "#24273a"
info = "#91d7e3"
info_foreground = "#24273a"

[dark.colors.interactive]
selection = "#8aadf4"
selection_foreground = "#24273a"
link = "#8aadf4"
focus_ring = "#8aadf4"

[dark.colors.panel]
sidebar = "#1e2030"
sidebar_foreground = "#cad3f5"
tooltip = "#181926"
tooltip_foreground = "#cad3f5"
popover = "#363a4f"
popover_foreground = "#cad3f5"

[dark.colors.component]
button = "#363a4f"
button_foreground = "#cad3f5"
input = "#1e2030"
input_foreground = "#cad3f5"
disabled = "#494d64"
separator = "#494d64"
alternate_row = "#1e2030"

[dark.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[dark.geometry]
