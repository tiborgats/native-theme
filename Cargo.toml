[workspace]
members = [
    "native-theme",
    "connectors/native-theme-gpui",
    "connectors/native-theme-iced",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0 OR 0BSD"

[workspace.dependencies]
native-theme = { path = "native-theme" }
serde = { version = "1.0.228", features = ["derive"] }
serde_with = "3.17.0"
toml = "1.0.6"
