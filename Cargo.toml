[package]
name = "native-theme"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Cross-platform native theme detection and loading for Rust GUI applications"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_with = "3"
toml = "1"

[dev-dependencies]
serde_json = "1"
