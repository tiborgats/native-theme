# ─── §2.20 Layout Container ──────────────────────────────────────────
#
# Default spacing for toolkit layout containers (QLayout, NSStackView,
# GtkBox, StackPanel). These are the values a layout manager uses when
# the developer does not specify explicit spacing.
#
# NOT YET IMPLEMENTED — struct and presets do not exist yet.
# Currently only documented in platform-facts.md §2.20.
# No platform exposes these as user-configurable settings; all values
# are compile-time constants or design guidelines.

[layout]
