# Property Registry — machine-readable source of truth for widget fields.
#
# Derived from docs/platform-facts.md (widget property tables, sections 2.1–2.28).
# The struct field name is used (not the platform-facts abbreviation).
#
# Each widget lists ALL fields that the struct MUST have. A Rust test should
# verify every field in this file exists in the corresponding struct, and
# every field in the struct exists in this file.
#
# Field types: "color" (Rgba), "f32", "bool", "enum", "font" (FontSpec sub-struct)
#
# When platform-facts.md is updated with new properties (e.g., hover states),
# this file MUST be updated to match, and the test will fail until the struct
# catches up.
#
# Source: docs/platform-facts.md  (2026-04-04 snapshot)
# Struct: native-theme/src/model/

# ─── §2.1 Global Defaults (ThemeDefaults) ──────────────────────────────────

[defaults]
# Base font (nested FontSpec)
"font.family"                = "font"
"font.size"                  = "font"
"font.weight"                = "font"
line_height                  = "f32"
# Mono font (nested FontSpec)
"mono_font.family"           = "font"
"mono_font.size"             = "font"
"mono_font.weight"           = "font"
# Base colors
background                   = "color"
foreground                   = "color"
accent                       = "color"
accent_foreground            = "color"
surface                      = "color"
border                       = "color"
muted                        = "color"
shadow                       = "color"
link                         = "color"
selection                    = "color"
selection_foreground         = "color"
selection_inactive           = "color"
disabled_foreground          = "color"
# Status colors
danger                       = "color"
danger_foreground            = "color"
warning                      = "color"
warning_foreground           = "color"
success                      = "color"
success_foreground           = "color"
info                         = "color"
info_foreground              = "color"
# Geometry
radius                       = "f32"
radius_lg                    = "f32"
frame_width                  = "f32"
disabled_opacity             = "f32"
border_opacity               = "f32"
shadow_enabled               = "bool"
# Focus ring
focus_ring_color             = "color"
focus_ring_width             = "f32"
focus_ring_offset            = "f32"
# NOTE: defaults.spacing (ThemeSpacing T-shirt scale xxs..xxl) exists in the
# code but is NOT a platform theme property. All platform spacing values are
# captured as direct per-widget fields (padding_horizontal, icon_spacing,
# item_spacing, etc.) in §2.3–2.28, and as layout container defaults in
# [layout] below (§2.20). The T-shirt scale should be removed from the code.
# See todo_v0.5.5.md Spacing Design Analysis.
# Icon sizes (nested IconSizes)
"icon_sizes.toolbar"         = "f32"
"icon_sizes.small"           = "f32"
"icon_sizes.large"           = "f32"
"icon_sizes.dialog"          = "f32"
"icon_sizes.panel"           = "f32"
# Accessibility
text_scaling_factor          = "f32"
reduce_motion                = "bool"
high_contrast                = "bool"
reduce_transparency          = "bool"

