# Property Registry — machine-readable source of truth for widget fields.
#
# Derived from docs/platform-facts.md Chapter 2 (§2.1–§2.28).
# Property names match the platform-facts.md table first-column entries exactly.
#
# Each widget lists ALL fields from its platform-facts table. A Rust test
# should verify every field in this file exists in the corresponding struct,
# and every field in the struct exists in this file.
#
# Source: docs/platform-facts.md  (2026-04-06 snapshot)
# Struct: native-theme/src/model/

# ═══════════════════════════════════════════════════════════════════════════
# Structure Definitions
# ═══════════════════════════════════════════════════════════════════════════
#
# Composite types used in property definitions below. Scalar types:
#   "color"  — Rgba color value
#   "f32"    — 32-bit float (dimensions in logical pixels, ratios)
#   "u16"    — 16-bit unsigned int (CSS font-weight: 400=Normal, 700=Bold)
#   "bool"   — boolean
#   "string" — UTF-8 string
#   "enum"   — enumerated value (variants noted in comments)
#
# Sub-struct types (defined below, referenced by name in widgets):
#   "font"             — see _structures.Font
#   "border"           — see _structures.Border
#   "icon_sizes"       — see _structures.IconSizes
#   "text_scale_entry" — see _structures.TextScaleEntry

[_structures.Font]
# Font specification (§2 naming: family + size + weight + style + color).
# Widgets reference this as `font = "font"` or with a named prefix like
# `title_bar_font = "font"`, `body_font = "font"`, `item_font = "font"`, etc.
family                       = "string"
# Exactly one of size_pt or size_px must be set.
#   size_pt -- typographic points (1/72 inch), used by platform presets
#   size_px -- logical pixels, used by community presets
size_pt                      = "f32"
size_px                      = "f32"
weight                       = "u16"
style                        = "enum"   # Normal | Italic | Oblique
color                        = "color"

[_structures.Border]
# Frame/border sub-struct. Widgets reference as `border = "border"`.
# Not every widget populates every field — platform-facts documents
# which fields have actual platform values per widget.
color                        = "color"
corner_radius_px             = "f32"
corner_radius_lg_px          = "f32"    # defaults only
line_width_px                = "f32"
opacity                      = "f32"    # defaults only
shadow_enabled               = "bool"
padding_horizontal_px        = "f32"
padding_vertical_px          = "f32"

[_structures.IconSizes]
# Platform icon size contexts, nested under defaults.
toolbar_px                   = "f32"
small_px                     = "f32"
large_px                     = "f32"
dialog_px                    = "f32"
panel_px                     = "f32"

[_structures.TextScaleEntry]
# One entry in the text scale ramp (§2.19).
# Exactly one of size_pt or size_px must be set (same as Font.size_*).
# Exactly one of line_height_pt or line_height_px must be set (same unit as size).
size_pt                      = "f32"
size_px                      = "f32"
weight                       = "u16"
line_height_pt               = "f32"    # computed from defaults.line_height * size when None
line_height_px               = "f32"    # computed from defaults.line_height * size when None

# ═══════════════════════════════════════════════════════════════════════════
# §2.1 Global Defaults (ThemeDefaults)
# ═══════════════════════════════════════════════════════════════════════════

[defaults]
# §2.1.1 Base Font
font                         = "font"
line_height                  = "f32"
# §2.1.2 Monospace Font
mono_font                    = "font"
# §2.1.3 Base Colors (text_color = defaults.font.color — same value, kept for state-override reference)
background_color             = "color"
text_color                   = "color"
accent_color                 = "color"
accent_text_color            = "color"
surface_color                = "color"
muted_color                  = "color"
shadow_color                 = "color"
link_color                   = "color"
selection_background         = "color"
selection_text_color         = "color"
selection_inactive_background = "color"
text_selection_background    = "color"
text_selection_color         = "color"
disabled_text_color          = "color"
# §2.1.4 Status Colors
danger_color                 = "color"
danger_text_color            = "color"
warning_color                = "color"
warning_text_color           = "color"
success_color                = "color"
success_text_color           = "color"
info_color                   = "color"
info_text_color              = "color"
# §2.1.5 Focus Ring
focus_ring_color             = "color"
focus_ring_width_px          = "f32"
focus_ring_offset_px         = "f32"
# §2.1.6 Global Geometry (border.* fields are inside the Border sub-struct)
border                       = "border"
disabled_opacity             = "f32"
# §2.1.7 Accessibility
text_scaling_factor          = "f32"
reduce_motion                = "bool"
high_contrast                = "bool"
reduce_transparency          = "bool"
# §2.1.8 Icon Sizes
icon_sizes                   = "icon_sizes"
# NOTE: defaults.spacing (ThemeSpacing T-shirt scale xxs..xxl) exists in
# the code but is NOT a platform theme property. All platform spacing
# values are captured as direct per-widget fields in §2.3–§2.28, and as
# layout container defaults in [layout] (§2.20). The T-shirt scale should
# be removed from the code. See todo_v0.5.5.md Spacing Design Analysis.

# ═══════════════════════════════════════════════════════════════════════════
# §2.19 Text Scale (TextScale)
# ═══════════════════════════════════════════════════════════════════════════
# size and weight from §2.19 table.
# NOTE: Each entry also has a line_height in the code (computed from
# defaults.line_height * size when None). Listed in _structures above.

[text_scale]
caption                      = "text_scale_entry"
section_heading              = "text_scale_entry"
dialog_title                 = "text_scale_entry"
display                      = "text_scale_entry"

