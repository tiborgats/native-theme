# Inheritance Rules — machine-readable reference for resolve().
#
# Sections [border_inheritance] and [font_inheritance] (Phase 94-01 G6):
#   DERIVED from `#[theme_inherit(border_kind = "...", font = "...")]`
#   attributes on the widget structs in
#   `native-theme/src/model/widgets/mod.rs`. The macro emits
#   `inventory::submit!` calls populating `BorderInheritanceInfo` /
#   `FontInheritanceInfo` registries; the `border_inheritance_toml_matches_macro_emit`
#   and `font_inheritance_toml_matches_macro_emit` drift tests in
#   `native-theme/src/resolve/inheritance.rs::tests` assert that the arrays
#   below match the registries byte-for-byte.
#
#   The TOML arrays are RETAINED (not removed) because they serve three roles
#   the macro output alone cannot fill: (1) human review of the inheritance
#   surface during code review, (2) stable discovery target for
#   `lint_toml` structural-key enumeration, (3) traceability to
#   platform-facts.md source rows. If the macro and TOML diverge, the tests
#   fail at `cargo test` time; fix by updating the widget struct attribute
#   (macro is authoritative post-G6), then regenerating this TOML section
#   to match.
#
# All other sections remain HAND-AUTHORED documentation of hand-written
# inheritance rules in `native-theme/src/resolve/inheritance.rs` (out of
# G6 codegen scope per docs/todo_v0.5.7_gaps.md §G6 scope boundary):
#
# Categories:
#   [defaults_internal]    — Defaults-to-defaults chains (Phase 1, hand-written).
#   [border_inheritance]   — Generated by macro (Phase 94-01 G6).
#   [font_inheritance]     — Generated by macro (Phase 94-01 G6).
#   [uniform]              — Partly macro-generated via `#[theme(inherit_from)]`,
#                            partly hand-written (widget-to-widget chains,
#                            partial border, font color override).
#   [per_platform]         — Different fallback per platform (Phase 2, hand-written).
#   [no_inheritance]       — Must come from preset/reader; None = error.
#   [wrong_safety_nets]    — Uniform rules known to produce wrong results.
#   [hardcoded_safety_nets]— Fabricated values in resolve.rs (dead code).
#   [text_scale_inheritance]— TextScaleEntry sub-field inheritance (hand-written).
#
# Derived from docs/platform-facts.md Chapter 2 (§2.1–§2.28).
# Property names match platform-facts.md table entries exactly.
# Source: docs/platform-facts.md  (2026-04-06 snapshot)
# Implementation: native-theme/src/resolve/inheritance.rs
#                 native-theme-derive/src/gen_inherit.rs (G6 emitter)

# ─── Defaults-internal chains (Phase 1) ───────────────────────────────────
#
# These run first, before widget inheritance. They fill defaults fields
# from other defaults fields.

[defaults_internal]
"defaults.selection_background"          = "defaults.accent_color"
"defaults.focus_ring_color"              = "defaults.accent_color"
"defaults.selection_inactive_background" = "defaults.selection_background"       # must run AFTER selection_background
"defaults.text_selection_background"     = "defaults.selection_background"       # must run AFTER selection_background
"defaults.text_selection_color"          = "defaults.selection_text_color"
"defaults.font.color"                   = "defaults.text_color"                 # must run BEFORE mono_font.color
"defaults.mono_font.color"              = "defaults.font.color"                 # must run AFTER font.color
"defaults.border.padding_horizontal"    = "0.0 (when border.line_width or corner_radius present)"
"defaults.border.padding_vertical"      = "0.0 (when border.line_width or corner_radius present)"

# ─── Border sub-field inheritance (Phase 3) ───────────────────────────────
#
# Widgets that have a border sub-struct AND whose border sub-fields
# inherit from defaults.border (per platform-facts tables showing
# ← defaults.border.*). Listed once here to avoid repeating per widget.
# padding_horizontal and padding_vertical are sizing fields with NO
# inheritance. opacity and corner_radius_lg are defaults-only fields.
#
# Widgets whose border sub-fields are all platform-specific or (none)
# are NOT listed here — they get values from preset/OS reader only.
# Specifically excluded:
#   menu   — border belongs to the popup container (§2.16), not menu items
#   tab    — all border sub-fields have platform-specific values (§2.11)
#   card   — all border sub-fields are platform-specific or (none) (§2.26)
# Widgets with partial border inheritance (only color + line_width) are
# handled with explicit rules in [uniform] instead:
#   sidebar    — color/line_width inherit; corner_radius/shadow_enabled (none)
#   status_bar — color/line_width inherit; corner_radius/shadow_enabled (none)
#
# Note: shadow_enabled inheritance may be wrong for widgets where all
# platforms show (none) — no shadow (input, checkbox, progress_bar,
# combo_box, segmented_control, expander). The preset MUST provide
# shadow_enabled = false for these; the safety net from defaults would
# give shadow_enabled = true.

[border_inheritance]
widgets_with_border = [
    "window", "button", "input", "checkbox", "tooltip",
    "progress_bar", "toolbar", "list", "popover", "dialog",
    "combo_box", "segmented_control", "expander",
]
"color.inherits_from"          = "defaults.border.color"
"corner_radius.inherits_from"  = "defaults.border.corner_radius"
"line_width.inherits_from"     = "defaults.border.line_width"
"shadow_enabled.inherits_from" = "defaults.border.shadow_enabled"

# Exceptions — these widgets use corner_radius_lg instead of corner_radius:
corner_radius_lg_widgets = ["window", "popover", "dialog"]

# ─── Font sub-struct inheritance (Phase 3) ────────────────────────────────
#
# Per-widget font fields inherit from defaults.font.
# Two cases:
#   1. font is None → entire Font cloned from defaults.font
#   2. font is Some with None sub-fields → each None sub-field inherits:
#        family ← defaults.font.family
#        size   ← defaults.font.size
#        weight ← defaults.font.weight
#        style  ← defaults.font.style
#        color  ← defaults.font.color
#
# Exception: link.font.color inherits from defaults.link_color (not
# defaults.font.color). This override is in [uniform] below.

[font_inheritance]
widgets_with_font = [
    "window.title_bar_font",
    "button.font",
    "input.font",
    "checkbox.font",
    "menu.font",
    "tooltip.font",
    "tab.font",
    "sidebar.font",
    "toolbar.font",
    "status_bar.font",
    "list.item_font",
    "list.header_font",
    "popover.font",
    "dialog.body_font",
    "dialog.title_font",
    "combo_box.font",
    "segmented_control.font",
    "expander.font",
    "link.font",
]
inherits_from = "defaults.font"
sub_field_inheritance = true   # None sub-fields inherit independently

# ─── Uniform inheritance (Phase 3) ────────────────────────────────────────
#
# Same rule on all 4 platforms. Format: "widget.field" = "source.field"
# Border sub-field rules are in [border_inheritance] above, not repeated here.
# Font rules (including font.color) are in [font_inheritance] above,
# not repeated here — per-widget base text colors use font.color (§2 intro).
# Exception: link.font.color overrides font_inheritance (see §2.28 below).

[uniform]
# window (§2.2)
"window.background_color"                    = "defaults.background_color"
"window.title_bar_background"                = "defaults.surface_color"       # see wrong_safety_nets
"window.inactive_title_bar_background"       = "window.title_bar_background"
"window.inactive_title_bar_text_color"       = "window.title_bar_font.color"

# button (§2.3)
"button.background_color"                    = "defaults.background_color"    # see wrong_safety_nets
"button.primary_background"                  = "defaults.accent_color"
"button.primary_text_color"                  = "defaults.accent_text_color"
"button.disabled_opacity"                    = "defaults.disabled_opacity"
"button.hover_background"                    = "defaults.background_color"    # see wrong_safety_nets
"button.hover_text_color"                    = "button.font.color"
"button.disabled_text_color"                 = "defaults.disabled_text_color"
"button.active_text_color"                   = "button.font.color"            # widget-to-widget

# input (§2.4) — selection uses text_selection tokens, not content selection
"input.background_color"                     = "defaults.background_color"    # see wrong_safety_nets
"input.placeholder_color"                    = "defaults.muted_color"         # see wrong_safety_nets
"input.selection_background"                 = "defaults.text_selection_background"
"input.selection_text_color"                 = "defaults.text_selection_color"
"input.disabled_opacity"                     = "defaults.disabled_opacity"
"input.disabled_text_color"                  = "defaults.disabled_text_color"

# checkbox (§2.5)
"checkbox.background_color"                  = "defaults.background_color"
"checkbox.checked_background"                = "defaults.accent_color"
"checkbox.indicator_color"                   = "defaults.text_color"
"checkbox.disabled_opacity"                  = "defaults.disabled_opacity"
"checkbox.disabled_text_color"               = "defaults.disabled_text_color"

# menu (§2.6)
"menu.background_color"                      = "defaults.background_color"    # see wrong_safety_nets
"menu.separator_color"                       = "defaults.border.color"
"menu.icon_size"                             = "defaults.icon_sizes.toolbar"
"menu.hover_background"                      = "defaults.selection_background"
"menu.hover_text_color"                      = "defaults.selection_text_color"
"menu.disabled_text_color"                   = "defaults.disabled_text_color"

# tooltip (§2.7)
"tooltip.background_color"                   = "defaults.background_color"    # see wrong_safety_nets

# scrollbar (§2.8) — all platforms have own APIs; safety net only
"scrollbar.thumb_color"                      = "defaults.muted_color"         # see wrong_safety_nets
"scrollbar.thumb_hover_color"                = "defaults.muted_color"         # see wrong_safety_nets

# slider (§2.9)
"slider.fill_color"                          = "defaults.accent_color"
"slider.track_color"                         = "defaults.muted_color"
"slider.thumb_color"                         = "defaults.surface_color"
"slider.disabled_opacity"                    = "defaults.disabled_opacity"

# progress_bar (§2.10)
"progress_bar.fill_color"                    = "defaults.accent_color"
"progress_bar.track_color"                   = "defaults.muted_color"

# tab (§2.11)
"tab.background_color"                       = "defaults.background_color"
"tab.active_background"                      = "defaults.background_color"
"tab.active_text_color"                      = "defaults.text_color"
"tab.bar_background"                         = "defaults.background_color"

# sidebar (§2.12)
"sidebar.background_color"                   = "defaults.background_color"    # see wrong_safety_nets
"sidebar.selection_background"               = "defaults.selection_background"
"sidebar.selection_text_color"               = "defaults.selection_text_color"
"sidebar.hover_background"                   = "defaults.background_color"
"sidebar.border.color"                       = "defaults.border.color"
"sidebar.border.line_width"                  = "defaults.border.line_width"

# toolbar (§2.13)
"toolbar.background_color"                   = "defaults.background_color"
"toolbar.icon_size"                          = "defaults.icon_sizes.toolbar"

# status_bar (§2.14)
"status_bar.background_color"                = "defaults.background_color"
"status_bar.border.color"                    = "defaults.border.color"
"status_bar.border.line_width"               = "defaults.border.line_width"

# list (§2.15)
"list.alternate_row_background"              = "list.background_color"        # see wrong_safety_nets
"list.selection_background"                  = "defaults.selection_background"
"list.selection_text_color"                  = "defaults.selection_text_color"
"list.header_background"                     = "defaults.surface_color"       # see wrong_safety_nets
"list.grid_color"                            = "defaults.border.color"

# popover (§2.16) — no additional uniform rules beyond border/font

# splitter (§2.17) — no border sub-struct; direct properties
"splitter.divider_color"                     = "defaults.border.color"

# separator (§2.18) — no border sub-struct; direct properties
"separator.line_color"                       = "defaults.border.color"
"separator.line_width"                       = "defaults.border.line_width"

# switch (§2.21)
"switch.checked_background"                  = "defaults.accent_color"
"switch.thumb_background"                    = "defaults.surface_color"       # see wrong_safety_nets
"switch.disabled_opacity"                    = "defaults.disabled_opacity"

# dialog (§2.22) — no additional uniform rules beyond border/font

# combo_box (§2.24)
"combo_box.background_color"                 = "defaults.background_color"
"combo_box.disabled_opacity"                 = "defaults.disabled_opacity"

# segmented_control (§2.25)
"segmented_control.background_color"         = "defaults.background_color"
"segmented_control.active_background"        = "defaults.accent_color"
"segmented_control.active_text_color"        = "defaults.accent_text_color"
"segmented_control.disabled_opacity"         = "defaults.disabled_opacity"

# card (§2.26)
"card.background_color"                      = "defaults.surface_color"

# expander (§2.27) — no additional uniform rules beyond border/font

# list (§2.15) additional
"list.hover_background"                      = "defaults.background_color"
# list state colors (§2.15)
"list.hover_text_color"                      = "list.item_font.color"         # widget-to-widget
"list.disabled_text_color"                   = "defaults.disabled_text_color"

# splitter state colors (§2.17)
"splitter.hover_color"                       = "splitter.divider_color"       # widget-to-widget

# tab state colors (§2.11)
"tab.hover_text_color"                       = "tab.font.color"              # widget-to-widget

# combo_box state colors (§2.24)
"combo_box.disabled_text_color"              = "defaults.disabled_text_color"

# link (§2.28) — font.color overrides font_inheritance default
"link.font.color"                            = "defaults.link_color"
"link.visited_text_color"                    = "defaults.link_color"

# link state colors (§2.28)
"link.hover_text_color"                      = "link.font.color"             # widget-to-widget
"link.active_text_color"                     = "link.font.color"             # widget-to-widget
"link.disabled_text_color"                   = "defaults.disabled_text_color"

# ─── Per-platform inheritance (Phase 2 safety nets) ───────────────────────
#
# These fields have different sources per platform. resolve() picks one
# fallback. The OS reader or preset usually provides the actual value, so
# the resolve() fallback rarely fires.

[per_platform]

[per_platform."input.caret_color"]
fallback = "defaults.text_color"
macos    = "preset"
windows  = "defaults.text_color"
kde      = "defaults.focus_ring_color"
gnome    = "defaults.accent_color"

[per_platform."scrollbar.track_color"]
fallback = "defaults.background_color"
macos    = "preset"
windows  = "preset"
kde      = "defaults.background_color"
gnome    = "preset"

[per_platform."spinner.fill_color"]
fallback = "defaults.accent_color"
macos    = "preset"
windows  = "defaults.accent_color"
kde      = "defaults.text_color"
gnome    = "defaults.text_color"

[per_platform."popover.background_color"]
fallback = "defaults.background_color"
macos    = "defaults.background_color"
windows  = "defaults.surface_color"
kde      = "defaults.background_color"
gnome    = "preset"

[per_platform."list.background_color"]
fallback = "defaults.background_color"
macos    = "defaults.background_color"
windows  = "defaults.background_color"
kde      = "preset"
gnome    = "preset"

[per_platform."dialog.background_color"]
fallback = "defaults.background_color"
macos    = "defaults.background_color"
windows  = "preset"
kde      = "defaults.background_color"
gnome    = "preset"

# ─── No inheritance ───────────────────────────────────────────────────────
#
# These fields have no default inheritance — they MUST come from the OS
# reader or preset TOML. If still None after resolve(), validate() errors.

[no_inheritance]
fields = [
    "switch.unchecked_background",     # each platform has distinct off-track color
                                       # (FIXED: resolve.rs no longer inherits from defaults.muted_color)
    "switch.track_radius",             # derived from half track height (pill shape)
    "link.underline_enabled",          # boolean convention differs per platform
    "link.background_color",           # only Windows HyperlinkButton has a value
    "link.hover_background",           # only Windows SubtleFillColorSecondary
    "scrollbar.overlay_mode",          # boolean: macOS/GNOME overlay, Win/KDE persistent
    "dialog.button_order",             # enum: macOS/GNOME trailing, Win/KDE leading
    "icon_set",                        # OS reader detects or TOML specifies (on Theme)
    "icon_theme",                      # OS reader detects or TOML specifies (per-variant on defaults)
    # batch 1 interactive state colors (Phase 52, plan 01)
    "button.active_background",        # platform-specific pressed state
    "button.disabled_background",      # platform-specific disabled bg
    "input.hover_border_color",        # platform-specific hover border
    "input.focus_border_color",        # platform-specific focus border
    "input.disabled_background",       # platform-specific disabled bg
    "checkbox.hover_background",       # platform-specific hover bg
    "checkbox.disabled_background",    # platform-specific disabled bg
    "checkbox.unchecked_background",   # platform-specific unchecked indicator bg
    "checkbox.unchecked_border_color", # platform-specific unchecked border
    "scrollbar.thumb_active_color",    # platform-specific pressed thumb
    "slider.thumb_hover_color",        # platform-specific hover thumb
    "slider.disabled_fill_color",      # platform-specific disabled fill
    "slider.disabled_track_color",     # platform-specific disabled track
    "slider.disabled_thumb_color",     # platform-specific disabled thumb
    # batch 2 interactive state colors (Phase 52, plan 02)
    "tab.hover_background",            # platform-specific hover bg
    "switch.hover_checked_background", # platform-specific hover checked track
    "switch.hover_unchecked_background", # platform-specific hover unchecked track
    "switch.disabled_checked_background", # platform-specific disabled checked track
    "switch.disabled_unchecked_background", # platform-specific disabled unchecked track
    "switch.disabled_thumb_color",     # platform-specific disabled thumb
    "combo_box.hover_background",      # platform-specific hover bg
    "combo_box.disabled_background",   # platform-specific disabled bg
    "segmented_control.hover_background", # platform-specific hover bg
    "expander.hover_background",       # platform-specific hover bg
    "expander.arrow_color",            # platform-specific arrow/chevron color
]

# All sizing fields (min_width, min_height, border.padding_*, height, width,
# diameter, etc.) also have no inheritance — they come from preset/reader.
# Not listed individually because they never derive from another field.

# ─── Wrong safety nets ────────────────────────────────────────────────────
#
# Fields where resolve() currently inherits (via [uniform] or
# [font_inheritance] above), but the inheritance is known to produce
# wrong results. The preset MUST provide the actual value. These are
# listed in the inheritance doc as "cannot be universally derived."

[wrong_safety_nets]

[wrong_safety_nets."button.background_color"]
inherits_from = "defaults.background_color"
why_wrong     = "Button bg != window bg on all 4 platforms"

[wrong_safety_nets."button.font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "All platforms have distinct control text colors"

[wrong_safety_nets."tooltip.background_color"]
inherits_from = "defaults.background_color"
why_wrong     = "Tooltip bg is always visually distinct"

[wrong_safety_nets."tooltip.font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "macOS tooltip fg is white, not label color"

[wrong_safety_nets."sidebar.background_color"]
inherits_from = "defaults.background_color"
why_wrong     = "All platforms have distinct sidebar bg"

[wrong_safety_nets."list.alternate_row_background"]
inherits_from = "list.background_color"
why_wrong     = "Alternate rows are always a tinted variant"

[wrong_safety_nets."window.title_bar_background"]
inherits_from = "defaults.surface_color"
why_wrong     = "Only macOS ~ surface; Win/KDE/GNOME distinct"

[wrong_safety_nets."list.header_background"]
inherits_from = "defaults.surface_color"
why_wrong     = "macOS ~ surface, Win ~ background, KDE/GNOME distinct"

[wrong_safety_nets."input.background_color"]
inherits_from = "defaults.background_color"
why_wrong     = "KDE uses surface (View bg); all have distinct APIs"

[wrong_safety_nets."menu.background_color"]
inherits_from = "defaults.background_color"
why_wrong     = "macOS vibrancy and Win COLOR_MENU differ; only KDE matches"

[wrong_safety_nets."input.font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "All platforms have distinct text-field foreground APIs"

[wrong_safety_nets."input.placeholder_color"]
inherits_from = "defaults.muted_color"
why_wrong     = "macOS placeholderTextColor ≈ 0.25α vs secondaryLabelColor ≈ 0.55α; all platforms have distinct placeholder APIs"

[wrong_safety_nets."combo_box.font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "All platforms have distinct control text colors (same as button)"

[wrong_safety_nets."menu.font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "Win COLOR_MENUTEXT and GNOME popover.menu fg differ from defaults"

[wrong_safety_nets."sidebar.font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "KDE Complementary group and GNOME .sidebar fg are distinct"

[wrong_safety_nets."list.item_font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "KDE View group and GNOME .list fg are distinct from defaults"

[wrong_safety_nets."list.header_font.color"]
inherits_from = "defaults.font.color"     # via font_inheritance
why_wrong     = "macOS headerTextColor, KDE Header group, GNOME columnview header distinct"

[wrong_safety_nets."scrollbar.thumb_color"]
inherits_from = "defaults.muted_color"
why_wrong     = "Scrollbar thumb is a semi-transparent UI control; muted_color is a text color"

[wrong_safety_nets."scrollbar.thumb_hover_color"]
inherits_from = "defaults.muted_color"
why_wrong     = "Same as thumb_color — all platforms have distinct scrollbar hover colors"

[wrong_safety_nets."switch.thumb_background"]
inherits_from = "defaults.surface_color"
why_wrong     = "All platforms have distinct thumb APIs; macOS/GNOME thumb is white even in dark mode, surface_color is dark"

# ─── Hardcoded safety nets (resolve.rs Phase 2) ──────────────────────────
#
# These are NOT real inheritance rules — they fabricate values out of thin air
# when a field is None. Documented in todo_v0.5.5.md as bugs to remove.
# All 16 presets already provide these values, so the safety nets are dead code.

[hardcoded_safety_nets]
"defaults.line_height"         = { value = "1.2", status = "dead_code" }
"defaults.accent_text_color"   = { value = "#ffffff", status = "dead_code" }
"defaults.shadow_color"        = { value = "rgba(0,0,0,64)", status = "dead_code" }
"defaults.disabled_text_color" = { copies = "defaults.muted_color", status = "dead_code" }
"dialog.button_order"          = { value = "platform_button_order()", status = "runtime_detection" }

# ─── TextScale inheritance ────────────────────────────────────────────────
#
# TextScaleEntry sub-fields inherit individually when None:
#   size        ← defaults.font.size
#   weight      ← defaults.font.weight
#
# Note: the size computations via ratios (0.82x, 1.0x, etc.) are documented
# in todo_v0.5.5.md as invented values that should be removed. Presets
# should specify all text_scale entries explicitly.

[text_scale_inheritance]
entries = ["caption", "section_heading", "dialog_title", "display"]
"size.inherits_from"        = "defaults.font.size"
"weight.inherits_from"      = "defaults.font.weight"
