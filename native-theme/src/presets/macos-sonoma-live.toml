# macOS Sonoma live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
#
# icon_theme is supplied at the Theme level so the live merge base carries
# the same default as the full `macos-sonoma` preset (see docs/todo_v0.5.7_gaps.md G4).
name = "macOS Sonoma"
icon_theme = "sf-symbols"

# === Light variant ===

[light.defaults]
disabled_opacity = 0.3
line_height = 1.19
focus_ring_width_px = 3.0
focus_ring_offset_px = -1.0


[light.defaults.border]
corner_radius_px = 5.0
corner_radius_lg_px = 10.0
line_width_px = 0.5
opacity = 0.2
shadow_enabled = true
[light.defaults.icon_sizes]
toolbar_px = 24.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_pt =10.7
weight = 400
line_height_pt = 12.7

[light.text_scale.section_heading]
size_pt =13.0
weight = 700
line_height_pt = 15.5

[light.text_scale.dialog_title]
size_pt =15.6
weight = 700
line_height_pt = 18.6

[light.text_scale.display]
size_pt =26.0
weight = 700
line_height_pt = 30.9

[light.button]
min_width_px = 64.0
min_height_px = 22.0
icon_text_gap_px = 4.0


[light.button.border]
padding_horizontal_px = 8.0
padding_vertical_px = 3.0
[light.input]
min_height_px = 22.0


[light.input.border]
padding_horizontal_px = 4.0
padding_vertical_px = 3.0
[light.checkbox]
indicator_width_px = 14.0
label_gap_px = 4.0

[light.tooltip]
max_width_px = 300.0


[light.tooltip.border]
padding_horizontal_px = 4.0
padding_vertical_px = 4.0
[light.scrollbar]
groove_width_px = 16.0
thumb_width_px = 7.0
overlay_mode = true
min_thumb_length_px = 40.0

[light.slider]
track_height_px = 5.0
thumb_diameter_px = 21.0
tick_mark_length_px = 8.0

[light.progress_bar]
track_height_px = 6.0
min_width_px = 100.0

[light.tab]
min_width_px = 64.0
min_height_px = 24.0


[light.tab.border]
padding_horizontal_px = 12.0
padding_vertical_px = 4.0
[light.menu]
row_height_px = 22.0
icon_text_gap_px = 4.0


[light.menu.border]
padding_horizontal_px = 12.0
padding_vertical_px = 3.0
[light.list]
row_height_px = 24.0


[light.list.border]
padding_horizontal_px = 4.0
padding_vertical_px = 4.0
[light.toolbar]
bar_height_px = 38.0
item_gap_px = 8.0

[light.splitter]
divider_width_px = 6.0

[light.switch]
track_width_px = 38.0
track_height_px = 22.0
thumb_diameter_px = 18.0
track_radius_px = 11.0

[light.dialog]
# button_order: provided by platform reader via resolve_platform_defaults
min_width_px = 320.0
max_width_px = 560.0
min_height_px = 140.0
max_height_px = 600.0
button_gap_px = 12.0
icon_size_px =64.0

[light.link]
underline_enabled = true

[light.spinner]
diameter_px = 32.0
min_diameter_px = 10.0
stroke_width_px = 2.0

[light.combo_box]
min_height_px = 21.0
min_width_px = 120.0
arrow_icon_size_px =17.0
arrow_area_width_px = 17.0


[light.combo_box.border]
padding_horizontal_px = 9.0
[light.segmented_control]
segment_height_px = 24.0
separator_width_px = 1.0


[light.segmented_control.border]
padding_horizontal_px = 9.0
[light.card]

[light.expander]
header_height_px = 40.0
arrow_icon_size_px =13.0

