# macOS Sonoma live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "macOS Sonoma"

# === Light variant ===

[light.defaults]
radius = 5.0
radius_lg = 10.0
frame_width = 0.5
disabled_opacity = 0.3
border_opacity = 0.2
shadow_enabled = true
line_height = 1.19
focus_ring_width = 3.0
focus_ring_offset = -1.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 10.0
l = 16.0
xl = 20.0
xxl = 32.0

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.button]
min_width = 64.0
min_height = 22.0
padding_horizontal = 8.0
padding_vertical = 3.0
icon_spacing = 4.0

[light.input]
min_height = 22.0
padding_horizontal = 4.0
padding_vertical = 3.0

[light.checkbox]
indicator_size = 14.0
spacing = 4.0

[light.tooltip]
padding_horizontal = 4.0
padding_vertical = 4.0
max_width = 300.0

[light.scrollbar]
width = 16.0
slider_width = 7.0
overlay_mode = true
min_thumb_height = 40.0

[light.slider]
track_height = 5.0
thumb_size = 21.0
tick_length = 8.0

[light.progress_bar]
height = 6.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 24.0
padding_horizontal = 12.0
padding_vertical = 4.0

[light.menu]
item_height = 22.0
padding_horizontal = 12.0
padding_vertical = 3.0
icon_spacing = 4.0

[light.list]
item_height = 24.0
padding_horizontal = 4.0
padding_vertical = 4.0

[light.toolbar]
height = 38.0
item_spacing = 8.0
padding = 8.0

[light.splitter]
width = 6.0

[light.switch]
track_width = 38.0
track_height = 22.0
thumb_size = 18.0
track_radius = 11.0

[light.dialog]
button_order = "trailing_affirmative"
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
content_padding = 20.0
button_spacing = 12.0
icon_size = 64.0

[light.link]
underline = true

[light.spinner]
diameter = 32.0
min_size = 10.0
stroke_width = 2.0

[light.combo_box]
min_height = 21.0
min_width = 120.0
padding_horizontal = 9.0
arrow_size = 17.0
arrow_area_width = 17.0

[light.segmented_control]
segment_height = 24.0
separator_width = 1.0
padding_horizontal = 9.0

[light.card]
padding = 16.0

[light.expander]
header_height = 40.0
arrow_size = 13.0
content_padding = 16.0

