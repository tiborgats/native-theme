hover_text_color = "#1f1f1f"
disabled_text_color = "#b8b8c8"
row_height_px = 28.0


[light.list.border]
padding_horizontal_px = 8.0
padding_vertical_px = 2.0
[light.toolbar]
bar_height_px = 40.0
item_gap_px = 6.0

[light.sidebar]
background_color = "#cfcfde"
hover_background = "#c2c2d0"


[light.sidebar.font]
color = "#1f1f1f"
[light.popover]
background_color = "#cfcfde"


[light.popover.font]
color = "#1f1f1f"
[light.separator]
line_color = "#b8b8c8"

[light.splitter]
hover_color = "#9c9caa"
divider_width_px = 4.0

[light.switch]
unchecked_background = "#b8b8c8"
thumb_background = "#fffbeb"
hover_checked_background = "#5a42b4"
hover_unchecked_background = "#a9a9b8"
disabled_checked_background = "#62529e"
disabled_unchecked_background = "#cdcdd8"
disabled_thumb_color = "#fffcf1"
track_width_px = 40.0
track_height_px = 20.0
thumb_diameter_px = 16.0
track_radius_px = 10.0

[light.dialog]
min_width_px = 320.0
max_width_px = 560.0
min_height_px = 140.0
max_height_px = 600.0
button_gap_px = 8.0
icon_size_px =32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#644ac918"
hover_text_color = "#036a96"
active_text_color = "#036a96"
disabled_text_color = "#b8b8c8"

[light.spinner]
diameter_px = 24.0
min_diameter_px = 16.0
stroke_width_px = 2.0

[light.combo_box]
hover_background = "#f2eedf"
disabled_background = "#fffcf1"
disabled_text_color = "#b8b8c8"
min_height_px = 32.0
min_width_px = 120.0
arrow_icon_size_px =12.0
arrow_area_width_px = 28.0


[light.combo_box.border]
padding_horizontal_px = 12.0
[light.segmented_control]
active_background = "#644ac9"
active_text_color = "#ffffff"
hover_background = "#efebdc"
segment_height_px = 28.0
separator_width_px = 1.0


[light.segmented_control.border]
padding_horizontal_px = 12.0
[light.card]

[light.expander]
hover_background = "#f2eedf"
arrow_color = "#6c664b"
header_height_px = 40.0
arrow_icon_size_px =12.0

[light.window]
inactive_title_bar_background = "#cfcfde"
inactive_title_bar_text_color = "#1f1f1f"

