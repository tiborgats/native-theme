# Dracula - dark theme with vibrant accent colors
# Source: https://draculatheme.com/spec
name = "Dracula"

# === Light variant (Alucard - official light) ===

[light]
icon_set = "lucide"
icon_theme = "lucide"

[light.defaults]
accent_color = "#644ac9"
background_color = "#fffbeb"
text_color = "#1f1f1f"
surface_color = "#cfcfde"
muted_color = "#6c664b"
shadow_color = "#00000018"

danger_color = "#cb3a2a"
danger_text_color = "#ffffff"
warning_color = "#846e15"
warning_text_color = "#1f1f1f"
success_color = "#14710a"
success_text_color = "#ffffff"
info_color = "#036a96"
info_text_color = "#ffffff"

selection_background = "#644ac9"
selection_text_color = "#ffffff"
link_color = "#036a96"
focus_ring_color = "#644ac9"
disabled_text_color = "#b8b8c8"
accent_text_color = "#ffffff"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width_px = 2.0
focus_ring_offset_px = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#b8b8c8"
corner_radius_px = 8.0
corner_radius_lg_px = 12.0
line_width_px = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Inter"
size_px =14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size_px =14.0
weight = 400

[light.defaults.icon_sizes]
toolbar_px = 24.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_px =9.0
weight = 400

[light.text_scale.section_heading]
size_px =11.0
weight = 700

[light.text_scale.dialog_title]
size_px =15.0
weight = 800

[light.text_scale.display]
size_px =20.0
weight = 800

[light.button]
background_color = "#cfcfde"
hover_background = "#bebecc"
active_background = "#afafbc"
disabled_background = "#dddde7"
hover_text_color = "#1f1f1f"
active_text_color = "#1f1f1f"
disabled_text_color = "#b8b8c8"
