# Dracula - dark theme with vibrant accent colors
# Source: https://draculatheme.com/spec
name = "Dracula"

# === Light variant (Alucard - official light) ===

[light.colors]
accent = "#644ac9"
background = "#fffbeb"
foreground = "#1f1f1f"
surface = "#cfcfde"
border = "#b8b8c8"
muted = "#6c664b"
shadow = "#00000018"

primary_background = "#644ac9"
primary_foreground = "#ffffff"

secondary_background = "#cfcfde"
secondary_foreground = "#1f1f1f"

danger = "#cb3a2a"
danger_foreground = "#ffffff"
warning = "#846e15"
warning_foreground = "#1f1f1f"
success = "#14710a"
success_foreground = "#ffffff"
info = "#036a96"
info_foreground = "#ffffff"

selection = "#644ac9"
selection_foreground = "#ffffff"
link = "#036a96"
focus_ring = "#644ac9"

sidebar = "#cfcfde"
sidebar_foreground = "#1f1f1f"
tooltip = "#1f1f1f"
tooltip_foreground = "#fffbeb"
popover = "#cfcfde"
popover_foreground = "#1f1f1f"

button = "#cfcfde"
button_foreground = "#1f1f1f"
input = "#fffbeb"
input_foreground = "#1f1f1f"
disabled = "#b8b8c8"
separator = "#b8b8c8"
alternate_row = "#f5f0e0"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.widget_metrics.button]
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.widget_metrics.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.widget_metrics.input]
min_height = 32.0
padding_horizontal = 8.0

[light.widget_metrics.scrollbar]
width = 14.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 20.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.tooltip]
padding = 6.0

[light.widget_metrics.list_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.toolbar]
height = 40.0
item_spacing = 6.0

[light.widget_metrics.splitter]
width = 4.0

