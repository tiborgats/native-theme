# Dracula - dark theme with vibrant accent colors
# Source: https://draculatheme.com/spec
name = "Dracula"

# === Light variant (Alucard - official light) ===

[light.defaults]
accent = "#644ac9"
background = "#fffbeb"
foreground = "#1f1f1f"
surface = "#cfcfde"
border = "#b8b8c8"
muted = "#6c664b"
shadow = "#00000018"

danger = "#cb3a2a"
danger_foreground = "#ffffff"
warning = "#846e15"
warning_foreground = "#1f1f1f"
success = "#14710a"
success_foreground = "#ffffff"
info = "#036a96"
info_foreground = "#ffffff"

selection = "#644ac9"
selection_foreground = "#ffffff"
link = "#036a96"
focus_ring_color = "#644ac9"
disabled_foreground = "#b8b8c8"

radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#cfcfde"
foreground = "#1f1f1f"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#fffbeb"
foreground = "#1f1f1f"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#1f1f1f"
foreground = "#fffbeb"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#f5f0e0"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#cfcfde"
foreground = "#1f1f1f"

[light.popover]
background = "#cfcfde"
foreground = "#1f1f1f"

[light.separator]
color = "#b8b8c8"

[light.splitter]
width = 4.0

