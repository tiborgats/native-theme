# Material Design 3 baseline theme
# Source: m3.material.io baseline color scheme
name = "Material"

# === Light variant ===

[light]
icon_set = "material"
icon_theme = "material"

[light.defaults]
accent = "#6750a4"
background = "#fffbfe"
foreground = "#1c1b1f"
surface = "#fffbfe"
border = "#79747e"
muted = "#49454f"
shadow = "#00000018"

danger = "#b3261e"
danger_foreground = "#ffffff"
warning = "#7d5700"
warning_foreground = "#ffffff"
success = "#386a20"
success_foreground = "#ffffff"
info = "#6750a4"
info_foreground = "#ffffff"

selection = "#6750a4"
selection_foreground = "#ffffff"
link = "#6750a4"
focus_ring_color = "#6750a4"
disabled_foreground = "#c4c7c5"
accent_foreground = "#ffffff"

radius = 12.0
radius_lg = 16.0
frame_width = 1.0
disabled_opacity = 0.38
border_opacity = 0.12
shadow_enabled = true
line_height = 1.2
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false

[light.defaults.font]
family = "Roboto"
size = 14.0
weight = 400

[light.defaults.mono_font]
family = "Roboto Mono"
size = 14.0
weight = 400

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.button]
background = "#e8def8"
foreground = "#1d192b"
min_width = 64.0
min_height = 40.0
padding_horizontal = 24.0
padding_vertical = 10.0
icon_spacing = 8.0

[light.input]
background = "#fffbfe"
foreground = "#1c1b1f"
min_height = 56.0
padding_horizontal = 16.0
padding_vertical = 16.0

[light.checkbox]
indicator_size = 18.0
spacing = 8.0

[light.tooltip]
background = "#313033"
foreground = "#f4eff4"
padding_horizontal = 8.0
padding_vertical = 8.0
max_width = 300.0

[light.scrollbar]
width = 12.0
slider_width = 4.0
overlay_mode = false
min_thumb_height = 30.0

[light.slider]
track_height = 4.0
thumb_size = 20.0
tick_length = 4.0

[light.progress_bar]
height = 4.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 48.0
padding_horizontal = 16.0
padding_vertical = 4.0

[light.menu]
item_height = 48.0
padding_horizontal = 12.0
padding_vertical = 4.0
icon_spacing = 8.0

[light.list]
alternate_row = "#f7f2fa"
item_height = 48.0
padding_horizontal = 16.0
padding_vertical = 4.0

[light.toolbar]
height = 64.0
item_spacing = 8.0
padding = 8.0

[light.sidebar]
background = "#f3edf7"
foreground = "#1c1b1f"

[light.popover]
background = "#fffbfe"
foreground = "#1c1b1f"

[light.separator]
color = "#cac4d0"

[light.splitter]
width = 4.0

[light.switch]
unchecked_bg = "#79747e"
thumb_bg = "#fffbfe"
track_width = 52.0
track_height = 32.0
thumb_size = 24.0
track_radius = 16.0

[light.dialog]
button_order = "trailing_affirmative"
min_width = 280.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
content_padding = 24.0
button_spacing = 8.0
icon_size = 32.0

[light.link]
underline = false
background = "#00000000"
hover_bg = "#6750a418"

[light.spinner]
diameter = 24.0
min_size = 16.0
stroke_width = 3.0

[light.combo_box]
min_height = 40.0
min_width = 120.0
padding_horizontal = 16.0
arrow_size = 12.0
arrow_area_width = 28.0

[light.segmented_control]
segment_height = 40.0
separator_width = 1.0
padding_horizontal = 16.0

[light.card]
padding = 16.0

[light.expander]
header_height = 48.0
arrow_size = 12.0
content_padding = 16.0

