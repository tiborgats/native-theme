# Material Design 3 baseline theme
# Source: m3.material.io baseline color scheme
name = "Material"

# === Light variant ===

[light]
icon_set = "material"

[light.defaults]
accent = "#6750a4"
background = "#fffbfe"
foreground = "#1c1b1f"
surface = "#fffbfe"
border = "#79747e"
muted = "#49454f"
shadow = "#00000018"

danger = "#b3261e"
danger_foreground = "#ffffff"
warning = "#7d5700"
warning_foreground = "#ffffff"
success = "#386a20"
success_foreground = "#ffffff"
info = "#6750a4"
info_foreground = "#ffffff"

selection = "#6750a4"
selection_foreground = "#ffffff"
link = "#6750a4"
focus_ring_color = "#6750a4"
disabled_foreground = "#c4c7c5"

radius = 12.0
radius_lg = 16.0
frame_width = 1.0
disabled_opacity = 0.38
border_opacity = 0.12
shadow_enabled = true

[light.defaults.font]
family = "Roboto"
size = 14.0

[light.defaults.mono_font]
family = "Roboto Mono"
size = 14.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#e8def8"
foreground = "#1d192b"
min_height = 40.0
padding_horizontal = 24.0
padding_vertical = 10.0
icon_spacing = 8.0

[light.input]
background = "#fffbfe"
foreground = "#1c1b1f"
min_height = 56.0
padding_horizontal = 16.0

[light.checkbox]
indicator_size = 18.0
spacing = 8.0

[light.tooltip]
background = "#313033"
foreground = "#f4eff4"
padding_horizontal = 8.0
padding_vertical = 8.0

[light.scrollbar]
width = 12.0
slider_width = 4.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 4.0

[light.tab]
min_height = 48.0
padding_horizontal = 16.0

[light.menu]
item_height = 48.0
padding_horizontal = 12.0

[light.list]
alternate_row = "#f7f2fa"
item_height = 48.0
padding_horizontal = 16.0

[light.toolbar]
height = 64.0
item_spacing = 8.0

[light.sidebar]
background = "#f3edf7"
foreground = "#1c1b1f"

[light.popover]
background = "#fffbfe"
foreground = "#1c1b1f"

[light.separator]
color = "#cac4d0"

[light.splitter]
width = 4.0

