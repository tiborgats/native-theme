shadow = "#00000040"

primary_background = "#d0bcff"
primary_foreground = "#381e72"

secondary_background = "#4a4458"
secondary_foreground = "#e8def8"

danger = "#f2b8b5"
danger_foreground = "#601410"
warning = "#e6c18e"
warning_foreground = "#3e2e00"
success = "#b1d18a"
success_foreground = "#1b3700"
info = "#d0bcff"
info_foreground = "#381e72"

selection = "#d0bcff"
selection_foreground = "#381e72"
link = "#d0bcff"
focus_ring = "#d0bcff"

sidebar = "#25232a"
sidebar_foreground = "#e6e1e5"
tooltip = "#e6e1e5"
tooltip_foreground = "#313033"
popover = "#2b2930"
popover_foreground = "#e6e1e5"

button = "#4a4458"
button_foreground = "#e8def8"
input = "#1c1b1e"
