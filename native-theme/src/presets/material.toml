# Material Design 3 baseline theme
# Source: m3.material.io baseline color scheme
name = "Material"

# === Light variant ===

[light.colors]
accent = "#6750a4"
background = "#fffbfe"
foreground = "#1c1b1f"
surface = "#fffbfe"
border = "#79747e"
muted = "#49454f"
shadow = "#00000018"

primary_background = "#6750a4"
primary_foreground = "#ffffff"

secondary_background = "#e8def8"
secondary_foreground = "#1d192b"

danger = "#b3261e"
danger_foreground = "#ffffff"
warning = "#7d5700"
warning_foreground = "#ffffff"
success = "#386a20"
success_foreground = "#ffffff"
info = "#6750a4"
info_foreground = "#ffffff"

selection = "#6750a4"
selection_foreground = "#ffffff"
link = "#6750a4"
focus_ring = "#6750a4"

sidebar = "#f3edf7"
sidebar_foreground = "#1c1b1f"
tooltip = "#313033"
tooltip_foreground = "#f4eff4"
popover = "#fffbfe"
popover_foreground = "#1c1b1f"

button = "#e8def8"
button_foreground = "#1d192b"
input = "#fffbfe"
input_foreground = "#1c1b1f"
disabled = "#c4c7c5"
separator = "#cac4d0"
alternate_row = "#f7f2fa"

[light.fonts]
family = "Roboto"
size = 14.0
mono_family = "Roboto Mono"
mono_size = 14.0

[light.geometry]
radius = 12.0
frame_width = 1.0
disabled_opacity = 0.38
border_opacity = 0.12
scroll_width = 8.0

[light.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0

# === Dark variant ===

[dark.colors]
accent = "#d0bcff"
background = "#1c1b1f"
foreground = "#e6e1e5"
surface = "#1c1b1e"
border = "#938f99"
