# Material Design 3 baseline theme
# Source: m3.material.io baseline color scheme
name = "Material"

# === Light variant ===

[light]
icon_set = "material"
icon_theme = "material"

[light.defaults]
accent_color = "#6750a4"
background_color = "#fffbfe"
text_color = "#1c1b1f"
surface_color = "#fffbfe"
muted_color = "#49454f"
shadow_color = "#00000018"

danger_color = "#b3261e"
danger_text_color = "#ffffff"
warning_color = "#7d5700"
warning_text_color = "#ffffff"
success_color = "#386a20"
success_text_color = "#ffffff"
info_color = "#6750a4"
info_text_color = "#ffffff"

selection_background = "#6750a4"
selection_text_color = "#ffffff"
link_color = "#6750a4"
focus_ring_color = "#6750a4"
disabled_text_color = "#c4c7c5"
accent_text_color = "#ffffff"

disabled_opacity = 0.38
line_height = 1.2
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#79747e"
corner_radius = 12.0
corner_radius_lg = 16.0
line_width = 1.0
opacity = 0.12
shadow_enabled = true
[light.defaults.font]
family = "Roboto"
size = 14.0
weight = 400

[light.defaults.mono_font]
family = "Roboto Mono"
size = 14.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size = 11.0
weight = 400
line_height = 16.0

[light.text_scale.section_heading]
size = 16.0
weight = 500
line_height = 24.0

[light.text_scale.dialog_title]
size = 24.0
weight = 400
line_height = 32.0

[light.text_scale.display]
size = 36.0
weight = 400
line_height = 44.0

[light.button]
background_color = "#e8def8"
min_width = 64.0
min_height = 40.0
icon_text_gap = 8.0


[light.button.border]
padding_horizontal = 24.0
padding_vertical = 10.0

[light.button.font]
color = "#1d192b"
[light.input]
background_color = "#fffbfe"
min_height = 56.0


[light.input.border]
padding_horizontal = 16.0
padding_vertical = 16.0

[light.input.font]
color = "#1c1b1f"
[light.checkbox]
indicator_width = 18.0
label_gap = 8.0

[light.tooltip]
background_color = "#313033"
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 8.0
padding_vertical = 8.0

[light.tooltip.font]
color = "#f4eff4"
[light.scrollbar]
groove_width = 12.0
thumb_width = 4.0
overlay_mode = false
min_thumb_length = 30.0

[light.slider]
track_height = 4.0
thumb_diameter = 20.0
tick_mark_length = 4.0

[light.progress_bar]
track_height = 4.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 48.0


[light.tab.border]
padding_horizontal = 16.0
padding_vertical = 4.0
[light.menu]
row_height = 48.0
icon_text_gap = 8.0


[light.menu.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.list]
alternate_row_background = "#f7f2fa"
row_height = 48.0


[light.list.border]
padding_horizontal = 16.0
padding_vertical = 4.0
[light.toolbar]
bar_height = 64.0
item_gap = 8.0

[light.sidebar]
background_color = "#f3edf7"


[light.sidebar.font]
color = "#1c1b1f"
[light.popover]
background_color = "#fffbfe"


[light.popover.font]
color = "#1c1b1f"
[light.separator]
line_color = "#cac4d0"

[light.splitter]
divider_width = 4.0

[light.switch]
unchecked_background = "#79747e"
thumb_background = "#fffbfe"
track_width = 52.0
track_height = 32.0
thumb_diameter = 24.0
track_radius = 16.0

[light.dialog]
button_order = "primary_right"
min_width = 280.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 8.0
icon_size = 32.0

[light.link]
underline_enabled = false
background_color = "#00000000"
hover_background = "#6750a418"

[light.spinner]
diameter = 24.0
min_diameter = 16.0
stroke_width = 3.0

[light.combo_box]
min_height = 40.0
min_width = 120.0
arrow_icon_size = 12.0
arrow_area_width = 28.0


[light.combo_box.border]
padding_horizontal = 16.0
[light.segmented_control]
segment_height = 40.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 16.0
[light.card]

[light.expander]
header_height = 48.0
arrow_icon_size = 12.0

