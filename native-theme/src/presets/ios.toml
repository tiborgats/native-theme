# iOS system theme
# Source: Apple UIColor system colors, Human Interface Guidelines
name = "iOS"

# === Light variant ===

[light]
icon_set = "sf-symbols"

[light.defaults]
accent = "#007aff"
background = "#ffffff"
foreground = "#000000"
surface = "#f2f2f7"
border = "#c6c6c8"
muted = "#8e8e93"
shadow = "#00000018"

danger = "#ff3b30"
danger_foreground = "#ffffff"
warning = "#ff9500"
warning_foreground = "#000000"
success = "#34c759"
success_foreground = "#ffffff"
info = "#007aff"
info_foreground = "#ffffff"

selection = "#007aff"
selection_foreground = "#ffffff"
link = "#007aff"
focus_ring_color = "#007aff"
disabled_foreground = "#c7c7cc"

radius = 10.0
radius_lg = 13.0
frame_width = 0.5
disabled_opacity = 0.3
border_opacity = 0.15
shadow_enabled = true

[light.defaults.font]
family = "SF Pro"
size = 17.0

[light.defaults.mono_font]
family = "SF Mono"
size = 17.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 20.0
xxl = 32.0

[light.button]
background = "#e5e5ea"
foreground = "#000000"
min_height = 44.0
padding_horizontal = 16.0

[light.input]
background = "#ffffff"
foreground = "#000000"
min_height = 44.0
padding_horizontal = 16.0

[light.checkbox]
indicator_size = 22.0
spacing = 8.0

[light.tooltip]
background = "#2c2c2e"
foreground = "#ffffff"
padding_horizontal = 8.0
padding_vertical = 8.0

[light.scrollbar]
width = 6.0
slider_width = 3.0

[light.slider]
track_height = 4.0
thumb_size = 28.0

[light.progress_bar]
height = 4.0

[light.tab]
min_height = 49.0
padding_horizontal = 8.0

[light.menu]
item_height = 44.0
padding_horizontal = 16.0

[light.list]
alternate_row = "#f2f2f7"
item_height = 44.0
padding_horizontal = 16.0

[light.toolbar]
height = 44.0
item_spacing = 8.0

[light.sidebar]
background = "#f2f2f7"
foreground = "#000000"

[light.popover]
background = "#ffffff"
foreground = "#000000"

[light.separator]
color = "#c6c6c8"

[light.splitter]
width = 1.0

