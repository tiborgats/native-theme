# iOS system theme
# Source: Apple UIColor system colors, Human Interface Guidelines
name = "iOS"

# === Light variant ===

[light]
icon_set = "sf-symbols"
icon_theme = "sf-symbols"

[light.defaults]
accent_color = "#007aff"
background_color = "#ffffff"
text_color = "#000000"
surface_color = "#f2f2f7"
muted_color = "#8e8e93"
shadow_color = "#00000018"

danger_color = "#ff3b30"
danger_text_color = "#ffffff"
warning_color = "#ff9500"
warning_text_color = "#000000"
success_color = "#34c759"
success_text_color = "#ffffff"
info_color = "#007aff"
info_text_color = "#ffffff"

selection_background = "#007aff"
selection_text_color = "#ffffff"
link_color = "#007aff"
focus_ring_color = "#007aff"
disabled_text_color = "#c7c7cc"
accent_text_color = "#ffffff"

disabled_opacity = 0.3
line_height = 1.2
focus_ring_width_px = 2.0
focus_ring_offset_px = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#c6c6c8"
corner_radius_px = 10.0
corner_radius_lg_px = 13.0
line_width_px = 0.5
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "SF Pro"
size_pt =17.0
weight = 400

[light.defaults.mono_font]
family = "SF Mono"
size_pt =17.0
weight = 400

[light.defaults.icon_sizes]
toolbar_px = 24.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_pt =12.0
weight = 400
line_height = 14.4

[light.text_scale.section_heading]
size_pt =15.0
weight = 700
line_height = 18.0

[light.text_scale.dialog_title]
size_pt =22.0
weight = 400
line_height = 26.4

[light.text_scale.display]
size_pt =34.0
weight = 400
line_height = 40.8

[light.button]
background_color = "#e5e5ea"
min_width_px = 64.0
min_height_px = 44.0
icon_text_gap_px = 6.0
hover_background = "#d1d1d6"
hover_text_color = "#000000"
active_background = "#c7c7cc"
active_text_color = "#000000"
disabled_background = "#e5e5ea80"
disabled_text_color = "#c7c7cc"


[light.button.border]
padding_horizontal_px = 16.0
padding_vertical_px = 10.0

[light.button.font]
color = "#000000"
[light.input]
background_color = "#ffffff"
min_height_px = 44.0
hover_border_color = "#007aff"
focus_border_color = "#007aff"
disabled_background = "#f2f2f7"
disabled_text_color = "#c7c7cc"


[light.input.border]
padding_horizontal_px = 16.0
padding_vertical_px = 10.0

[light.input.font]
color = "#000000"
[light.checkbox]
indicator_width_px = 22.0
label_gap_px = 8.0
hover_background = "#d1d1d6"
disabled_background = "#e5e5ea80"
disabled_text_color = "#c7c7cc"
unchecked_background = "#ffffff"
unchecked_border_color = "#c6c6c8"

[light.tooltip]
background_color = "#2c2c2e"
max_width_px = 300.0


[light.tooltip.border]
padding_horizontal_px = 8.0
padding_vertical_px = 8.0

[light.tooltip.font]
color = "#ffffff"
[light.scrollbar]
groove_width_px = 6.0
thumb_width_px = 3.0
overlay_mode = true
min_thumb_length_px = 30.0
thumb_hover_color = "#a0a0a5"
thumb_active_color = "#8e8e93"

[light.slider]
track_height_px = 4.0
thumb_diameter_px = 28.0
tick_mark_length_px = 4.0
thumb_hover_color = "#f0f0f0"
disabled_fill_color = "#007aff80"
disabled_track_color = "#c7c7cc"
disabled_thumb_color = "#e5e5ea"

[light.progress_bar]
track_height_px = 4.0
min_width_px = 100.0

[light.tab]
min_width_px = 64.0
min_height_px = 49.0
hover_background = "#e5e5ea"
hover_text_color = "#000000"
active_background = "#ffffff"
active_text_color = "#007aff"


[light.tab.border]
padding_horizontal_px = 8.0
padding_vertical_px = 4.0
[light.menu]
row_height_px = 44.0
icon_text_gap_px = 8.0
hover_background = "#007aff"
hover_text_color = "#ffffff"
disabled_text_color = "#c7c7cc"


[light.menu.border]
padding_horizontal_px = 16.0
padding_vertical_px = 4.0
[light.list]
alternate_row_background = "#f2f2f7"
row_height_px = 44.0
hover_background = "#e5e5ea"
hover_text_color = "#000000"
disabled_text_color = "#c7c7cc"


[light.list.border]
padding_horizontal_px = 16.0
padding_vertical_px = 4.0
[light.toolbar]
bar_height_px = 44.0
item_gap_px = 8.0

[light.sidebar]
background_color = "#f2f2f7"
hover_background = "#e5e5ea"


[light.sidebar.font]
color = "#000000"
[light.popover]
background_color = "#ffffff"


[light.popover.font]
color = "#000000"
[light.separator]
line_color = "#c6c6c8"

[light.splitter]
divider_width_px = 1.0
hover_color = "#007aff"

[light.switch]
unchecked_background = "#c6c6c8"
hover_checked_background = "#2d8a47"
hover_unchecked_background = "#b0b0b5"
disabled_checked_background = "#34c75980"
disabled_unchecked_background = "#c6c6c880"
disabled_thumb_color = "#ffffff"
thumb_background = "#ffffff"
track_width_px = 51.0
track_height_px = 31.0
thumb_diameter_px = 27.0
track_radius_px = 15.5

[light.dialog]
button_order = "primary_right"
min_width_px = 270.0
max_width_px = 560.0
min_height_px = 140.0
max_height_px = 600.0
button_gap_px = 8.0
icon_size_px =32.0

[light.link]
underline_enabled = false
background_color = "#00000000"
hover_background = "#007aff18"
hover_text_color = "#007aff"
active_text_color = "#0056b3"
disabled_text_color = "#c7c7cc"

[light.spinner]
diameter_px = 24.0
min_diameter_px = 16.0
stroke_width_px = 2.0

[light.combo_box]
min_height_px = 44.0
min_width_px = 120.0
arrow_icon_size_px =12.0
arrow_area_width_px = 28.0
hover_background = "#d1d1d6"
disabled_background = "#e5e5ea80"
disabled_text_color = "#c7c7cc"


[light.combo_box.border]
padding_horizontal_px = 16.0
[light.segmented_control]
segment_height_px = 32.0
separator_width_px = 1.0
hover_background = "#d1d1d6"
active_background = "#007aff"
active_text_color = "#ffffff"


[light.segmented_control.border]
padding_horizontal_px = 12.0
[light.card]

[light.expander]
header_height_px = 44.0
arrow_icon_size_px =12.0
hover_background = "#e5e5ea"
arrow_color = "#8e8e93"

[light.window]
inactive_title_bar_background = "#f2f2f7"
inactive_title_bar_text_color = "#000000"

