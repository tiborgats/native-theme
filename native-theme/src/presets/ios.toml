# iOS system theme
# Source: Apple UIColor system colors, Human Interface Guidelines
name = "iOS"

# === Light variant ===

[light.colors]
accent = "#007aff"
background = "#ffffff"
foreground = "#000000"
surface = "#f2f2f7"
border = "#c6c6c8"
muted = "#8e8e93"
shadow = "#00000018"

primary_background = "#007aff"
primary_foreground = "#ffffff"

secondary_background = "#e5e5ea"
secondary_foreground = "#000000"

danger = "#ff3b30"
danger_foreground = "#ffffff"
warning = "#ff9500"
warning_foreground = "#000000"
success = "#34c759"
success_foreground = "#ffffff"
info = "#007aff"
info_foreground = "#ffffff"

selection = "#007aff"
selection_foreground = "#ffffff"
link = "#007aff"
focus_ring = "#007aff"

sidebar = "#f2f2f7"
sidebar_foreground = "#000000"
tooltip = "#2c2c2e"
tooltip_foreground = "#ffffff"
popover = "#ffffff"
popover_foreground = "#000000"

button = "#e5e5ea"
button_foreground = "#000000"
input = "#ffffff"
input_foreground = "#000000"
disabled = "#c7c7cc"
separator = "#c6c6c8"
alternate_row = "#f2f2f7"

[light.fonts]
family = "SF Pro"
size = 17.0
mono_family = "SF Mono"
mono_size = 17.0

[light.geometry]
radius = 10.0
radius_lg = 13.0
frame_width = 0.5
disabled_opacity = 0.3
border_opacity = 0.15
scroll_width = 6.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 20.0
xxl = 32.0

[light.widget_metrics.button]
min_height = 44.0
padding_horizontal = 16.0

[light.widget_metrics.checkbox]
indicator_size = 22.0
spacing = 8.0

[light.widget_metrics.input]
min_height = 44.0
padding_horizontal = 16.0

[light.widget_metrics.scrollbar]
width = 6.0
slider_width = 3.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 28.0

[light.widget_metrics.progress_bar]
height = 4.0

[light.widget_metrics.tab]
min_height = 49.0
padding_horizontal = 8.0

[light.widget_metrics.menu_item]
height = 44.0
padding_horizontal = 16.0

[light.widget_metrics.tooltip]
padding = 8.0

[light.widget_metrics.list_item]
height = 44.0
padding_horizontal = 16.0

[light.widget_metrics.toolbar]
height = 44.0
item_spacing = 8.0

[light.widget_metrics.splitter]
width = 1.0

