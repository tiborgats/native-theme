# KDE Breeze live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "KDE Breeze"

# === Light variant ===

[light.defaults]
disabled_opacity = 0.5
line_height = 1.36
focus_ring_width = 1.0
focus_ring_offset = 2.0


[light.defaults.border]
corner_radius = 5.0
corner_radius_lg = 8.0
line_width = 1.0
opacity = 0.2
shadow_enabled = true
[light.defaults.icon_sizes]
toolbar = 22.0
small = 16.0
large = 48.0
dialog = 32.0
panel = 48.0

[light.text_scale.caption]
size_pt =8.2
weight = 400
line_height = 11.2

[light.text_scale.section_heading]
size_pt =12.0
weight = 700
line_height = 16.3

[light.text_scale.dialog_title]
size_pt =13.5
weight = 700
line_height = 18.4

[light.text_scale.display]
size_pt =20.0
weight = 700
line_height = 27.2

[light.button]
min_width = 80.0
min_height = 32.0
icon_text_gap = 4.0


[light.button.border]
padding_horizontal = 6.0
padding_vertical = 5.0
[light.input]
min_height = 32.0


[light.input.border]
padding_horizontal = 6.0
padding_vertical = 3.0
[light.checkbox]
indicator_width = 20.0
label_gap = 4.0

[light.tooltip]
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 3.0
padding_vertical = 3.0
[light.scrollbar]
groove_width = 21.0
min_thumb_length = 20.0
thumb_width = 8.0
overlay_mode = false

[light.slider]
track_height = 6.0
thumb_diameter = 20.0
tick_mark_length = 8.0

[light.progress_bar]
track_height = 6.0
min_width = 6.0

[light.tab]
min_width = 80.0
min_height = 30.0


[light.tab.border]
padding_horizontal = 8.0
padding_vertical = 4.0
[light.menu]
row_height = 28.0
icon_text_gap = 8.0


[light.menu.border]
padding_horizontal = 4.0
padding_vertical = 4.0
[light.list]
row_height = 28.0


[light.list.border]
padding_horizontal = 2.0
padding_vertical = 1.0
[light.toolbar]
bar_height = 40.0
item_gap = 0.0

[light.splitter]
divider_width = 1.0

[light.switch]
track_width = 36.0
track_height = 18.0
thumb_diameter = 18.0
track_radius = 9.0

[light.dialog]
button_order = "primary_left"
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 6.0
icon_size =32.0

[light.link]
underline_enabled = true

[light.spinner]
diameter = 36.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 32.0
min_width = 120.0
arrow_icon_size =20.0
arrow_area_width = 20.0


[light.combo_box.border]
padding_horizontal = 6.0
[light.segmented_control]
segment_height = 30.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 8.0
[light.card]

[light.expander]
header_height = 40.0
arrow_icon_size =10.0

