# KDE Breeze live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "KDE Breeze"

# === Light variant ===

[light.defaults]
radius = 5.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.2
shadow_enabled = true
line_height = 1.36
focus_ring_width = 1.0
focus_ring_offset = 2.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 8.0
l = 12.0
xl = 16.0
xxl = 24.0

[light.defaults.icon_sizes]
toolbar = 22.0
small = 16.0
large = 48.0
dialog = 32.0
panel = 48.0

[light.button]
min_width = 80.0
min_height = 32.0
padding_horizontal = 6.0
padding_vertical = 5.0
icon_spacing = 4.0

[light.input]
min_height = 32.0
padding_horizontal = 6.0
padding_vertical = 3.0

[light.checkbox]
indicator_size = 20.0
spacing = 4.0

[light.tooltip]
padding_horizontal = 3.0
padding_vertical = 3.0
max_width = 300.0

[light.scrollbar]
width = 21.0
min_thumb_height = 20.0
slider_width = 8.0
overlay_mode = false

[light.slider]
track_height = 6.0
thumb_size = 20.0
tick_length = 8.0

[light.progress_bar]
height = 6.0
min_width = 6.0

[light.tab]
min_width = 80.0
min_height = 30.0
padding_horizontal = 8.0
padding_vertical = 4.0

[light.menu]
item_height = 28.0
padding_horizontal = 4.0
padding_vertical = 4.0
icon_spacing = 8.0

[light.list]
item_height = 28.0
padding_horizontal = 2.0
padding_vertical = 1.0

[light.toolbar]
height = 40.0
item_spacing = 0.0
padding = 6.0

[light.splitter]
width = 1.0

[light.switch]
track_width = 36.0
track_height = 18.0
thumb_size = 18.0
track_radius = 9.0

[light.dialog]
button_order = "leading_affirmative"
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
content_padding = 10.0
button_spacing = 6.0
icon_size = 32.0

[light.link]
underline = true

[light.spinner]
diameter = 36.0
min_size = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 32.0
min_width = 120.0
padding_horizontal = 6.0
arrow_size = 12.0
arrow_area_width = 20.0

[light.segmented_control]
segment_height = 28.0
separator_width = 1.0
padding_horizontal = 12.0

[light.card]
padding = 16.0

[light.expander]
header_height = 40.0
arrow_size = 10.0
content_padding = 16.0

