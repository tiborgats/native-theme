# Default neutral theme - toolkit-agnostic with balanced colors
name = "Default"

# === Light variant ===

[light.colors.core]
accent = "#4a90d9"
background = "#fafafa"
foreground = "#2e3436"
surface = "#ffffff"
border = "#c0c0c0"
muted = "#929292"
shadow = "#00000018"

[light.colors.primary]
background = "#4a90d9"
foreground = "#ffffff"

[light.colors.secondary]
background = "#6c757d"
foreground = "#ffffff"

[light.colors.status]
danger = "#dc3545"
danger_foreground = "#ffffff"
warning = "#f0ad4e"
warning_foreground = "#2e3436"
success = "#28a745"
success_foreground = "#ffffff"
info = "#4a90d9"
info_foreground = "#ffffff"

[light.colors.interactive]
selection = "#4a90d9"
selection_foreground = "#ffffff"
link = "#2a6cb6"
focus_ring = "#4a90d9"

[light.colors.panel]
sidebar = "#f0f0f0"
sidebar_foreground = "#2e3436"
tooltip = "#2e3436"
tooltip_foreground = "#f0f0f0"
popover = "#ffffff"
popover_foreground = "#2e3436"

[light.colors.component]
button = "#e8e8e8"
button_foreground = "#2e3436"
input = "#ffffff"
input_foreground = "#2e3436"
disabled = "#c0c0c0"
separator = "#d0d0d0"
alternate_row = "#f5f5f5"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 6.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

# === Dark variant ===

[dark.colors.core]
accent = "#4a90d9"
background = "#1e1e1e"
foreground = "#f0f0f0"
surface = "#2d2d2d"
border = "#555555"
muted = "#888888"
shadow = "#00000040"

[dark.colors.primary]
background = "#4a90d9"
foreground = "#ffffff"

[dark.colors.secondary]
background = "#6c757d"
foreground = "#ffffff"

[dark.colors.status]
