# Default neutral theme - toolkit-agnostic with balanced colors
name = "Default"

# === Light variant ===

[light.defaults]
accent = "#4a90d9"
background = "#fafafa"
foreground = "#2e3436"
surface = "#ffffff"
border = "#c0c0c0"
muted = "#929292"
shadow = "#00000018"

danger = "#dc3545"
danger_foreground = "#ffffff"
warning = "#f0ad4e"
warning_foreground = "#2e3436"
success = "#28a745"
success_foreground = "#ffffff"
info = "#4a90d9"
info_foreground = "#ffffff"

selection = "#4a90d9"
selection_foreground = "#ffffff"
link = "#2a6cb6"
focus_ring_color = "#4a90d9"
disabled_foreground = "#c0c0c0"

radius = 6.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.font]
family = "sans-serif"
size = 10.0

[light.defaults.mono_font]
family = "monospace"
size = 10.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#e8e8e8"
foreground = "#2e3436"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#ffffff"
foreground = "#2e3436"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#2e3436"
foreground = "#f0f0f0"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#f5f5f5"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#f0f0f0"
foreground = "#2e3436"

[light.popover]
background = "#ffffff"
foreground = "#2e3436"

[light.separator]
color = "#d0d0d0"

[light.splitter]
width = 4.0

