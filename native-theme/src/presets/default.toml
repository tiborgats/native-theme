danger_foreground = "#ffffff"
warning = "#f0ad4e"
warning_foreground = "#1e1e1e"
success = "#3dbe5c"
success_foreground = "#ffffff"
info = "#5a9ee0"
info_foreground = "#ffffff"

[dark.colors.interactive]
selection = "#4a90d9"
selection_foreground = "#ffffff"
link = "#6aafe6"
focus_ring = "#4a90d9"

[dark.colors.panel]
sidebar = "#252525"
sidebar_foreground = "#f0f0f0"
tooltip = "#3a3a3a"
tooltip_foreground = "#f0f0f0"
popover = "#333333"
popover_foreground = "#f0f0f0"

[dark.colors.component]
button = "#3a3a3a"
button_foreground = "#f0f0f0"
input = "#2d2d2d"
input_foreground = "#f0f0f0"
disabled = "#555555"
separator = "#444444"
alternate_row = "#252525"

[dark.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[dark.geometry]
radius = 6.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0

[dark.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0
