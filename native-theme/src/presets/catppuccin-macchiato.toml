bar_height_px = 40.0
item_gap_px = 6.0

[light.sidebar]
background_color = "#e6e9ef"
hover_background = "#dce0e8"


[light.sidebar.font]
color = "#4c4f69"
[light.popover]
background_color = "#e6e9ef"


[light.popover.font]
color = "#4c4f69"
[light.separator]
line_color = "#bcc0cc"

[light.splitter]
divider_width_px = 4.0
hover_color = "#8aadf4"

[light.switch]
unchecked_background = "#bcc0cc"
hover_checked_background = "#789ee6"
hover_unchecked_background = "#acb0be"
disabled_checked_background = "#8aadf480"
disabled_unchecked_background = "#bcc0cc80"
disabled_thumb_color = "#e6e9ef"
thumb_background = "#eff1f5"
