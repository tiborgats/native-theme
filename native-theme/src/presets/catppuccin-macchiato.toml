weight = 400

[light.defaults.icon_sizes]
toolbar_px = 24.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_px =9.0
weight = 400

[light.text_scale.section_heading]
size_px =11.0
weight = 700

[light.text_scale.dialog_title]
size_px =15.0
weight = 800

[light.text_scale.display]
size_px =20.0
weight = 800

[light.button]
background_color = "#e6e9ef"
min_width_px = 64.0
min_height_px = 32.0
icon_text_gap_px = 6.0
hover_background = "#dce0e8"
