# Catppuccin Macchiato - medium-dark flavor of the Catppuccin palette
# Source: https://catppuccin.com/palette/
name = "Catppuccin Macchiato"
icon_set = "lucide"

# === Light variant (derived - Latte base with Macchiato accents) ===

[light.defaults]
icon_theme = "lucide"
accent_color = "#8aadf4"
background_color = "#eff1f5"
text_color = "#4c4f69"
surface_color = "#e6e9ef"
muted_color = "#6c6f85"
shadow_color = "#00000018"

danger_color = "#ed8796"
danger_text_color = "#4c4f69"
warning_color = "#eed49f"
warning_text_color = "#4c4f69"
success_color = "#a6da95"
success_text_color = "#4c4f69"
info_color = "#91d7e3"
info_text_color = "#4c4f69"

selection_background = "#8aadf4"
selection_text_color = "#ffffff"
link_color = "#8aadf4"
focus_ring_color = "#8aadf4"
disabled_text_color = "#bcc0cc"
accent_text_color = "#ffffff"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width_px = 2.0
focus_ring_offset_px = 1.0


[light.defaults.border]
color = "#bcc0cc"
corner_radius_px = 8.0
corner_radius_lg_px = 12.0
