# Solarized - precision colors for machines and people
# Source: https://ethanschoonover.com/solarized/
name = "Solarized"

# === Light variant (Solarized Light) ===

[light.colors]
accent = "#268bd2"
background = "#fdf6e3"
foreground = "#657b83"
surface = "#eee8d5"
border = "#eee8d5"
muted = "#93a1a1"
shadow = "#00000018"

primary_background = "#268bd2"
primary_foreground = "#fdf6e3"

secondary_background = "#eee8d5"
secondary_foreground = "#657b83"

danger = "#dc322f"
danger_foreground = "#fdf6e3"
warning = "#b58900"
warning_foreground = "#fdf6e3"
success = "#859900"
success_foreground = "#fdf6e3"
info = "#268bd2"
info_foreground = "#fdf6e3"

selection = "#268bd2"
selection_foreground = "#fdf6e3"
link = "#268bd2"
focus_ring = "#268bd2"

sidebar = "#eee8d5"
sidebar_foreground = "#657b83"
tooltip = "#002b36"
tooltip_foreground = "#839496"
popover = "#eee8d5"
popover_foreground = "#657b83"

button = "#eee8d5"
button_foreground = "#657b83"
input = "#fdf6e3"
input_foreground = "#657b83"
disabled = "#93a1a1"
separator = "#eee8d5"
alternate_row = "#eee8d5"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.widget_metrics.button]
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.widget_metrics.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.widget_metrics.input]
min_height = 32.0
padding_horizontal = 8.0

[light.widget_metrics.scrollbar]
width = 14.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 20.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.tooltip]
padding = 6.0

[light.widget_metrics.list_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.toolbar]
height = 40.0
item_spacing = 6.0

[light.widget_metrics.splitter]
width = 4.0

