min_height = 32.0


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.menu]
hover_background = "#268bd2"
hover_text_color = "#fdf6e3"
disabled_text_color = "#93a1a1"
row_height = 28.0
icon_text_gap = 8.0


[light.menu.border]
padding_horizontal = 8.0
padding_vertical = 4.0
[light.list]
alternate_row_background = "#eee8d5"
hover_background = "#f0e9d7"
hover_text_color = "#657b83"
disabled_text_color = "#93a1a1"
row_height = 28.0


[light.list.border]
padding_horizontal = 8.0
padding_vertical = 2.0
[light.toolbar]
bar_height = 40.0
item_gap = 6.0

[light.sidebar]
background_color = "#eee8d5"
hover_background = "#dfdac8"


[light.sidebar.font]
color = "#657b83"
[light.popover]
background_color = "#eee8d5"


[light.popover.font]
color = "#657b83"
[light.separator]
line_color = "#93a1a1"

[light.splitter]
hover_color = "#7c8888"
divider_width = 4.0

[light.switch]
unchecked_background = "#eee8d5"
thumb_background = "#fdf6e3"
hover_checked_background = "#227dbd"
hover_unchecked_background = "#dad5c3"
disabled_checked_background = "#4581ac"
disabled_unchecked_background = "#f3eee1"
disabled_thumb_color = "#fdf8eb"
track_width = 40.0
track_height = 20.0
thumb_diameter = 16.0
track_radius = 10.0

[light.dialog]
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 8.0
icon_size_px =32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#268bd218"
hover_text_color = "#268bd2"
active_text_color = "#268bd2"
disabled_text_color = "#93a1a1"

[light.spinner]
diameter = 24.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
hover_background = "#f0e9d7"
disabled_background = "#fdf8eb"
disabled_text_color = "#93a1a1"
min_height = 32.0
min_width = 120.0
arrow_icon_size_px =12.0
arrow_area_width = 28.0


[light.combo_box.border]
padding_horizontal = 12.0
[light.segmented_control]
active_background = "#268bd2"
active_text_color = "#fdf6e3"
hover_background = "#ede7d5"
segment_height = 28.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]

[light.expander]
hover_background = "#f0e9d7"
arrow_color = "#93a1a1"
header_height = 40.0
arrow_icon_size_px =12.0

[light.window]
inactive_title_bar_background = "#eee8d5"
inactive_title_bar_text_color = "#657b83"

