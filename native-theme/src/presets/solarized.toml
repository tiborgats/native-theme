[light.input.border]
padding_horizontal = 8.0
padding_vertical = 6.0

[light.input.font]
color = "#657b83"
[light.checkbox]
hover_background = "#dfdac8"
disabled_background = "#f3eee1"
disabled_text_color = "#93a1a1"
unchecked_background = "#eee8d5"
unchecked_border_color = "#93a1a1"
indicator_width = 18.0
label_gap = 6.0

[light.tooltip]
background_color = "#002b36"
