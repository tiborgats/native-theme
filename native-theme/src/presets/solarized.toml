# Solarized - precision colors for machines and people
# Source: https://ethanschoonover.com/solarized/
name = "Solarized"

# === Light variant (Solarized Light) ===

[light]
icon_set = "lucide"
icon_theme = "lucide"

[light.defaults]
accent_color = "#268bd2"
background_color = "#fdf6e3"
text_color = "#657b83"
surface_color = "#eee8d5"
muted_color = "#93a1a1"
shadow_color = "#00000018"

danger_color = "#dc322f"
danger_text_color = "#fdf6e3"
warning_color = "#b58900"
warning_text_color = "#fdf6e3"
success_color = "#859900"
success_text_color = "#fdf6e3"
info_color = "#268bd2"
info_text_color = "#fdf6e3"

selection_background = "#268bd2"
selection_text_color = "#fdf6e3"
link_color = "#268bd2"
focus_ring_color = "#268bd2"
disabled_text_color = "#93a1a1"
accent_text_color = "#fdf6e3"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#93a1a1"
corner_radius = 8.0
corner_radius_lg = 12.0
line_width = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Inter"
size_px =14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size_px =14.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size_px =9.0
weight = 400

[light.text_scale.section_heading]
size_px =11.0
weight = 700

[light.text_scale.dialog_title]
size_px =15.0
weight = 800

[light.text_scale.display]
size_px =20.0
weight = 800

[light.button]
background_color = "#eee8d5"
hover_background = "#dad5c3"
active_background = "#cac5b5"
disabled_background = "#f3eee1"
hover_text_color = "#657b83"
active_text_color = "#657b83"
disabled_text_color = "#93a1a1"
min_width = 64.0
min_height = 32.0
icon_text_gap = 6.0


[light.button.border]
padding_horizontal = 12.0
padding_vertical = 6.0

[light.button.font]
color = "#657b83"
[light.input]
