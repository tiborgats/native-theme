# Solarized - precision colors for machines and people
# Source: https://ethanschoonover.com/solarized/
name = "Solarized"

# === Light variant (Solarized Light) ===

[light.defaults]
accent = "#268bd2"
background = "#fdf6e3"
foreground = "#657b83"
surface = "#eee8d5"
border = "#eee8d5"
muted = "#93a1a1"
shadow = "#00000018"

danger = "#dc322f"
danger_foreground = "#fdf6e3"
warning = "#b58900"
warning_foreground = "#fdf6e3"
success = "#859900"
success_foreground = "#fdf6e3"
info = "#268bd2"
info_foreground = "#fdf6e3"

selection = "#268bd2"
selection_foreground = "#fdf6e3"
link = "#268bd2"
focus_ring_color = "#268bd2"
disabled_foreground = "#93a1a1"

radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#eee8d5"
foreground = "#657b83"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#fdf6e3"
foreground = "#657b83"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#002b36"
foreground = "#839496"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#eee8d5"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#eee8d5"
foreground = "#657b83"

[light.popover]
background = "#eee8d5"
foreground = "#657b83"

[light.separator]
color = "#eee8d5"

[light.splitter]
width = 4.0

