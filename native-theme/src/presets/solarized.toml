# Solarized - precision colors for machines and people
# Source: https://ethanschoonover.com/solarized/
name = "Solarized"

# === Light variant (Solarized Light) ===

[light]
icon_set = "freedesktop"

[light.defaults]
accent = "#268bd2"
background = "#fdf6e3"
foreground = "#657b83"
surface = "#eee8d5"
border = "#eee8d5"
muted = "#93a1a1"
shadow = "#00000018"

danger = "#dc322f"
danger_foreground = "#fdf6e3"
warning = "#b58900"
warning_foreground = "#fdf6e3"
success = "#859900"
success_foreground = "#fdf6e3"
info = "#268bd2"
info_foreground = "#fdf6e3"

selection = "#268bd2"
selection_foreground = "#fdf6e3"
link = "#268bd2"
focus_ring_color = "#268bd2"
disabled_foreground = "#93a1a1"
accent_foreground = "#fdf6e3"

radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true
line_height = 1.4
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false

[light.defaults.font]
family = "Inter"
size = 14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size = 14.0
weight = 400

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.button]
background = "#eee8d5"
foreground = "#657b83"
min_width = 64.0
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0
icon_spacing = 6.0

[light.input]
background = "#fdf6e3"
foreground = "#657b83"
min_height = 32.0
padding_horizontal = 8.0
padding_vertical = 6.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#002b36"
foreground = "#839496"
padding_horizontal = 6.0
padding_vertical = 6.0
max_width = 300.0

[light.scrollbar]
width = 14.0
slider_width = 8.0
overlay_mode = false
min_thumb_height = 30.0

[light.slider]
track_height = 4.0
thumb_size = 20.0
tick_length = 4.0

[light.progress_bar]
height = 6.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 4.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0
padding_vertical = 4.0
icon_spacing = 8.0

[light.list]
alternate_row = "#eee8d5"
item_height = 28.0
padding_horizontal = 8.0
padding_vertical = 2.0

[light.toolbar]
height = 40.0
item_spacing = 6.0
padding = 4.0

[light.sidebar]
background = "#eee8d5"
foreground = "#657b83"

[light.popover]
background = "#eee8d5"
foreground = "#657b83"

[light.separator]
color = "#eee8d5"

[light.splitter]
width = 4.0

[light.switch]
unchecked_bg = "#eee8d5"
thumb_bg = "#fdf6e3"
track_width = 40.0
track_height = 20.0
thumb_size = 16.0
track_radius = 10.0

[light.dialog]
button_order = "trailing_affirmative"
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
content_padding = 24.0
button_spacing = 8.0
icon_size = 32.0

[light.link]
underline = true
background = "#00000000"
hover_bg = "#268bd218"

[light.spinner]
diameter = 24.0
min_size = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 32.0
min_width = 120.0
padding_horizontal = 12.0
arrow_size = 12.0
arrow_area_width = 28.0

[light.segmented_control]
segment_height = 28.0
separator_width = 1.0
padding_horizontal = 12.0

[light.card]
padding = 16.0

[light.expander]
header_height = 40.0
arrow_size = 12.0
content_padding = 16.0

