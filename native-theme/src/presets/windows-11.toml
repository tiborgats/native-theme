# Windows 11 Fluent Design theme
# Source: WinUI3 XAML theme resources, Fluent Design System
name = "Windows 11"

# === Light variant ===

[light]
icon_set = "segoe-fluent"

[light.defaults]
accent = "#0078d4"
background = "#f3f3f3"
foreground = "#1a1a1a"
surface = "#ffffff"
border = "#e5e5e5"
muted = "#717171"
shadow = "#00000018"

danger = "#c42b1c"
danger_foreground = "#ffffff"
warning = "#9d5d00"
warning_foreground = "#1a1a1a"
success = "#0f7b0f"
success_foreground = "#ffffff"
info = "#0078d4"
info_foreground = "#ffffff"

selection = "#0078d4"
selection_foreground = "#ffffff"
link = "#005a9e"
focus_ring_color = "#0078d4"
disabled_foreground = "#c5c5c5"

radius = 4.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.4
border_opacity = 0.14
shadow_enabled = true

[light.defaults.font]
family = "Segoe UI"
size = 14.0

[light.defaults.mono_font]
family = "Cascadia Mono"
size = 14.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#fdfdfd"
foreground = "#1a1a1a"
min_height = 32.0
padding_horizontal = 12.0

[light.input]
background = "#ffffff"
foreground = "#1a1a1a"
min_height = 32.0
padding_horizontal = 12.0

[light.checkbox]
indicator_size = 20.0
spacing = 8.0

[light.tooltip]
background = "#2c2c2c"
foreground = "#ffffff"
padding_horizontal = 8.0
padding_vertical = 8.0

[light.scrollbar]
width = 16.0
min_thumb_height = 24.0

[light.slider]
track_height = 4.0
thumb_size = 22.0

[light.progress_bar]
height = 4.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 32.0
padding_horizontal = 12.0

[light.list]
alternate_row = "#f9f9f9"
item_height = 36.0
padding_horizontal = 12.0

[light.toolbar]
height = 48.0
item_spacing = 4.0

[light.sidebar]
background = "#ebebeb"
foreground = "#1a1a1a"

[light.popover]
background = "#ffffff"
foreground = "#1a1a1a"

[light.separator]
color = "#e5e5e5"

[light.splitter]
width = 4.0

