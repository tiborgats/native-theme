# Windows 11 Fluent Design theme
# Source: WinUI3 XAML theme resources, Fluent Design System
name = "Windows 11"

# === Light variant ===

[light.colors.core]
accent = "#0078d4"
background = "#f3f3f3"
foreground = "#1a1a1a"
surface = "#ffffff"
border = "#e5e5e5"
muted = "#717171"
shadow = "#00000018"

[light.colors.primary]
background = "#0078d4"
foreground = "#ffffff"

[light.colors.secondary]
background = "#e5e5e5"
foreground = "#1a1a1a"

[light.colors.status]
danger = "#c42b1c"
danger_foreground = "#ffffff"
warning = "#9d5d00"
warning_foreground = "#1a1a1a"
success = "#0f7b0f"
success_foreground = "#ffffff"
info = "#0078d4"
info_foreground = "#ffffff"

[light.colors.interactive]
selection = "#0078d4"
selection_foreground = "#ffffff"
link = "#005a9e"
focus_ring = "#0078d4"

[light.colors.panel]
sidebar = "#ebebeb"
sidebar_foreground = "#1a1a1a"
tooltip = "#2c2c2c"
tooltip_foreground = "#ffffff"
popover = "#ffffff"
popover_foreground = "#1a1a1a"

[light.colors.component]
button = "#fdfdfd"
button_foreground = "#1a1a1a"
input = "#ffffff"
input_foreground = "#1a1a1a"
disabled = "#c5c5c5"
separator = "#e5e5e5"
alternate_row = "#f9f9f9"

[light.fonts]
family = "Segoe UI"
size = 14.0
mono_family = "Cascadia Mono"
mono_size = 14.0

[light.geometry]
radius = 4.0
frame_width = 1.0
disabled_opacity = 0.4
border_opacity = 0.14
scroll_width = 6.0

[light.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0

# === Dark variant ===

[dark.colors.core]
accent = "#0078d4"
background = "#202020"
foreground = "#ffffff"
surface = "#2d2d2d"
border = "#454545"
muted = "#9a9a9a"
shadow = "#00000040"

[dark.colors.primary]
background = "#0078d4"
foreground = "#ffffff"

[dark.colors.secondary]
background = "#454545"
foreground = "#ffffff"

[dark.colors.status]
danger = "#ff9999"
danger_foreground = "#1a1a1a"
warning = "#f0c239"
warning_foreground = "#1a1a1a"
success = "#6ccb5f"
success_foreground = "#1a1a1a"
info = "#60cdff"
info_foreground = "#1a1a1a"

[dark.colors.interactive]
selection = "#0078d4"
selection_foreground = "#ffffff"
link = "#60cdff"
focus_ring = "#0078d4"

[dark.colors.panel]
sidebar = "#272727"
sidebar_foreground = "#ffffff"
tooltip = "#3a3a3a"
tooltip_foreground = "#ffffff"
popover = "#2d2d2d"
popover_foreground = "#ffffff"

[dark.colors.component]
button = "#333333"
button_foreground = "#ffffff"
input = "#2d2d2d"
input_foreground = "#ffffff"
disabled = "#454545"
separator = "#3b3b3b"
alternate_row = "#262626"

[dark.fonts]
family = "Segoe UI"
size = 14.0
mono_family = "Cascadia Mono"
mono_size = 14.0

[dark.geometry]
radius = 4.0
frame_width = 1.0
disabled_opacity = 0.4
border_opacity = 0.14
scroll_width = 6.0

[dark.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0
