# Adwaita live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
#
# icon_theme is supplied at the Theme level so the live merge base carries
# the same default as the full `adwaita` preset (see docs/todo_v0.5.7_gaps.md G4).
name = "Adwaita"
icon_theme = "Adwaita"

# === Light variant ===

[light.defaults]
disabled_opacity = 0.5
line_height = 1.21
focus_ring_width_px = 2.0
focus_ring_offset_px = -2.0


[light.defaults.border]
corner_radius_px = 9.0
corner_radius_lg_px = 15.0
line_width_px = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.icon_sizes]
toolbar_px = 16.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_pt =9.0

[light.text_scale.section_heading]
weight = 700

[light.text_scale.dialog_title]
size_pt =15.0
weight = 800

[light.text_scale.display]
size_pt =20.0
weight = 800

[light.button]
min_width_px = 64.0
min_height_px = 34.0
icon_text_gap_px = 8.0


[light.button.border]
padding_horizontal_px = 10.0
padding_vertical_px = 5.0
[light.input]
min_height_px = 34.0


[light.input.border]
padding_horizontal_px = 9.0
padding_vertical_px = 0.0
[light.checkbox]
indicator_width_px = 20.0
label_gap_px = 8.0

[light.tooltip]
max_width_px = 360.0


[light.tooltip.border]
padding_horizontal_px = 10.0
padding_vertical_px = 6.0
[light.scrollbar]
groove_width_px = 12.0
thumb_width_px = 8.0
overlay_mode = false
min_thumb_length_px = 40.0

[light.slider]
track_height_px = 10.0
thumb_diameter_px = 20.0
tick_mark_length_px = 4.0

[light.progress_bar]
track_height_px = 8.0
min_width_px = 80.0

[light.tab]
min_width_px = 64.0
min_height_px = 30.0


[light.tab.border]
padding_horizontal_px = 12.0
padding_vertical_px = 3.0
[light.menu]
row_height_px = 32.0
icon_text_gap_px = 8.0


[light.menu.border]
padding_horizontal_px = 12.0
padding_vertical_px = 0.0
[light.list]
row_height_px = 34.0


[light.list.border]
padding_horizontal_px = 12.0
padding_vertical_px = 8.0
[light.toolbar]
bar_height_px = 47.0
item_gap_px = 6.0

[light.splitter]
divider_width_px = 1.0

[light.switch]
track_width_px = 46.0
track_height_px = 26.0
thumb_diameter_px = 20.0
track_radius_px = 14.0

[light.dialog]
# button_order: provided by platform reader via resolve_platform_defaults
min_width_px = 300.0
max_width_px = 372.0
min_height_px = 140.0
max_height_px = 600.0
button_gap_px = 12.0
icon_size_px =32.0


[light.dialog.border]
corner_radius_px = 18.0
[light.link]
underline_enabled = true

[light.spinner]
diameter_px = 16.0
min_diameter_px = 16.0
stroke_width_px = 2.0

[light.combo_box]
min_height_px = 34.0
min_width_px = 120.0
arrow_icon_size_px =16.0
arrow_area_width_px = 28.0


[light.combo_box.border]
padding_horizontal_px = 10.0
[light.segmented_control]
segment_height_px = 28.0
separator_width_px = 1.0


[light.segmented_control.border]
padding_horizontal_px = 12.0
[light.card]


[light.card.border]
corner_radius_px = 12.0
[light.expander]
header_height_px = 50.0
arrow_icon_size_px =16.0

