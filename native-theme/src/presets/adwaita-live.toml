# Adwaita live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "Adwaita"

# === Light variant ===

[light.defaults]
disabled_opacity = 0.5
line_height = 1.21
focus_ring_width = 2.0
focus_ring_offset = -2.0


[light.defaults.border]
corner_radius = 9.0
corner_radius_lg = 15.0
line_width = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.icon_sizes]
toolbar = 16.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size_pt =9.0

[light.text_scale.section_heading]
weight = 700

[light.text_scale.dialog_title]
size_pt =15.0
weight = 800

[light.text_scale.display]
size_pt =20.0
weight = 800

[light.button]
min_width = 64.0
min_height = 34.0
icon_text_gap = 8.0


[light.button.border]
padding_horizontal = 10.0
padding_vertical = 5.0
[light.input]
min_height = 34.0


[light.input.border]
padding_horizontal = 9.0
padding_vertical = 0.0
[light.checkbox]
indicator_width = 20.0
label_gap = 8.0

[light.tooltip]
max_width = 360.0


[light.tooltip.border]
padding_horizontal = 10.0
padding_vertical = 6.0
[light.scrollbar]
groove_width = 12.0
thumb_width = 8.0
overlay_mode = false
min_thumb_length = 40.0

[light.slider]
track_height = 10.0
thumb_diameter = 20.0
tick_mark_length = 4.0

[light.progress_bar]
track_height = 8.0
min_width = 80.0

[light.tab]
min_width = 64.0
min_height = 30.0


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 3.0
[light.menu]
row_height = 32.0
icon_text_gap = 8.0


[light.menu.border]
padding_horizontal = 12.0
padding_vertical = 0.0
[light.list]
row_height = 34.0


[light.list.border]
padding_horizontal = 12.0
padding_vertical = 8.0
[light.toolbar]
bar_height = 47.0
item_gap = 6.0

[light.splitter]
divider_width = 1.0

[light.switch]
track_width = 46.0
track_height = 26.0
thumb_diameter = 20.0
track_radius = 14.0

[light.dialog]
button_order = "primary_right"
min_width = 300.0
max_width = 372.0
min_height = 140.0
max_height = 600.0
button_gap = 12.0
icon_size_pt =32.0


[light.dialog.border]
corner_radius = 18.0
[light.link]
underline_enabled = true

[light.spinner]
diameter = 16.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 34.0
min_width = 120.0
arrow_icon_size_pt =16.0
arrow_area_width = 28.0


[light.combo_box.border]
padding_horizontal = 10.0
[light.segmented_control]
segment_height = 28.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]


[light.card.border]
corner_radius = 12.0
[light.expander]
header_height = 50.0
arrow_icon_size_pt =16.0

