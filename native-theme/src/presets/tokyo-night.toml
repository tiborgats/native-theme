# Tokyo Night - clean dark theme inspired by Tokyo city lights
# Source: https://github.com/folke/tokyonight.nvim
name = "Tokyo Night"

# === Light variant (Tokyo Night Day) ===

[light.colors]
accent = "#2e7de9"
background = "#e1e2e7"
foreground = "#3760bf"
surface = "#d0d5e3"
border = "#c4c8da"
muted = "#848cb5"
shadow = "#00000018"

primary_background = "#2e7de9"
primary_foreground = "#ffffff"

secondary_background = "#d0d5e3"
secondary_foreground = "#3760bf"

danger = "#c64343"
danger_foreground = "#ffffff"
warning = "#8c6c3e"
warning_foreground = "#e1e2e7"
success = "#587539"
success_foreground = "#ffffff"
info = "#007197"
info_foreground = "#ffffff"

selection = "#2e7de9"
selection_foreground = "#ffffff"
link = "#2e7de9"
focus_ring = "#2e7de9"

sidebar = "#d0d5e3"
sidebar_foreground = "#3760bf"
tooltip = "#3760bf"
tooltip_foreground = "#e1e2e7"
popover = "#d0d5e3"
popover_foreground = "#3760bf"

button = "#d0d5e3"
button_foreground = "#3760bf"
input = "#e1e2e7"
input_foreground = "#3760bf"
disabled = "#c4c8da"
separator = "#c4c8da"
alternate_row = "#d0d5e3"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

