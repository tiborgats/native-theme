# Tokyo Night - clean dark theme inspired by Tokyo city lights
# Source: https://github.com/folke/tokyonight.nvim
name = "Tokyo Night"

# === Light variant (Tokyo Night Day) ===

[light.defaults]
accent = "#2e7de9"
background = "#e1e2e7"
foreground = "#3760bf"
surface = "#d0d5e3"
border = "#c4c8da"
muted = "#848cb5"
shadow = "#00000018"

danger = "#c64343"
danger_foreground = "#ffffff"
warning = "#8c6c3e"
warning_foreground = "#e1e2e7"
success = "#587539"
success_foreground = "#ffffff"
info = "#007197"
info_foreground = "#ffffff"

selection = "#2e7de9"
selection_foreground = "#ffffff"
link = "#2e7de9"
focus_ring_color = "#2e7de9"
disabled_foreground = "#c4c8da"

radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#d0d5e3"
foreground = "#3760bf"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#e1e2e7"
foreground = "#3760bf"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#3760bf"
foreground = "#e1e2e7"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#d0d5e3"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#d0d5e3"
foreground = "#3760bf"

[light.popover]
background = "#d0d5e3"
foreground = "#3760bf"

[light.separator]
color = "#c4c8da"

[light.splitter]
width = 4.0

