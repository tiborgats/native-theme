# macOS Sonoma theme
# Source: Apple Human Interface Guidelines, NSColor system colors
name = "macOS Sonoma"

# === Light variant ===

[light]
icon_theme = "sf-symbols"

[light.colors]
accent = "#007aff"
background = "#f0f0f0"
foreground = "#1d1d1f"
surface = "#ffffff"
border = "#d5d5d5"
muted = "#86868b"
shadow = "#00000018"

primary_background = "#007aff"
primary_foreground = "#ffffff"

secondary_background = "#e8e8ed"
secondary_foreground = "#1d1d1f"

danger = "#ff3b30"
danger_foreground = "#ffffff"
warning = "#ff9500"
warning_foreground = "#1d1d1f"
success = "#34c759"
success_foreground = "#ffffff"
info = "#007aff"
info_foreground = "#ffffff"

selection = "#007aff"
selection_foreground = "#ffffff"
link = "#007aff"
focus_ring = "#007aff"

sidebar = "#e8e8ed"
sidebar_foreground = "#1d1d1f"
tooltip = "#2c2c2e"
tooltip_foreground = "#ffffff"
popover = "#ffffff"
popover_foreground = "#1d1d1f"

button = "#e8e8ed"
button_foreground = "#1d1d1f"
input = "#ffffff"
input_foreground = "#1d1d1f"
disabled = "#c7c7cc"
separator = "#d5d5d5"
alternate_row = "#f5f5fa"

[light.fonts]
family = "SF Pro"
size = 13.0
mono_family = "SF Mono"
mono_size = 13.0

[light.geometry]
radius = 6.0
radius_lg = 10.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.2
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 10.0
l = 16.0
xl = 20.0
xxl = 32.0

[light.widget_metrics.button]
min_height = 22.0
padding_horizontal = 12.0

[light.widget_metrics.checkbox]
indicator_size = 14.0
spacing = 4.0

[light.widget_metrics.input]
min_height = 22.0
padding_horizontal = 4.0

[light.widget_metrics.scrollbar]
width = 15.0
slider_width = 7.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 21.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 24.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 22.0
padding_horizontal = 12.0

[light.widget_metrics.tooltip]
padding = 4.0

[light.widget_metrics.list_item]
height = 24.0
padding_horizontal = 4.0

[light.widget_metrics.toolbar]
height = 38.0
item_spacing = 8.0

[light.widget_metrics.splitter]
width = 9.0

