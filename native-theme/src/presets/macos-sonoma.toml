# macOS Sonoma theme
# Source: Apple Human Interface Guidelines, NSColor system colors
name = "macOS Sonoma"

# === Light variant ===

[light]
icon_set = "sf-symbols"
icon_theme = "sf-symbols"

[light.defaults]
accent_color = "#007aff"
background_color = "#f0f0f0"
text_color = "#1d1d1f"
surface_color = "#ffffff"
muted_color = "#86868b"
shadow_color = "#00000018"

danger_color = "#ff3b30"
danger_text_color = "#ffffff"
warning_color = "#ff9500"
warning_text_color = "#1d1d1f"
success_color = "#34c759"
success_text_color = "#ffffff"
info_color = "#007aff"
info_text_color = "#ffffff"

selection_background = "#007aff"
selection_text_color = "#ffffff"
link_color = "#007aff"
focus_ring_color = "#007aff"
disabled_text_color = "#c7c7cc"
accent_text_color = "#ffffff"

disabled_opacity = 0.3
line_height = 1.19
focus_ring_width = 3.0
focus_ring_offset = -1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#d5d5d5"
corner_radius = 5.0
corner_radius_lg = 10.0
line_width = 0.5
opacity = 0.2
shadow_enabled = true
[light.defaults.font]
family = "SF Pro"
size = 13.0
weight = 400

[light.defaults.mono_font]
family = "SF Mono"
size = 13.0
weight = 400

[light.defaults.icon_sizes]
# toolbar icon_sizes = 24 matches the small toolbar icon mode. Large mode uses 32.
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.button]
background_color = "#e8e8ed"
min_width = 64.0
min_height = 22.0
icon_text_gap = 4.0


[light.button.border]
padding_horizontal = 8.0
padding_vertical = 3.0

[light.button.font]
color = "#1d1d1f"
[light.input]
background_color = "#ffffff"
min_height = 22.0


[light.input.border]
padding_horizontal = 4.0
padding_vertical = 3.0

[light.input.font]
color = "#1d1d1f"
[light.checkbox]
indicator_width = 14.0
label_gap = 4.0

[light.tooltip]
background_color = "#2c2c2e"
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 4.0
padding_vertical = 4.0

[light.tooltip.font]
color = "#ffffff"
[light.scrollbar]
groove_width = 16.0
thumb_width = 7.0
overlay_mode = true
min_thumb_length = 40.0

[light.slider]
track_height = 5.0
thumb_diameter = 21.0
tick_mark_length = 8.0

[light.progress_bar]
track_height = 6.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 24.0


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.menu]
row_height = 22.0
icon_text_gap = 4.0


[light.menu.border]
padding_horizontal = 12.0
padding_vertical = 3.0
[light.list]
alternate_row_background = "#f5f5fa"
row_height = 24.0


[light.list.border]
padding_horizontal = 4.0
padding_vertical = 4.0
[light.toolbar]
bar_height = 38.0
item_gap = 8.0

[light.sidebar]
background_color = "#e8e8ed"


[light.sidebar.font]
color = "#1d1d1f"
[light.popover]
background_color = "#ffffff"


[light.popover.font]
color = "#1d1d1f"
[light.separator]
line_color = "#d5d5d5"

[light.splitter]
divider_width = 6.0

[light.switch]
unchecked_background = "#d5d5d5"
thumb_background = "#ffffff"
track_width = 38.0
track_height = 22.0
thumb_diameter = 18.0
track_radius = 11.0

[light.dialog]
button_order = "primary_right"
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 12.0
icon_size = 64.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#007aff18"

[light.spinner]
diameter = 32.0
min_diameter = 10.0
stroke_width = 2.0

[light.combo_box]
min_height = 21.0
min_width = 120.0
arrow_icon_size = 17.0
arrow_area_width = 17.0


[light.combo_box.border]
padding_horizontal = 9.0
[light.segmented_control]
segment_height = 24.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 9.0
[light.card]

[light.expander]
header_height = 40.0
arrow_icon_size = 13.0

[light.text_scale.caption]
size = 10.0

[light.text_scale.section_heading]
weight = 700

[light.text_scale.dialog_title]
size = 22.0

[light.text_scale.display]
size = 26.0

[light.window.title_bar_font]
weight = 700

