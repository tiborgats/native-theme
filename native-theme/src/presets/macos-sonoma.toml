# macOS Sonoma theme
# Source: Apple Human Interface Guidelines, NSColor system colors
name = "macOS Sonoma"
icon_set = "sf-symbols"
icon_theme = "sf-symbols"

# === Light variant ===

[light.defaults]
accent_color = "#007aff"
background_color = "#f0f0f0"
text_color = "#1d1d1f"
surface_color = "#ffffff"
muted_color = "#86868b"
shadow_color = "#00000018"

danger_color = "#ff3b30"
danger_text_color = "#ffffff"
warning_color = "#ff9500"
warning_text_color = "#1d1d1f"
success_color = "#34c759"
success_text_color = "#ffffff"
info_color = "#007aff"
info_text_color = "#ffffff"

selection_background = "#007aff"
selection_text_color = "#ffffff"
link_color = "#007aff"
focus_ring_color = "#007aff"
disabled_text_color = "#c7c7cc"
accent_text_color = "#ffffff"

disabled_opacity = 0.3
line_height = 1.19
focus_ring_width_px = 3.0
focus_ring_offset_px = -1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#d5d5d5"
corner_radius_px = 5.0
corner_radius_lg_px = 10.0
line_width_px = 0.5
opacity = 0.2
shadow_enabled = true
[light.defaults.font]
family = "SF Pro"
size_pt =13.0
weight = 400

[light.defaults.mono_font]
family = "SF Mono"
size_pt =13.0
weight = 400

[light.defaults.icon_sizes]
# toolbar icon_sizes = 24 matches the small toolbar icon mode. Large mode uses 32.
toolbar_px = 24.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.button]
background_color = "#e8e8ed"
min_width_px = 64.0
min_height_px = 22.0
icon_text_gap_px = 4.0
# Interactive state colors (platform-facts.md section 2.3 macOS)
hover_background = "#e0e0e5"
hover_text_color = "#1d1d1f"
active_text_color = "#1d1d1f"
disabled_text_color = "#c7c7cc"
# soft_option: CoreUI pressed highlight -- slightly darker than hover
active_background = "#d6d6db"
# soft_option: disabled control bg -- bg with reduced alpha
disabled_background = "#e8e8ed80"


[light.button.border]
padding_horizontal_px = 8.0
padding_vertical_px = 3.0

[light.button.font]
color = "#1d1d1f"
[light.input]
background_color = "#ffffff"
min_height_px = 22.0
# Interactive state colors (platform-facts.md section 2.4 macOS)
disabled_text_color = "#c7c7cc"
# soft_option: NSTextField hover ring -- accent-derived border
hover_border_color = "#007aff80"
# soft_option: accent-derived focus ring border
focus_border_color = "#007aff"
# soft_option: disabled text field bg -- surface with reduced alpha
disabled_background = "#ffffff80"


[light.input.border]
padding_horizontal_px = 4.0
padding_vertical_px = 3.0

[light.input.font]
color = "#1d1d1f"
[light.checkbox]
indicator_width_px = 14.0
label_gap_px = 4.0
# Interactive state colors (platform-facts.md section 2.5 macOS)
disabled_text_color = "#c7c7cc"
# soft_option: checkbox hover state -- subtle highlight
hover_background = "#e0e0e5"
# soft_option: disabled checkbox bg -- reduced alpha
disabled_background = "#e8e8ed80"
# soft_option: unchecked indicator fill = controlBackgroundColor (white)
unchecked_background = "#ffffff"
# soft_option: unchecked border = controlColor (measured gray outline)
unchecked_border_color = "#86868b"

[light.tooltip]
background_color = "#2c2c2e"
max_width_px = 300.0


[light.tooltip.border]
padding_horizontal_px = 4.0
padding_vertical_px = 4.0

[light.tooltip.font]
color = "#ffffff"
[light.scrollbar]
groove_width_px = 16.0
thumb_width_px = 7.0
overlay_mode = true
min_thumb_length_px = 40.0
# Interactive state colors (platform-facts.md section 2.8 macOS)
# measured Sonoma scrollbar thumb hover -- NOT defaults.muted_color
thumb_hover_color = "#60606080"
# soft_option: pressed scrollbar thumb -- darker than hover
thumb_active_color = "#50505090"

[light.slider]
track_height_px = 5.0
thumb_diameter_px = 21.0
tick_mark_length_px = 8.0
# soft_option interactive state colors (platform-facts.md section 2.9 macOS)
# slider knob hover -- slightly darker surface
thumb_hover_color = "#e0e0e0"
# disabled slider fill -- accent at reduced opacity
disabled_fill_color = "#007aff50"
# disabled slider track -- muted at reduced opacity
disabled_track_color = "#86868b50"
# disabled slider knob -- surface at reduced opacity
disabled_thumb_color = "#ffffff80"

[light.progress_bar]
track_height_px = 6.0
min_width_px = 100.0

[light.tab]
min_width_px = 64.0
min_height_px = 24.0
# Interactive state colors (platform-facts.md section 2.11 macOS)
active_background = "#f0f0f0"
active_text_color = "#1d1d1f"
hover_text_color = "#1d1d1f"
# soft_option: tab hover state -- subtle bg shift
hover_background = "#e8e8ed"


[light.tab.border]
padding_horizontal_px = 12.0
padding_vertical_px = 4.0
[light.menu]
row_height_px = 22.0
icon_text_gap_px = 4.0
# Interactive state colors (platform-facts.md section 2.6 macOS)
# selectedContentBackgroundColor = accent color
hover_background = "#007aff"
# selectedMenuItemTextColor = white
hover_text_color = "#ffffff"
disabled_text_color = "#c7c7cc"


[light.menu.border]
padding_horizontal_px = 12.0
padding_vertical_px = 3.0
[light.list]
alternate_row_background = "#f5f5fa"
row_height_px = 24.0
# Interactive state colors (platform-facts.md section 2.15 macOS)
# selectedContentBackgroundColor at reduced opacity
hover_background = "#007aff18"
hover_text_color = "#1d1d1f"
disabled_text_color = "#c7c7cc"


[light.list.border]
padding_horizontal_px = 4.0
padding_vertical_px = 4.0
[light.toolbar]
bar_height_px = 38.0
item_gap_px = 8.0

[light.sidebar]
background_color = "#e8e8ed"
# Interactive state colors (platform-facts.md section 2.12 macOS)
# selectedContentBackgroundColor at reduced opacity
hover_background = "#007aff18"


[light.sidebar.font]
color = "#1d1d1f"
[light.popover]
background_color = "#ffffff"


[light.popover.font]
color = "#1d1d1f"
[light.separator]
line_color = "#d5d5d5"

[light.splitter]
divider_width_px = 6.0
# Interactive state colors (platform-facts.md section 2.17 macOS)
# splitter.divider_color = separatorColor = border.color
hover_color = "#d5d5d5"

[light.switch]
unchecked_background = "#d5d5d5"
thumb_background = "#ffffff"
track_width_px = 38.0
track_height_px = 22.0
thumb_diameter_px = 18.0
track_radius_px = 11.0
# soft_option interactive state colors (macOS NSSwitch)
# NSSwitch hover checked -- slightly brighter accent
hover_checked_background = "#1a8aff"
# NSSwitch hover unchecked -- slightly darker trough
hover_unchecked_background = "#c8c8cd"
# NSSwitch disabled checked -- accent at disabled_opacity
disabled_checked_background = "#007aff50"
# NSSwitch disabled unchecked -- trough at disabled_opacity
disabled_unchecked_background = "#d5d5d550"
# NSSwitch disabled thumb -- white at reduced opacity
disabled_thumb_color = "#ffffff80"

[light.dialog]
button_order = "primary_right"
min_width_px = 320.0
max_width_px = 560.0
min_height_px = 140.0
max_height_px = 600.0
button_gap_px = 12.0
icon_size_px =64.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#007aff18"
# Interactive state colors (platform-facts.md section 2.28 macOS)
hover_text_color = "#007aff"
active_text_color = "#007aff"
disabled_text_color = "#c7c7cc"

[light.spinner]
diameter_px = 32.0
min_diameter_px = 10.0
stroke_width_px = 2.0

[light.combo_box]
min_height_px = 21.0
min_width_px = 120.0
arrow_icon_size_px =17.0
arrow_area_width_px = 17.0
# Interactive state colors (platform-facts.md section 2.24 macOS)
disabled_text_color = "#c7c7cc"
# soft_option: NSPopUpButton hover -- subtle highlight
hover_background = "#e0e0e5"
# soft_option: NSPopUpButton disabled -- reduced alpha bg
disabled_background = "#e8e8ed80"


[light.combo_box.border]
padding_horizontal_px = 9.0
[light.segmented_control]
segment_height_px = 24.0
separator_width_px = 1.0
# Interactive state colors (platform-facts.md section 2.25 macOS)
# selectedContentBackgroundColor
active_background = "#007aff"
# alternateSelectedControlTextColor
active_text_color = "#ffffff"
# soft_option: NSSegmentedControl hover -- subtle highlight
hover_background = "#e0e0e5"


[light.segmented_control.border]
padding_horizontal_px = 9.0
[light.card]

[light.expander]
header_height_px = 40.0
arrow_icon_size_px =13.0
# soft_option interactive state colors (macOS disclosure)
# disclosure hover -- subtle highlight
hover_background = "#e0e0e5"
# NSDisclosureButton triangle color -- secondary label color
arrow_color = "#86868b"

[light.window]
# Interactive state colors (platform-facts.md section 2.2 macOS)
# macOS uses system-managed dimming for inactive windows -- same as active title bar
inactive_title_bar_background = "#ffffff"
inactive_title_bar_text_color = "#1d1d1f"

[light.window.title_bar_font]
weight = 700

[light.text_scale.caption]
size_pt =10.0

[light.text_scale.section_heading]
weight = 700

[light.text_scale.dialog_title]
size_pt =22.0

[light.text_scale.display]
size_pt =26.0

