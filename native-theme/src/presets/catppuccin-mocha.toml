# Catppuccin Mocha - darkest flavor of the Catppuccin palette
# Source: https://catppuccin.com/palette/
name = "Catppuccin Mocha"

# === Light variant (derived - Latte base with Mocha accents) ===

[light.colors]
accent = "#89b4fa"
background = "#eff1f5"
foreground = "#4c4f69"
surface = "#e6e9ef"
border = "#bcc0cc"
muted = "#6c6f85"
shadow = "#00000018"

primary_background = "#89b4fa"
primary_foreground = "#ffffff"

secondary_background = "#ccd0da"
secondary_foreground = "#4c4f69"

danger = "#f38ba8"
danger_foreground = "#4c4f69"
warning = "#f9e2af"
warning_foreground = "#4c4f69"
success = "#a6e3a1"
success_foreground = "#4c4f69"
info = "#89dceb"
info_foreground = "#4c4f69"

selection = "#89b4fa"
selection_foreground = "#ffffff"
link = "#89b4fa"
focus_ring = "#89b4fa"

sidebar = "#e6e9ef"
sidebar_foreground = "#4c4f69"
tooltip = "#4c4f69"
tooltip_foreground = "#eff1f5"
popover = "#e6e9ef"
popover_foreground = "#4c4f69"

button = "#e6e9ef"
button_foreground = "#4c4f69"
input = "#eff1f5"
input_foreground = "#4c4f69"
disabled = "#bcc0cc"
separator = "#bcc0cc"
alternate_row = "#e6e9ef"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.widget_metrics.button]
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.widget_metrics.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.widget_metrics.input]
min_height = 32.0
padding_horizontal = 8.0

[light.widget_metrics.scrollbar]
width = 14.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 20.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.tooltip]
padding = 6.0

[light.widget_metrics.list_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.toolbar]
height = 40.0
item_spacing = 6.0

[light.widget_metrics.splitter]
width = 4.0

