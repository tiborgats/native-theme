# Catppuccin Mocha - darkest flavor of the Catppuccin palette
# Source: https://catppuccin.com/palette/
name = "Catppuccin Mocha"

# === Light variant (derived - Latte base with Mocha accents) ===

[light.defaults]
accent = "#89b4fa"
background = "#eff1f5"
foreground = "#4c4f69"
surface = "#e6e9ef"
border = "#bcc0cc"
muted = "#6c6f85"
shadow = "#00000018"

danger = "#f38ba8"
danger_foreground = "#4c4f69"
warning = "#f9e2af"
warning_foreground = "#4c4f69"
success = "#a6e3a1"
success_foreground = "#4c4f69"
info = "#89dceb"
info_foreground = "#4c4f69"

selection = "#89b4fa"
selection_foreground = "#ffffff"
link = "#89b4fa"
focus_ring_color = "#89b4fa"
disabled_foreground = "#bcc0cc"

radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#e6e9ef"
foreground = "#4c4f69"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#eff1f5"
foreground = "#4c4f69"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#4c4f69"
foreground = "#eff1f5"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#e6e9ef"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#e6e9ef"
foreground = "#4c4f69"

[light.popover]
background = "#e6e9ef"
foreground = "#4c4f69"

[light.separator]
color = "#bcc0cc"

[light.splitter]
width = 4.0

