# Nord - arctic, north-bluish color palette
# Source: https://www.nordtheme.com/docs/colors-and-palettes/
name = "Nord"

# === Light variant (Snow Storm backgrounds + Frost/Aurora accents) ===

[light.defaults]
accent = "#5e81ac"
background = "#eceff4"
foreground = "#2e3440"
surface = "#e5e9f0"
border = "#d8dee9"
muted = "#4c566a"
shadow = "#00000018"

danger = "#bf616a"
danger_foreground = "#ffffff"
warning = "#ebcb8b"
warning_foreground = "#2e3440"
success = "#a3be8c"
success_foreground = "#2e3440"
info = "#88c0d0"
info_foreground = "#2e3440"

selection = "#5e81ac"
selection_foreground = "#ffffff"
link = "#5e81ac"
focus_ring_color = "#5e81ac"
disabled_foreground = "#d8dee9"

radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#e5e9f0"
foreground = "#2e3440"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#eceff4"
foreground = "#2e3440"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#2e3440"
foreground = "#eceff4"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#e5e9f0"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#e5e9f0"
foreground = "#2e3440"

[light.popover]
background = "#e5e9f0"
foreground = "#2e3440"

[light.separator]
color = "#d8dee9"

[light.splitter]
width = 4.0

