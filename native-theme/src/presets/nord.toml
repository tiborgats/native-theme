# Nord - arctic, north-bluish color palette
# Source: https://www.nordtheme.com/docs/colors-and-palettes/
name = "Nord"

# === Light variant (Snow Storm backgrounds + Frost/Aurora accents) ===

[light.colors]
accent = "#5e81ac"
background = "#eceff4"
foreground = "#2e3440"
surface = "#e5e9f0"
border = "#d8dee9"
muted = "#4c566a"
shadow = "#00000018"

primary_background = "#5e81ac"
primary_foreground = "#ffffff"

secondary_background = "#d8dee9"
secondary_foreground = "#2e3440"

danger = "#bf616a"
danger_foreground = "#ffffff"
warning = "#ebcb8b"
warning_foreground = "#2e3440"
success = "#a3be8c"
success_foreground = "#2e3440"
info = "#88c0d0"
info_foreground = "#2e3440"

selection = "#5e81ac"
selection_foreground = "#ffffff"
link = "#5e81ac"
focus_ring = "#5e81ac"

sidebar = "#e5e9f0"
sidebar_foreground = "#2e3440"
tooltip = "#2e3440"
tooltip_foreground = "#eceff4"
popover = "#e5e9f0"
popover_foreground = "#2e3440"

button = "#e5e9f0"
button_foreground = "#2e3440"
input = "#eceff4"
input_foreground = "#2e3440"
disabled = "#d8dee9"
separator = "#d8dee9"
alternate_row = "#e5e9f0"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

