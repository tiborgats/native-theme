# Catppuccin Latte - lightest flavor of the Catppuccin palette
# Source: https://catppuccin.com/palette/
name = "Catppuccin Latte"

# === Light variant (Latte palette - primary) ===

[light.colors.core]
accent = "#1e66f5"
background = "#eff1f5"
foreground = "#4c4f69"
surface = "#e6e9ef"
border = "#bcc0cc"
muted = "#6c6f85"
shadow = "#00000018"

[light.colors.primary]
background = "#1e66f5"
foreground = "#ffffff"

[light.colors.secondary]
background = "#ccd0da"
foreground = "#4c4f69"

[light.colors.status]
danger = "#d20f39"
danger_foreground = "#ffffff"
warning = "#df8e1d"
warning_foreground = "#4c4f69"
success = "#40a02b"
success_foreground = "#ffffff"
info = "#04a5e5"
info_foreground = "#ffffff"

[light.colors.interactive]
selection = "#1e66f5"
selection_foreground = "#ffffff"
link = "#1e66f5"
focus_ring = "#1e66f5"

[light.colors.panel]
sidebar = "#e6e9ef"
sidebar_foreground = "#4c4f69"
tooltip = "#4c4f69"
tooltip_foreground = "#eff1f5"
popover = "#e6e9ef"
popover_foreground = "#4c4f69"

[light.colors.component]
button = "#e6e9ef"
button_foreground = "#4c4f69"
input = "#eff1f5"
input_foreground = "#4c4f69"
disabled = "#bcc0cc"
separator = "#bcc0cc"
alternate_row = "#e6e9ef"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

# === Dark variant (derived - Frappe palette) ===

[dark.colors.core]
accent = "#8caaee"
background = "#303446"
foreground = "#c6d0f5"
surface = "#292c3c"
border = "#51576d"
muted = "#a5adce"
shadow = "#00000040"

[dark.colors.primary]
background = "#8caaee"
foreground = "#303446"

[dark.colors.secondary]
background = "#414559"
foreground = "#c6d0f5"

