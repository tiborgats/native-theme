success = "#a6d189"
success_foreground = "#303446"
info = "#99d1db"
info_foreground = "#303446"

[dark.colors.interactive]
selection = "#8caaee"
selection_foreground = "#303446"
link = "#8caaee"
focus_ring = "#8caaee"

[dark.colors.panel]
sidebar = "#292c3c"
sidebar_foreground = "#c6d0f5"
tooltip = "#232634"
tooltip_foreground = "#c6d0f5"
popover = "#414559"
popover_foreground = "#c6d0f5"

[dark.colors.component]
button = "#414559"
button_foreground = "#c6d0f5"
input = "#292c3c"
input_foreground = "#c6d0f5"
disabled = "#51576d"
separator = "#51576d"
alternate_row = "#292c3c"

[dark.fonts]
