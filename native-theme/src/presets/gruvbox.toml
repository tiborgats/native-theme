# Gruvbox - retro groove color scheme
# Source: https://github.com/morhetz/gruvbox
name = "Gruvbox"

# === Light variant (Gruvbox Light medium contrast) ===

[light]
icon_set = "lucide"
icon_theme = "lucide"

[light.defaults]
accent_color = "#076678"
background_color = "#fbf1c7"
text_color = "#3c3836"
surface_color = "#ebdbb2"
muted_color = "#7c6f64"
shadow_color = "#00000018"

danger_color = "#9d0006"
danger_text_color = "#fbf1c7"
warning_color = "#b57614"
warning_text_color = "#3c3836"
success_color = "#79740e"
success_text_color = "#fbf1c7"
info_color = "#076678"
info_text_color = "#fbf1c7"

selection_background = "#076678"
selection_text_color = "#fbf1c7"
link_color = "#076678"
focus_ring_color = "#076678"
disabled_text_color = "#d5c4a1"
accent_text_color = "#fbf1c7"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#d5c4a1"
corner_radius = 8.0
corner_radius_lg = 12.0
line_width = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Inter"
size = 14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size = 14.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.button]
background_color = "#ebdbb2"
min_width = 64.0
min_height = 32.0
icon_text_gap = 6.0


[light.button.border]
padding_horizontal = 12.0
padding_vertical = 6.0

[light.button.font]
color = "#3c3836"
[light.input]
background_color = "#fbf1c7"
min_height = 32.0


[light.input.border]
padding_horizontal = 8.0
padding_vertical = 6.0

[light.input.font]
color = "#3c3836"
[light.checkbox]
indicator_width = 18.0
label_gap = 6.0

[light.tooltip]
background_color = "#3c3836"
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 6.0
padding_vertical = 6.0

[light.tooltip.font]
color = "#fbf1c7"
[light.scrollbar]
groove_width = 14.0
thumb_width = 8.0
overlay_mode = false
min_thumb_length = 30.0

[light.slider]
track_height = 4.0
thumb_diameter = 20.0
tick_mark_length = 4.0

[light.progress_bar]
track_height = 6.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 32.0


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.menu]
row_height = 28.0
icon_text_gap = 8.0


[light.menu.border]
padding_horizontal = 8.0
padding_vertical = 4.0
[light.list]
alternate_row_background = "#ebdbb2"
row_height = 28.0


[light.list.border]
padding_horizontal = 8.0
padding_vertical = 2.0
[light.toolbar]
bar_height = 40.0
item_gap = 6.0

[light.sidebar]
background_color = "#ebdbb2"


[light.sidebar.font]
color = "#3c3836"
[light.popover]
background_color = "#ebdbb2"


[light.popover.font]
color = "#3c3836"
[light.separator]
line_color = "#d5c4a1"

[light.splitter]
divider_width = 4.0

[light.switch]
unchecked_background = "#d5c4a1"
thumb_background = "#fbf1c7"
track_width = 40.0
track_height = 20.0
thumb_diameter = 16.0
track_radius = 10.0

[light.dialog]
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 8.0
icon_size = 32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#07667818"

[light.spinner]
diameter = 24.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 32.0
min_width = 120.0
arrow_icon_size = 12.0
arrow_area_width = 28.0


[light.combo_box.border]
padding_horizontal = 12.0
[light.segmented_control]
segment_height = 28.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]

[light.expander]
header_height = 40.0
arrow_icon_size = 12.0

