# Gruvbox - retro groove color scheme
# Source: https://github.com/morhetz/gruvbox
name = "Gruvbox"

# === Light variant (Gruvbox Light medium contrast) ===

[light.defaults]
accent = "#076678"
background = "#fbf1c7"
foreground = "#3c3836"
surface = "#ebdbb2"
border = "#d5c4a1"
muted = "#7c6f64"
shadow = "#00000018"

danger = "#9d0006"
danger_foreground = "#fbf1c7"
warning = "#b57614"
warning_foreground = "#3c3836"
success = "#79740e"
success_foreground = "#fbf1c7"
info = "#076678"
info_foreground = "#fbf1c7"

selection = "#076678"
selection_foreground = "#fbf1c7"
link = "#076678"
focus_ring_color = "#076678"
disabled_foreground = "#d5c4a1"

radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#ebdbb2"
foreground = "#3c3836"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#fbf1c7"
foreground = "#3c3836"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#3c3836"
foreground = "#fbf1c7"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#ebdbb2"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#ebdbb2"
foreground = "#3c3836"

[light.popover]
background = "#ebdbb2"
foreground = "#3c3836"

[light.separator]
color = "#d5c4a1"

[light.splitter]
width = 4.0

