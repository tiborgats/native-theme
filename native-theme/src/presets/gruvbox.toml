# Gruvbox - retro groove color scheme
# Source: https://github.com/morhetz/gruvbox
name = "Gruvbox"

# === Light variant (Gruvbox Light medium contrast) ===

[light.colors]
accent = "#076678"
background = "#fbf1c7"
foreground = "#3c3836"
surface = "#ebdbb2"
border = "#d5c4a1"
muted = "#7c6f64"
shadow = "#00000018"

primary_background = "#076678"
primary_foreground = "#fbf1c7"

secondary_background = "#ebdbb2"
secondary_foreground = "#3c3836"

danger = "#9d0006"
danger_foreground = "#fbf1c7"
warning = "#b57614"
warning_foreground = "#3c3836"
success = "#79740e"
success_foreground = "#fbf1c7"
info = "#076678"
info_foreground = "#fbf1c7"

selection = "#076678"
selection_foreground = "#fbf1c7"
link = "#076678"
focus_ring = "#076678"

sidebar = "#ebdbb2"
sidebar_foreground = "#3c3836"
tooltip = "#3c3836"
tooltip_foreground = "#fbf1c7"
popover = "#ebdbb2"
popover_foreground = "#3c3836"

button = "#ebdbb2"
button_foreground = "#3c3836"
input = "#fbf1c7"
input_foreground = "#3c3836"
disabled = "#d5c4a1"
separator = "#d5c4a1"
alternate_row = "#ebdbb2"

[light.geometry]
radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.widget_metrics.button]
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.widget_metrics.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.widget_metrics.input]
min_height = 32.0
padding_horizontal = 8.0

[light.widget_metrics.scrollbar]
width = 14.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 20.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.tooltip]
padding = 6.0

[light.widget_metrics.list_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.toolbar]
height = 40.0
item_spacing = 6.0

[light.widget_metrics.splitter]
width = 4.0

