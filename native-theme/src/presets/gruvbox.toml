# Gruvbox - retro groove color scheme
# Source: https://github.com/morhetz/gruvbox
name = "Gruvbox"

# === Light variant (Gruvbox Light medium contrast) ===

[light]
icon_set = "lucide"
icon_theme = "lucide"

[light.defaults]
accent_color = "#076678"
background_color = "#fbf1c7"
text_color = "#3c3836"
surface_color = "#ebdbb2"
muted_color = "#7c6f64"
shadow_color = "#00000018"

danger_color = "#9d0006"
danger_text_color = "#fbf1c7"
warning_color = "#b57614"
warning_text_color = "#3c3836"
success_color = "#79740e"
success_text_color = "#fbf1c7"
info_color = "#076678"
info_text_color = "#fbf1c7"

selection_background = "#076678"
selection_text_color = "#fbf1c7"
link_color = "#076678"
focus_ring_color = "#076678"
disabled_text_color = "#d5c4a1"
accent_text_color = "#fbf1c7"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width_px = 2.0
focus_ring_offset_px = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#d5c4a1"
corner_radius_px = 8.0
corner_radius_lg_px = 12.0
line_width_px = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Inter"
size_px =14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size_px =14.0
weight = 400

[light.defaults.icon_sizes]
toolbar_px = 24.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_px =9.0
weight = 400

[light.text_scale.section_heading]
size_px =11.0
weight = 700

[light.text_scale.dialog_title]
size_px =15.0
weight = 800

[light.text_scale.display]
size_px =20.0
weight = 800

[light.button]
background_color = "#ebdbb2"
hover_background = "#d8c9a3"
active_background = "#c7ba97"
disabled_background = "#f1e5c9"
hover_text_color = "#3c3836"
active_text_color = "#3c3836"
disabled_text_color = "#d5c4a1"
min_width_px = 64.0
min_height_px = 32.0
icon_text_gap_px = 6.0


[light.button.border]
padding_horizontal_px = 12.0
padding_vertical_px = 6.0

[light.button.font]
color = "#3c3836"
[light.input]
background_color = "#fbf1c7"
hover_border_color = "#076678"
focus_border_color = "#076678"
disabled_background = "#fcf5d7"
disabled_text_color = "#d5c4a1"
min_height_px = 32.0


[light.input.border]
padding_horizontal_px = 8.0
padding_vertical_px = 6.0

[light.input.font]
color = "#3c3836"
[light.checkbox]
hover_background = "#dccda7"
disabled_background = "#f1e5c9"
disabled_text_color = "#d5c4a1"
unchecked_background = "#ebdbb2"
unchecked_border_color = "#d5c4a1"
indicator_width_px = 18.0
label_gap_px = 6.0

[light.tooltip]
background_color = "#3c3836"
max_width_px = 300.0


[light.tooltip.border]
padding_horizontal_px = 6.0
padding_vertical_px = 6.0

[light.tooltip.font]
color = "#fbf1c7"
[light.scrollbar]
thumb_hover_color = "#b5a68b"
thumb_active_color = "#a89982"
groove_width_px = 14.0
thumb_width_px = 8.0
overlay_mode = false
min_thumb_length_px = 30.0

[light.slider]
thumb_hover_color = "#d3c5a0"
disabled_fill_color = "#295861"
disabled_track_color = "#bdb7b1"
disabled_thumb_color = "#efe2c1"
track_height_px = 4.0
thumb_diameter_px = 20.0
tick_mark_length_px = 4.0

[light.progress_bar]
track_height_px = 6.0
min_width_px = 100.0

[light.tab]
active_background = "#fbf1c7"
active_text_color = "#3c3836"
hover_background = "#eee4bd"
hover_text_color = "#3c3836"
min_width_px = 64.0
min_height_px = 32.0


[light.tab.border]
padding_horizontal_px = 12.0
padding_vertical_px = 4.0
[light.menu]
hover_background = "#076678"
hover_text_color = "#fbf1c7"
disabled_text_color = "#d5c4a1"
row_height_px = 28.0
icon_text_gap_px = 8.0


[light.menu.border]
padding_horizontal_px = 8.0
padding_vertical_px = 4.0
[light.list]
alternate_row_background = "#ebdbb2"
hover_background = "#eee4bd"
hover_text_color = "#3c3836"
disabled_text_color = "#d5c4a1"
row_height_px = 28.0


[light.list.border]
padding_horizontal_px = 8.0
padding_vertical_px = 2.0
[light.toolbar]
bar_height_px = 40.0
item_gap_px = 6.0

[light.sidebar]
background_color = "#ebdbb2"
hover_background = "#dccda7"


[light.sidebar.font]
color = "#3c3836"
[light.popover]
background_color = "#ebdbb2"


[light.popover.font]
color = "#3c3836"
[light.separator]
line_color = "#d5c4a1"

[light.splitter]
hover_color = "#b5a688"
divider_width_px = 4.0

[light.switch]
unchecked_background = "#d5c4a1"
thumb_background = "#fbf1c7"
hover_checked_background = "#065b6c"
hover_unchecked_background = "#c3b494"
disabled_checked_background = "#225b66"
disabled_unchecked_background = "#e1d5bd"
disabled_thumb_color = "#fcf5d7"
track_width_px = 40.0
track_height_px = 20.0
thumb_diameter_px = 16.0
track_radius_px = 10.0

[light.dialog]
min_width_px = 320.0
max_width_px = 560.0
min_height_px = 140.0
max_height_px = 600.0
button_gap_px = 8.0
icon_size_px =32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#07667818"
hover_text_color = "#076678"
active_text_color = "#076678"
disabled_text_color = "#d5c4a1"

[light.spinner]
diameter_px = 24.0
min_diameter_px = 16.0
stroke_width_px = 2.0

[light.combo_box]
hover_background = "#eee4bd"
disabled_background = "#fcf5d7"
disabled_text_color = "#d5c4a1"
min_height_px = 32.0
min_width_px = 120.0
arrow_icon_size_px =12.0
arrow_area_width_px = 28.0


[light.combo_box.border]
padding_horizontal_px = 12.0
[light.segmented_control]
active_background = "#076678"
active_text_color = "#fbf1c7"
hover_background = "#ebe2bb"
segment_height_px = 28.0
separator_width_px = 1.0


[light.segmented_control.border]
padding_horizontal_px = 12.0
[light.card]

[light.expander]
hover_background = "#eee4bd"
arrow_color = "#7c6f64"
header_height_px = 40.0
arrow_icon_size_px =12.0

[light.window]
inactive_title_bar_background = "#ebdbb2"
inactive_title_bar_text_color = "#3c3836"

