# One Dark - Atom editor's iconic dark theme
# Source: https://github.com/atom/one-dark-syntax
name = "One Dark"

# === Light variant (One Light) ===

[light.colors]
accent = "#4078f2"
background = "#fafafa"
foreground = "#383a42"
surface = "#f0f0f0"
border = "#e0e0e0"
muted = "#a0a1a7"
shadow = "#00000018"

primary_background = "#4078f2"
primary_foreground = "#ffffff"

secondary_background = "#f0f0f0"
secondary_foreground = "#383a42"

danger = "#e45649"
danger_foreground = "#ffffff"
warning = "#c18401"
warning_foreground = "#383a42"
success = "#50a14f"
success_foreground = "#ffffff"
info = "#0184bc"
info_foreground = "#ffffff"

selection = "#4078f2"
selection_foreground = "#ffffff"
link = "#4078f2"
focus_ring = "#4078f2"

sidebar = "#f0f0f0"
sidebar_foreground = "#383a42"
tooltip = "#383a42"
tooltip_foreground = "#fafafa"
popover = "#f0f0f0"
popover_foreground = "#383a42"

button = "#f0f0f0"
button_foreground = "#383a42"
input = "#fafafa"
input_foreground = "#383a42"
disabled = "#e0e0e0"
separator = "#e0e0e0"
alternate_row = "#f0f0f0"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.widget_metrics.button]
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.widget_metrics.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.widget_metrics.input]
min_height = 32.0
padding_horizontal = 8.0

[light.widget_metrics.scrollbar]
width = 14.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 4.0
thumb_size = 20.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.tooltip]
padding = 6.0

[light.widget_metrics.list_item]
height = 28.0
padding_horizontal = 8.0

[light.widget_metrics.toolbar]
height = 40.0
item_spacing = 6.0

[light.widget_metrics.splitter]
width = 4.0

