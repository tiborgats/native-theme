# One Dark - Atom editor's iconic dark theme
# Source: https://github.com/atom/one-dark-syntax
name = "One Dark"

# === Light variant (One Light) ===

[light]
icon_set = "lucide"
icon_theme = "lucide"

[light.defaults]
accent_color = "#4078f2"
background_color = "#fafafa"
text_color = "#383a42"
surface_color = "#f0f0f0"
muted_color = "#a0a1a7"
shadow_color = "#00000018"

danger_color = "#e45649"
danger_text_color = "#ffffff"
warning_color = "#c18401"
warning_text_color = "#383a42"
success_color = "#50a14f"
success_text_color = "#ffffff"
info_color = "#0184bc"
info_text_color = "#ffffff"

selection_background = "#4078f2"
selection_text_color = "#ffffff"
link_color = "#4078f2"
focus_ring_color = "#4078f2"
disabled_text_color = "#e0e0e0"
accent_text_color = "#ffffff"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#e0e0e0"
corner_radius = 8.0
corner_radius_lg = 12.0
line_width = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Inter"
size_px =14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size_px =14.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size_px =9.0
weight = 400

[light.text_scale.section_heading]
size_px =11.0
weight = 700

[light.text_scale.dialog_title]
size_px =15.0
weight = 800

[light.text_scale.display]
size_px =20.0
weight = 800

[light.button]
background_color = "#f0f0f0"
hover_background = "#dcdcdc"
active_background = "#cccccc"
disabled_background = "#f4f4f4"
hover_text_color = "#383a42"
active_text_color = "#383a42"
disabled_text_color = "#e0e0e0"
min_width = 64.0
min_height = 32.0
icon_text_gap = 6.0


[light.button.border]
padding_horizontal = 12.0
padding_vertical = 6.0

[light.button.font]
color = "#383a42"
[light.input]
background_color = "#fafafa"
hover_border_color = "#4078f2"
focus_border_color = "#4078f2"
disabled_background = "#fbfbfb"
disabled_text_color = "#e0e0e0"
min_height = 32.0


[light.input.border]
padding_horizontal = 8.0
padding_vertical = 6.0

[light.input.font]
color = "#383a42"
[light.checkbox]
hover_background = "#e1e1e1"
disabled_background = "#f4f4f4"
disabled_text_color = "#e0e0e0"
unchecked_background = "#f0f0f0"
unchecked_border_color = "#e0e0e0"
indicator_width = 18.0
label_gap = 6.0

[light.tooltip]
background_color = "#383a42"
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 6.0
padding_vertical = 6.0

[light.tooltip.font]
color = "#fafafa"
[light.scrollbar]
thumb_hover_color = "#c9c9cc"
thumb_active_color = "#c0c0c3"
groove_width = 14.0
thumb_width = 8.0
overlay_mode = false
min_thumb_length = 30.0

[light.slider]
thumb_hover_color = "#d8d8d8"
disabled_fill_color = "#5a76b3"
disabled_track_color = "#cfd0d3"
disabled_thumb_color = "#f3f3f3"
track_height = 4.0
thumb_diameter = 20.0
tick_mark_length = 4.0

[light.progress_bar]
track_height = 6.0
min_width = 100.0

[light.tab]
active_background = "#fafafa"
active_text_color = "#383a42"
hover_background = "#ededed"
hover_text_color = "#383a42"
min_width = 64.0
min_height = 32.0


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.menu]
hover_background = "#4078f2"
hover_text_color = "#ffffff"
disabled_text_color = "#e0e0e0"
row_height = 28.0
icon_text_gap = 8.0


[light.menu.border]
padding_horizontal = 8.0
padding_vertical = 4.0
[light.list]
alternate_row_background = "#f0f0f0"
hover_background = "#ededed"
hover_text_color = "#383a42"
disabled_text_color = "#e0e0e0"
row_height = 28.0


[light.list.border]
padding_horizontal = 8.0
padding_vertical = 2.0
[light.toolbar]
bar_height = 40.0
item_gap = 6.0

[light.sidebar]
background_color = "#f0f0f0"
hover_background = "#e1e1e1"


[light.sidebar.font]
color = "#383a42"
[light.popover]
background_color = "#f0f0f0"


[light.popover.font]
color = "#383a42"
[light.separator]
line_color = "#e0e0e0"

[light.splitter]
hover_color = "#bebebe"
divider_width = 4.0

[light.switch]
unchecked_background = "#e0e0e0"
thumb_background = "#fafafa"
hover_checked_background = "#396cd9"
hover_unchecked_background = "#cecece"
disabled_checked_background = "#5476bf"
disabled_unchecked_background = "#e9e9e9"
disabled_thumb_color = "#fbfbfb"
track_width = 40.0
track_height = 20.0
thumb_diameter = 16.0
track_radius = 10.0

[light.dialog]
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 8.0
icon_size =32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#4078f218"
hover_text_color = "#4078f2"
active_text_color = "#4078f2"
disabled_text_color = "#e0e0e0"

[light.spinner]
diameter = 24.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
hover_background = "#ededed"
disabled_background = "#fbfbfb"
disabled_text_color = "#e0e0e0"
min_height = 32.0
min_width = 120.0
arrow_icon_size =12.0
arrow_area_width = 28.0


[light.combo_box.border]
padding_horizontal = 12.0
[light.segmented_control]
active_background = "#4078f2"
active_text_color = "#ffffff"
hover_background = "#ebebeb"
segment_height = 28.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]

[light.expander]
hover_background = "#ededed"
arrow_color = "#a0a1a7"
header_height = 40.0
arrow_icon_size =12.0

[light.window]
inactive_title_bar_background = "#f0f0f0"
inactive_title_bar_text_color = "#383a42"

