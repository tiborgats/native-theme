# One Dark - Atom editor's iconic dark theme
# Source: https://github.com/atom/one-dark-syntax
name = "One Dark"

# === Light variant (One Light) ===

[light.defaults]
accent = "#4078f2"
background = "#fafafa"
foreground = "#383a42"
surface = "#f0f0f0"
border = "#e0e0e0"
muted = "#a0a1a7"
shadow = "#00000018"

danger = "#e45649"
danger_foreground = "#ffffff"
warning = "#c18401"
warning_foreground = "#383a42"
success = "#50a14f"
success_foreground = "#ffffff"
info = "#0184bc"
info_foreground = "#ffffff"

selection = "#4078f2"
selection_foreground = "#ffffff"
link = "#4078f2"
focus_ring_color = "#4078f2"
disabled_foreground = "#e0e0e0"

radius = 8.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#f0f0f0"
foreground = "#383a42"
min_height = 32.0
padding_horizontal = 12.0
padding_vertical = 6.0

[light.input]
background = "#fafafa"
foreground = "#383a42"
min_height = 32.0
padding_horizontal = 8.0

[light.checkbox]
indicator_size = 18.0
spacing = 6.0

[light.tooltip]
background = "#383a42"
foreground = "#fafafa"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 14.0
slider_width = 8.0

[light.slider]
track_height = 4.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 32.0
padding_horizontal = 12.0

[light.menu]
item_height = 28.0
padding_horizontal = 8.0

[light.list]
alternate_row = "#f0f0f0"
item_height = 28.0
padding_horizontal = 8.0

[light.toolbar]
height = 40.0
item_spacing = 6.0

[light.sidebar]
background = "#f0f0f0"
foreground = "#383a42"

[light.popover]
background = "#f0f0f0"
foreground = "#383a42"

[light.separator]
color = "#e0e0e0"

[light.splitter]
width = 4.0

