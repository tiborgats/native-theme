# One Dark - Atom editor's iconic dark theme
# Source: https://github.com/atom/one-dark-syntax
name = "One Dark"

# === Light variant (One Light) ===

[light.colors.core]
accent = "#4078f2"
background = "#fafafa"
foreground = "#383a42"
surface = "#f0f0f0"
border = "#e0e0e0"
muted = "#a0a1a7"
shadow = "#00000018"

[light.colors.primary]
background = "#4078f2"
foreground = "#ffffff"

[light.colors.secondary]
background = "#f0f0f0"
foreground = "#383a42"

[light.colors.status]
danger = "#e45649"
danger_foreground = "#ffffff"
warning = "#c18401"
warning_foreground = "#383a42"
success = "#50a14f"
success_foreground = "#ffffff"
info = "#0184bc"
info_foreground = "#ffffff"

[light.colors.interactive]
selection = "#4078f2"
selection_foreground = "#ffffff"
link = "#4078f2"
focus_ring = "#4078f2"

[light.colors.panel]
sidebar = "#f0f0f0"
sidebar_foreground = "#383a42"
tooltip = "#383a42"
tooltip_foreground = "#fafafa"
popover = "#f0f0f0"
popover_foreground = "#383a42"

[light.colors.component]
button = "#f0f0f0"
button_foreground = "#383a42"
input = "#fafafa"
input_foreground = "#383a42"
disabled = "#e0e0e0"
separator = "#e0e0e0"
alternate_row = "#f0f0f0"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

# === Dark variant (One Dark) ===

[dark.colors.core]
