# Windows 11 live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "Windows 11"

# === Light variant ===

[light.defaults]
disabled_opacity = 0.3
line_height = 1.43
focus_ring_width = 2.0
focus_ring_offset = 0.0


[light.defaults.border]
corner_radius = 4.0
corner_radius_lg = 8.0
line_width = 1.0
opacity = 0.14
shadow_enabled = true
[light.defaults.icon_sizes]
toolbar = 20.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size = 12.0

[light.text_scale.section_heading]
size = 20.0
weight = 600

[light.text_scale.dialog_title]
size = 28.0
weight = 600

[light.text_scale.display]
size = 68.0
weight = 600

[light.button]
min_width = 64.0
min_height = 32.0
icon_text_gap = 8.0


[light.button.border]
padding_horizontal = 11.0
padding_vertical = 6.0
[light.input]
min_height = 32.0


[light.input.border]
padding_horizontal = 10.0
padding_vertical = 5.0
[light.checkbox]
indicator_width = 20.0
label_gap = 8.0

[light.tooltip]
max_width = 320.0


[light.tooltip.border]
padding_horizontal = 9.0
padding_vertical = 7.0
[light.scrollbar]
groove_width = 17.0
min_thumb_length = 17.0
thumb_width = 6.0
overlay_mode = false

[light.slider]
track_height = 4.0
thumb_diameter = 18.0
tick_mark_length = 4.0

[light.progress_bar]
track_height = 3.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 32.0


[light.tab.border]
padding_horizontal = 8.0
padding_vertical = 3.0
[light.menu]
row_height = 36.0
icon_text_gap = 12.0


[light.menu.border]
padding_horizontal = 11.0
padding_vertical = 8.0
[light.list]
row_height = 40.0


[light.list.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.toolbar]
bar_height = 48.0
item_gap = 0.0

[light.splitter]
divider_width = 1.0

[light.switch]
track_width = 40.0
track_height = 20.0
thumb_diameter = 12.0
track_radius = 10.0

[light.dialog]
button_order = "primary_right"
min_width = 320.0
max_width = 548.0
min_height = 184.0
max_height = 756.0
button_gap = 8.0
icon_size = 32.0

[light.link]
underline_enabled = true

[light.spinner]
diameter = 32.0
min_diameter = 16.0
stroke_width = 4.0

[light.combo_box]
min_height = 32.0
min_width = 64.0
arrow_icon_size = 12.0
arrow_area_width = 38.0


[light.combo_box.border]
padding_horizontal = 12.0
[light.segmented_control]
segment_height = 28.0
separator_width = 1.0


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]

[light.expander]
header_height = 48.0
arrow_icon_size = 12.0

