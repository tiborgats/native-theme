# Windows 11 live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "Windows 11"

# === Light variant ===

[light.defaults]
radius = 4.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.3
border_opacity = 0.14
shadow_enabled = true
line_height = 1.43
focus_ring_width = 2.0
focus_ring_offset = 0.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 8.0
m = 12.0
l = 16.0
xl = 24.0
xxl = 36.0

[light.defaults.icon_sizes]
toolbar = 20.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.button]
min_width = 64.0
min_height = 32.0
padding_horizontal = 11.0
padding_vertical = 6.0
icon_spacing = 8.0

[light.input]
min_height = 32.0
padding_horizontal = 10.0
padding_vertical = 5.0

[light.checkbox]
indicator_size = 20.0
spacing = 8.0

[light.tooltip]
padding_horizontal = 9.0
padding_vertical = 7.0
max_width = 320.0

[light.scrollbar]
width = 17.0
min_thumb_height = 17.0
slider_width = 6.0
overlay_mode = false

[light.slider]
track_height = 4.0
thumb_size = 18.0
tick_length = 4.0

[light.progress_bar]
height = 3.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 32.0
padding_horizontal = 8.0
padding_vertical = 3.0

[light.menu]
item_height = 36.0
padding_horizontal = 11.0
padding_vertical = 8.0
icon_spacing = 12.0

[light.list]
item_height = 40.0
padding_horizontal = 12.0
padding_vertical = 4.0

[light.toolbar]
height = 48.0
item_spacing = 0.0
padding = 4.0

[light.splitter]
width = 1.0

[light.switch]
track_width = 40.0
track_height = 20.0
thumb_size = 12.0
track_radius = 10.0

[light.dialog]
button_order = "trailing_affirmative"
min_width = 320.0
max_width = 548.0
min_height = 184.0
max_height = 756.0
content_padding = 24.0
button_spacing = 8.0
icon_size = 32.0

[light.link]
underline = true

[light.spinner]
diameter = 32.0
min_size = 16.0
stroke_width = 4.0

[light.combo_box]
min_height = 32.0
min_width = 64.0
padding_horizontal = 12.0
arrow_size = 12.0
arrow_area_width = 38.0

[light.segmented_control]
segment_height = 28.0
separator_width = 1.0
padding_horizontal = 12.0

[light.card]
padding = 16.0

[light.expander]
header_height = 48.0
arrow_size = 12.0
content_padding = 16.0

