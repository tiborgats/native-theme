# Windows 11 live preset - geometry/metrics only (no colors, fonts, or icons)
# Used by the OS-first pipeline as merge base; OS reader provides colors/fonts.
name = "Windows 11"

# === Light variant ===

[light.defaults]
disabled_opacity = 0.3
line_height = 1.43
focus_ring_width_px = 2.0
focus_ring_offset_px = 0.0


[light.defaults.border]
corner_radius_px = 4.0
corner_radius_lg_px = 8.0
line_width_px = 1.0
opacity = 0.14
shadow_enabled = true
[light.defaults.icon_sizes]
toolbar_px = 20.0
small_px = 16.0
large_px = 32.0
dialog_px = 22.0
panel_px = 20.0

[light.text_scale.caption]
size_pt =9.0

[light.text_scale.section_heading]
size_pt =15.0
weight = 600

[light.text_scale.dialog_title]
size_pt =21.0
weight = 600

[light.text_scale.display]
size_pt =51.0
weight = 600

[light.button]
min_width_px = 64.0
min_height_px = 32.0
icon_text_gap_px = 8.0


[light.button.border]
padding_horizontal_px = 11.0
padding_vertical_px = 6.0
[light.input]
min_height_px = 32.0


[light.input.border]
padding_horizontal_px = 10.0
padding_vertical_px = 5.0
[light.checkbox]
indicator_width_px = 20.0
label_gap_px = 8.0

[light.tooltip]
max_width_px = 320.0


[light.tooltip.border]
padding_horizontal_px = 9.0
padding_vertical_px = 7.0
[light.scrollbar]
groove_width_px = 17.0
min_thumb_length_px = 17.0
thumb_width_px = 6.0
overlay_mode = false

[light.slider]
track_height_px = 4.0
thumb_diameter_px = 18.0
tick_mark_length_px = 4.0

[light.progress_bar]
track_height_px = 3.0
min_width_px = 100.0

[light.tab]
min_width_px = 64.0
min_height_px = 32.0


[light.tab.border]
padding_horizontal_px = 8.0
padding_vertical_px = 3.0
[light.menu]
row_height_px = 36.0
icon_text_gap_px = 12.0


[light.menu.border]
padding_horizontal_px = 11.0
padding_vertical_px = 8.0
[light.list]
row_height_px = 40.0


[light.list.border]
padding_horizontal_px = 12.0
padding_vertical_px = 4.0
[light.toolbar]
bar_height_px = 48.0
item_gap_px = 0.0

[light.splitter]
divider_width_px = 1.0

[light.switch]
track_width_px = 40.0
track_height_px = 20.0
thumb_diameter_px = 12.0
track_radius_px = 10.0

[light.dialog]
# button_order: provided by platform reader via resolve_platform_defaults
min_width_px = 320.0
max_width_px = 548.0
min_height_px = 184.0
max_height_px = 756.0
button_gap_px = 8.0
icon_size_px =32.0

[light.link]
underline_enabled = true

[light.spinner]
diameter_px = 32.0
min_diameter_px = 16.0
stroke_width_px = 4.0

[light.combo_box]
min_height_px = 32.0
min_width_px = 64.0
arrow_icon_size_px =12.0
arrow_area_width_px = 38.0


[light.combo_box.border]
padding_horizontal_px = 12.0
[light.segmented_control]
segment_height_px = 28.0
separator_width_px = 1.0


[light.segmented_control.border]
padding_horizontal_px = 12.0
[light.card]

[light.expander]
header_height_px = 48.0
arrow_icon_size_px =12.0

