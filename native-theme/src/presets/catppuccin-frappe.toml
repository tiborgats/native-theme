# Catppuccin Frappe - medium-dark flavor of the Catppuccin palette
# Source: https://catppuccin.com/palette/
name = "Catppuccin Frappe"

# === Light variant (derived - Latte base with Frappe accents) ===

[light.colors]
accent = "#8caaee"
background = "#eff1f5"
foreground = "#4c4f69"
surface = "#e6e9ef"
border = "#bcc0cc"
muted = "#6c6f85"
shadow = "#00000018"

primary_background = "#8caaee"
primary_foreground = "#ffffff"

secondary_background = "#ccd0da"
secondary_foreground = "#4c4f69"

danger = "#e78284"
danger_foreground = "#4c4f69"
warning = "#e5c890"
warning_foreground = "#4c4f69"
success = "#a6d189"
success_foreground = "#4c4f69"
info = "#99d1db"
info_foreground = "#4c4f69"

selection = "#8caaee"
selection_foreground = "#ffffff"
link = "#8caaee"
focus_ring = "#8caaee"

sidebar = "#e6e9ef"
sidebar_foreground = "#4c4f69"
tooltip = "#4c4f69"
tooltip_foreground = "#eff1f5"
popover = "#e6e9ef"
popover_foreground = "#4c4f69"

button = "#e6e9ef"
button_foreground = "#4c4f69"
input = "#eff1f5"
input_foreground = "#4c4f69"
disabled = "#bcc0cc"
separator = "#bcc0cc"
alternate_row = "#e6e9ef"

[light.fonts]
family = "sans-serif"
size = 10.0
mono_family = "monospace"
mono_size = 10.0

[light.geometry]
radius = 8.0
radius_lg = 12.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

