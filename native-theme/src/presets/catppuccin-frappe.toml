# Catppuccin Frappe - medium-dark flavor of the Catppuccin palette
# Source: https://catppuccin.com/palette/
name = "Catppuccin Frappe"

# === Light variant (derived - Latte base with Frappe accents) ===

[light]
icon_set = "lucide"
icon_theme = "lucide"

[light.defaults]
accent_color = "#8caaee"
background_color = "#eff1f5"
text_color = "#4c4f69"
surface_color = "#e6e9ef"
muted_color = "#6c6f85"
shadow_color = "#00000018"

danger_color = "#e78284"
danger_text_color = "#4c4f69"
warning_color = "#e5c890"
warning_text_color = "#4c4f69"
success_color = "#a6d189"
success_text_color = "#4c4f69"
info_color = "#99d1db"
info_text_color = "#4c4f69"

selection_background = "#8caaee"
selection_text_color = "#ffffff"
link_color = "#8caaee"
focus_ring_color = "#8caaee"
disabled_text_color = "#bcc0cc"
accent_text_color = "#ffffff"

disabled_opacity = 0.5
line_height = 1.2
focus_ring_width = 2.0
focus_ring_offset = 1.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#bcc0cc"
corner_radius = 8.0
corner_radius_lg = 12.0
line_width = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Inter"
size_px =14.0
weight = 400

[light.defaults.mono_font]
family = "JetBrains Mono"
size_px =14.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 24.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size_px =9.0
weight = 400

[light.text_scale.section_heading]
size_px =11.0
weight = 700

[light.text_scale.dialog_title]
size_px =15.0
weight = 800

[light.text_scale.display]
size_px =20.0
weight = 800

[light.button]
background_color = "#e6e9ef"
min_width = 64.0
min_height = 32.0
icon_text_gap = 6.0
hover_background = "#dce0e8"
hover_text_color = "#4c4f69"
active_background = "#ccd0da"
active_text_color = "#4c4f69"
disabled_background = "#e6e9ef80"
disabled_text_color = "#bcc0cc"


[light.button.border]
padding_horizontal = 12.0
padding_vertical = 6.0

[light.button.font]
color = "#4c4f69"
[light.input]
background_color = "#eff1f5"
min_height = 32.0
hover_border_color = "#8caaee"
focus_border_color = "#8caaee"
disabled_background = "#e6e9ef"
disabled_text_color = "#bcc0cc"


[light.input.border]
padding_horizontal = 8.0
padding_vertical = 6.0

[light.input.font]
color = "#4c4f69"
[light.checkbox]
indicator_width = 18.0
label_gap = 6.0
hover_background = "#dce0e8"
disabled_background = "#e6e9ef80"
disabled_text_color = "#bcc0cc"
unchecked_background = "#eff1f5"
unchecked_border_color = "#acb0be"

[light.tooltip]
background_color = "#4c4f69"
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 6.0
padding_vertical = 6.0

[light.tooltip.font]
color = "#eff1f5"
[light.scrollbar]
groove_width = 14.0
thumb_width = 8.0
overlay_mode = false
min_thumb_length = 30.0
thumb_hover_color = "#8c8fa1"
thumb_active_color = "#7c7f93"

[light.slider]
track_height = 4.0
thumb_diameter = 20.0
tick_mark_length = 4.0
thumb_hover_color = "#dce0e8"
disabled_fill_color = "#8caaee80"
disabled_track_color = "#bcc0cc"
disabled_thumb_color = "#e6e9ef"

[light.progress_bar]
track_height = 6.0
min_width = 100.0

[light.tab]
min_width = 64.0
min_height = 32.0
hover_background = "#dce0e8"
hover_text_color = "#4c4f69"
active_background = "#eff1f5"
active_text_color = "#8caaee"


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 4.0
[light.menu]
row_height = 28.0
icon_text_gap = 8.0
hover_background = "#8caaee"
hover_text_color = "#ffffff"
disabled_text_color = "#bcc0cc"


[light.menu.border]
padding_horizontal = 8.0
padding_vertical = 4.0
[light.list]
alternate_row_background = "#e6e9ef"
row_height = 28.0
hover_background = "#dce0e8"
hover_text_color = "#4c4f69"
disabled_text_color = "#bcc0cc"


[light.list.border]
padding_horizontal = 8.0
padding_vertical = 2.0
[light.toolbar]
bar_height = 40.0
item_gap = 6.0

[light.sidebar]
background_color = "#e6e9ef"
hover_background = "#dce0e8"


[light.sidebar.font]
color = "#4c4f69"
[light.popover]
background_color = "#e6e9ef"


[light.popover.font]
color = "#4c4f69"
[light.separator]
line_color = "#bcc0cc"

[light.splitter]
divider_width = 4.0
hover_color = "#8caaee"

[light.switch]
unchecked_background = "#bcc0cc"
hover_checked_background = "#7a9be6"
hover_unchecked_background = "#acb0be"
disabled_checked_background = "#8caaee80"
disabled_unchecked_background = "#bcc0cc80"
disabled_thumb_color = "#e6e9ef"
thumb_background = "#eff1f5"
track_width = 40.0
track_height = 20.0
thumb_diameter = 16.0
track_radius = 10.0

[light.dialog]
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 8.0
icon_size_px =32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#8caaee18"
hover_text_color = "#8caaee"
active_text_color = "#7a9be6"
disabled_text_color = "#bcc0cc"

[light.spinner]
diameter = 24.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 32.0
min_width = 120.0
arrow_icon_size_px =12.0
arrow_area_width = 28.0
hover_background = "#dce0e8"
disabled_background = "#e6e9ef80"
disabled_text_color = "#bcc0cc"


[light.combo_box.border]
padding_horizontal = 12.0
[light.segmented_control]
segment_height = 28.0
separator_width = 1.0
hover_background = "#dce0e8"
active_background = "#8caaee"
active_text_color = "#ffffff"


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]

[light.expander]
header_height = 40.0
arrow_icon_size_px =12.0
hover_background = "#dce0e8"
arrow_color = "#6c6f85"

[light.window]
inactive_title_bar_background = "#e6e9ef"
inactive_title_bar_text_color = "#4c4f69"

