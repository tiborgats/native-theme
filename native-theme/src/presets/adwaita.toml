# GNOME Adwaita theme - sourced from libadwaita CSS variables
# Alpha/opacity colors pre-computed to solid hex values
name = "Adwaita"

# === Light variant ===

[light]
icon_set = "freedesktop"

[light.defaults]
accent = "#3584e4"
background = "#fafafb"
foreground = "#2e3436"
surface = "#ffffff"
border = "#d5d5d5"
muted = "#929292"
shadow = "#00000018"

danger = "#e01b24"
danger_foreground = "#ffffff"
warning = "#e5a50a"
warning_foreground = "#2e3436"
success = "#2ec27e"
success_foreground = "#ffffff"
info = "#3584e4"
info_foreground = "#ffffff"

selection = "#3584e4"
selection_foreground = "#ffffff"
link = "#1b6acb"
focus_ring_color = "#3584e4"
disabled_foreground = "#cccccc"

radius = 12.0
radius_lg = 14.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
shadow_enabled = true

[light.defaults.font]
family = "Adwaita Sans"
size = 11.0

[light.defaults.mono_font]
family = "Adwaita Mono"
size = 11.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.button]
background = "#e8e8e8"
foreground = "#2e3436"
min_height = 34.0
padding_horizontal = 12.0
padding_vertical = 8.0

[light.input]
background = "#ffffff"
foreground = "#2e3436"
min_height = 34.0
padding_horizontal = 12.0

[light.checkbox]
indicator_size = 20.0
spacing = 8.0

[light.tooltip]
background = "#2e3436"
foreground = "#ffffff"
padding_horizontal = 6.0
padding_vertical = 6.0

[light.scrollbar]
width = 12.0
slider_width = 8.0

[light.slider]
track_height = 6.0
thumb_size = 20.0

[light.progress_bar]
height = 6.0

[light.tab]
min_height = 34.0
padding_horizontal = 12.0

[light.menu]
item_height = 34.0
padding_horizontal = 8.0
padding_vertical = 4.0

[light.list]
alternate_row = "#f5f5f5"
item_height = 34.0
padding_horizontal = 12.0
padding_vertical = 8.0

[light.toolbar]
height = 46.0
item_spacing = 6.0

[light.sidebar]
background = "#ebebed"
foreground = "#2e3436"

[light.popover]
background = "#ffffff"
foreground = "#2e3436"

[light.separator]
color = "#d5d5d5"

[light.splitter]
width = 6.0

