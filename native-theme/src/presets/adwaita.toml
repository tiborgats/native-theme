# GNOME Adwaita theme - sourced from libadwaita CSS variables
# Alpha/opacity colors pre-computed to solid hex values
name = "Adwaita"

# === Light variant ===

[light]
icon_set = "freedesktop"
icon_theme = "Adwaita"

[light.defaults]
accent_color = "#3584e4"
background_color = "#fafafb"
text_color = "#2e3436"
surface_color = "#ffffff"
muted_color = "#929292"
shadow_color = "#00000018"

danger_color = "#e01b24"
danger_text_color = "#ffffff"
warning_color = "#e5a50a"
warning_text_color = "#2e3436"
success_color = "#2ec27e"
success_text_color = "#ffffff"
info_color = "#3584e4"
info_text_color = "#ffffff"

selection_background = "#3584e4"
selection_text_color = "#ffffff"
link_color = "#1b6acb"
focus_ring_color = "#3584e4"
disabled_text_color = "#cccccc"
accent_text_color = "#ffffff"

disabled_opacity = 0.5
line_height = 1.21
focus_ring_width = 2.0
focus_ring_offset = -2.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#d5d5d5"
corner_radius = 9.0
corner_radius_lg = 15.0
line_width = 1.0
opacity = 0.15
shadow_enabled = true
[light.defaults.font]
family = "Adwaita Sans"
size_pt =11.0
weight = 400

[light.defaults.mono_font]
family = "Adwaita Mono"
size_pt =11.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 16.0
small = 16.0
large = 32.0
dialog = 22.0
panel = 20.0

[light.text_scale.caption]
size_pt =9.0

[light.text_scale.section_heading]
weight = 700

[light.text_scale.dialog_title]
size_pt =15.0
weight = 800

[light.text_scale.display]
size_pt =20.0
weight = 800

[light.window]
inactive_title_bar_background = "#ffffff"
inactive_title_bar_text_color = "#2e3436"

[light.window.title_bar_font]
color = "#2e3436"
weight = 700

[light.button]
background_color = "#e8e8e8"
min_width = 64.0
min_height = 34.0
icon_text_gap = 8.0
hover_background = "#d5d5d5"
hover_text_color = "#2e3436"
active_background = "#c8c8c8"
active_text_color = "#2e3436"
disabled_background = "#e8e8e880"
disabled_text_color = "#cccccc"


[light.button.border]
padding_horizontal = 10.0
padding_vertical = 5.0

[light.button.font]
color = "#2e3436"
[light.input]
background_color = "#ffffff"
placeholder_color = "#929595"
min_height = 34.0
caret_color = "#3584e4"
hover_border_color = "#3584e4"
focus_border_color = "#3584e4"
disabled_background = "#fafafb"
disabled_text_color = "#cccccc"


[light.input.border]
padding_horizontal = 9.0
padding_vertical = 0.0

[light.input.font]
color = "#2e3436"
[light.checkbox]
indicator_width = 20.0
label_gap = 8.0
hover_background = "#d5d5d5"
disabled_background = "#e8e8e880"
disabled_text_color = "#cccccc"
unchecked_background = "#ffffff"
unchecked_border_color = "#d5d5d5"

[light.tooltip]
background_color = "#2e3436"
max_width = 360.0


[light.tooltip.border]
padding_horizontal = 10.0
padding_vertical = 6.0

[light.tooltip.font]
color = "#ffffff"
[light.scrollbar]
groove_width = 12.0
thumb_width = 8.0
overlay_mode = false
min_thumb_length = 40.0
thumb_hover_color = "#6e6e6e"
thumb_active_color = "#4e4e4e"

[light.slider]
track_height = 10.0
thumb_diameter = 20.0
tick_mark_length = 4.0
thumb_hover_color = "#ebebeb"
disabled_fill_color = "#cccccc"
disabled_track_color = "#e0e0e0"
disabled_thumb_color = "#e0e0e0"

[light.progress_bar]
track_height = 8.0
min_width = 80.0

[light.tab]
min_width = 64.0
min_height = 30.0
active_background = "#fafafb"
active_text_color = "#2e3436"
hover_background = "#e8e8e8"
hover_text_color = "#2e3436"


[light.tab.border]
padding_horizontal = 12.0
padding_vertical = 3.0
[light.menu]
row_height = 32.0
icon_text_gap = 8.0
hover_background = "#e8e8e8"
hover_text_color = "#2e3436"
disabled_text_color = "#cccccc"


[light.menu.border]
padding_horizontal = 12.0
padding_vertical = 0.0
[light.list]
alternate_row_background = "#f5f5f5"
row_height = 34.0
hover_background = "#ebebed"
hover_text_color = "#2e3436"
disabled_text_color = "#cccccc"


[light.list.border]
padding_horizontal = 12.0
padding_vertical = 8.0
[light.toolbar]
bar_height = 47.0
item_gap = 6.0

[light.sidebar]
background_color = "#ebebed"
hover_background = "#e0e0e2"


[light.sidebar.font]
color = "#2e3436"
[light.popover]
background_color = "#ffffff"


[light.popover.font]
color = "#2e3436"
[light.separator]
line_color = "#d5d5d5"

[light.splitter]
divider_width = 1.0
hover_color = "#d5d5d5"

[light.switch]
unchecked_background = "#d5d5d5"
thumb_background = "#ffffff"
track_width = 46.0
track_height = 26.0
thumb_diameter = 20.0
track_radius = 14.0
hover_checked_background = "#2e78cc"
hover_unchecked_background = "#c8c8c8"
disabled_checked_background = "#3584e480"
disabled_unchecked_background = "#d5d5d580"
disabled_thumb_color = "#ffffff80"

[light.dialog]
button_order = "primary_right"
min_width = 300.0
max_width = 372.0
min_height = 140.0
max_height = 600.0
button_gap = 12.0
icon_size_pt =32.0


[light.dialog.border]
corner_radius = 18.0
[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#3584e418"
hover_text_color = "#1b6acb"
active_text_color = "#1b6acb"
disabled_text_color = "#cccccc"

[light.spinner]
diameter = 16.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 34.0
min_width = 120.0
arrow_icon_size_pt =16.0
arrow_area_width = 28.0
hover_background = "#d5d5d5"
disabled_background = "#e8e8e880"
disabled_text_color = "#cccccc"


[light.combo_box.border]
padding_horizontal = 10.0
[light.segmented_control]
segment_height = 28.0
separator_width = 1.0
active_background = "#3584e4"
active_text_color = "#ffffff"
hover_background = "#d5d5d5"


[light.segmented_control.border]
padding_horizontal = 12.0
[light.card]


[light.card.border]
corner_radius = 12.0
[light.expander]
header_height = 50.0
arrow_icon_size_pt =16.0
hover_background = "#ebebed"
arrow_color = "#2e3436"

