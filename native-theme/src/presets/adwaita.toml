# GNOME Adwaita theme - sourced from libadwaita CSS variables
# Alpha/opacity colors pre-computed to solid hex values
name = "Adwaita"

# === Light variant ===

[light]
icon_theme = "freedesktop"

[light.colors]
accent = "#3584e4"
background = "#fafafb"
foreground = "#2e3436"
surface = "#ffffff"
border = "#d5d5d5"
muted = "#929292"
shadow = "#00000018"

primary_background = "#3584e4"
primary_foreground = "#ffffff"

secondary_background = "#e0e0e0"
secondary_foreground = "#2e3436"

danger = "#e01b24"
danger_foreground = "#ffffff"
warning = "#e5a50a"
warning_foreground = "#2e3436"
success = "#2ec27e"
success_foreground = "#ffffff"
info = "#3584e4"
info_foreground = "#ffffff"

selection = "#3584e4"
selection_foreground = "#ffffff"
link = "#1b6acb"
focus_ring = "#3584e4"

sidebar = "#ebebed"
sidebar_foreground = "#2e3436"
tooltip = "#2e3436"
tooltip_foreground = "#ffffff"
popover = "#ffffff"
popover_foreground = "#2e3436"

button = "#e8e8e8"
button_foreground = "#2e3436"
input = "#ffffff"
input_foreground = "#2e3436"
disabled = "#cccccc"
separator = "#d5d5d5"
alternate_row = "#f5f5f5"

[light.fonts]
family = "Adwaita Sans"
size = 11.0
mono_family = "Adwaita Mono"
mono_size = 11.0

[light.geometry]
radius = 12.0
radius_lg = 14.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.15
scroll_width = 8.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 12.0
l = 18.0
xl = 24.0
xxl = 36.0

[light.widget_metrics.button]
min_height = 34.0
padding_horizontal = 12.0
padding_vertical = 8.0

[light.widget_metrics.checkbox]
indicator_size = 20.0
spacing = 8.0

[light.widget_metrics.input]
min_height = 34.0
padding_horizontal = 12.0

[light.widget_metrics.scrollbar]
width = 12.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 6.0
thumb_size = 20.0

[light.widget_metrics.progress_bar]
height = 6.0

[light.widget_metrics.tab]
min_height = 34.0
padding_horizontal = 12.0

[light.widget_metrics.menu_item]
height = 34.0
padding_horizontal = 8.0
padding_vertical = 4.0

[light.widget_metrics.tooltip]
padding = 6.0

[light.widget_metrics.list_item]
padding_horizontal = 12.0
padding_vertical = 8.0

[light.widget_metrics.toolbar]
height = 46.0
item_spacing = 6.0

[light.widget_metrics.splitter]
width = 6.0

