# KDE Breeze theme - sourced from KDE/breeze repository
# BreezeLight.colors and BreezeDark.colors
name = "KDE Breeze"

# === Light variant (BreezeLight.colors) ===

[light]
icon_set = "freedesktop"

[light.defaults]
accent = "#3daee9"
background = "#eff0f1"
foreground = "#232629"
surface = "#ffffff"
border = "#bcc0bf"
muted = "#707d8a"
shadow = "#00000040"

danger = "#da4453"
danger_foreground = "#fcfcfc"
warning = "#f67400"
warning_foreground = "#232629"
success = "#27ae60"
success_foreground = "#fcfcfc"
info = "#3daee9"
info_foreground = "#fcfcfc"

selection = "#3daee9"
selection_foreground = "#fcfcfc"
link = "#2980b9"
focus_ring_color = "#3daee9"
disabled_foreground = "#bcc0bf"

radius = 4.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.2
shadow_enabled = true

[light.defaults.font]
family = "Noto Sans"
size = 10.0

[light.defaults.mono_font]
family = "Hack"
size = 10.0

[light.defaults.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 8.0
l = 12.0
xl = 16.0
xxl = 24.0

[light.button]
background = "#fcfcfc"
foreground = "#232629"
min_width = 80.0
padding_horizontal = 6.0
icon_spacing = 4.0

[light.input]
background = "#ffffff"
foreground = "#232629"
padding_horizontal = 6.0

[light.checkbox]
indicator_size = 20.0
spacing = 4.0

[light.tooltip]
background = "#f7f7f7"
foreground = "#232629"
padding_horizontal = 3.0
padding_vertical = 3.0

[light.scrollbar]
width = 21.0
min_thumb_height = 20.0
slider_width = 8.0

[light.slider]
track_height = 6.0
thumb_size = 20.0
tick_length = 8.0

[light.progress_bar]
height = 6.0
min_width = 14.0

[light.tab]
min_width = 80.0
min_height = 30.0
padding_horizontal = 8.0
padding_vertical = 4.0

[light.menu]
item_height = 28.0
padding_horizontal = 4.0
padding_vertical = 4.0
icon_spacing = 8.0

[light.list]
alternate_row = "#f5f6f7"
item_height = 28.0
padding_horizontal = 2.0
padding_vertical = 1.0

[light.toolbar]
height = 40.0
item_spacing = 0.0
padding = 6.0

[light.sidebar]
background = "#dee0e2"
foreground = "#232629"

[light.popover]
background = "#ffffff"
foreground = "#232629"

[light.separator]
color = "#c4c8c6"

[light.splitter]
width = 1.0

