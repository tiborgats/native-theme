# KDE Breeze theme - sourced from KDE/breeze repository
# BreezeLight.colors and BreezeDark.colors
name = "KDE Breeze"

# === Light variant (BreezeLight.colors) ===

[light]
icon_set = "freedesktop"
icon_theme = "breeze"

[light.defaults]
accent_color = "#3daee9"
background_color = "#eff0f1"
text_color = "#232629"
surface_color = "#ffffff"
muted_color = "#707d8a"
shadow_color = "#00000040"

danger_color = "#da4453"
danger_text_color = "#fcfcfc"
warning_color = "#f67400"
warning_text_color = "#232629"
success_color = "#27ae60"
success_text_color = "#fcfcfc"
info_color = "#3daee9"
info_text_color = "#fcfcfc"

selection_background = "#3daee9"
selection_text_color = "#fcfcfc"
link_color = "#2980b9"
focus_ring_color = "#3daee9"
disabled_text_color = "#bcc0bf"
accent_text_color = "#fcfcfc"

disabled_opacity = 0.5
line_height = 1.36
focus_ring_width = 1.0
focus_ring_offset = 2.0
text_scaling_factor = 1.0
reduce_motion = false
high_contrast = false
reduce_transparency = false


[light.defaults.border]
color = "#bcc0bf"
corner_radius = 5.0
corner_radius_lg = 8.0
line_width = 1.0
opacity = 0.2
shadow_enabled = true
[light.defaults.font]
family = "Noto Sans"
size = 10.0
weight = 400

[light.defaults.mono_font]
family = "Hack"
size = 10.0
weight = 400

[light.defaults.icon_sizes]
toolbar = 22.0
small = 16.0
large = 48.0
dialog = 32.0
panel = 48.0

[light.text_scale.caption]
size = 8.2
weight = 400
line_height = 11.2

[light.text_scale.section_heading]
size = 12.0
weight = 700
line_height = 16.3

[light.text_scale.dialog_title]
size = 13.5
weight = 700
line_height = 18.4

[light.text_scale.display]
size = 20.0
weight = 700
line_height = 27.2

[light.window]
inactive_title_bar_background = "#eff0f1"
inactive_title_bar_text_color = "#232629"

[light.button]
background_color = "#fcfcfc"
min_width = 80.0
min_height = 32.0
icon_text_gap = 4.0
hover_background = "#93cee9"
hover_text_color = "#232629"
active_background = "#3daee9"
active_text_color = "#fcfcfc"
disabled_background = "#f0f0f0"
disabled_text_color = "#bcc0bf"


[light.button.border]
padding_horizontal = 6.0
padding_vertical = 5.0

[light.button.font]
color = "#232629"
[light.input]
background_color = "#ffffff"
min_height = 32.0
hover_border_color = "#3daee9"
focus_border_color = "#3daee9"
disabled_background = "#f0f0f0"
disabled_text_color = "#bcc0bf"


[light.input.border]
padding_horizontal = 6.0
padding_vertical = 3.0

[light.input.font]
color = "#232629"
[light.checkbox]
indicator_width = 20.0
label_gap = 4.0
hover_background = "#93cee9"
disabled_background = "#f0f0f0"
disabled_text_color = "#bcc0bf"
unchecked_background = "#fcfcfc"
unchecked_border_color = "#bcc0bf"

[light.tooltip]
background_color = "#f7f7f7"
max_width = 300.0


[light.tooltip.border]
padding_horizontal = 3.0
padding_vertical = 3.0

[light.tooltip.font]
color = "#232629"
[light.scrollbar]
groove_width = 21.0
min_thumb_length = 20.0
thumb_width = 8.0
overlay_mode = false
thumb_hover_color = "#93cee9"
thumb_active_color = "#3daee9"

[light.slider]
track_height = 6.0
thumb_diameter = 20.0
tick_mark_length = 8.0
thumb_hover_color = "#93cee9"
disabled_fill_color = "#bcc0bf"
disabled_track_color = "#dee0e2"
disabled_thumb_color = "#dee0e2"

[light.progress_bar]
track_height = 6.0
min_width = 6.0

[light.tab]
min_width = 80.0
min_height = 30.0
active_background = "#eff0f1"
active_text_color = "#232629"
hover_background = "#dee0e2"
hover_text_color = "#232629"


[light.tab.border]
padding_horizontal = 8.0
padding_vertical = 4.0
[light.menu]
row_height = 28.0
icon_text_gap = 8.0
hover_background = "#3daee9"
hover_text_color = "#fcfcfc"
disabled_text_color = "#bcc0bf"


[light.menu.border]
padding_horizontal = 4.0
padding_vertical = 4.0
[light.list]
alternate_row_background = "#f5f6f7"
row_height = 28.0
hover_background = "#93cee9"
hover_text_color = "#232629"
disabled_text_color = "#bcc0bf"


[light.list.border]
padding_horizontal = 2.0
padding_vertical = 1.0
[light.toolbar]
bar_height = 40.0
item_gap = 0.0

[light.sidebar]
background_color = "#dee0e2"
hover_background = "#93cee9"


[light.sidebar.font]
color = "#232629"
[light.popover]
background_color = "#ffffff"


[light.popover.font]
color = "#232629"
[light.separator]
line_color = "#c4c8c6"

[light.splitter]
divider_width = 1.0
hover_color = "#bcc0bf"

[light.switch]
unchecked_background = "#bcc0bf"
thumb_background = "#fcfcfc"
track_width = 36.0
track_height = 18.0
thumb_diameter = 18.0
track_radius = 9.0
hover_checked_background = "#2e9ad6"
hover_unchecked_background = "#a8acab"
disabled_checked_background = "#3daee980"
disabled_unchecked_background = "#bcc0bf80"
disabled_thumb_color = "#fcfcfc80"

[light.dialog]
button_order = "primary_left"
min_width = 320.0
max_width = 560.0
min_height = 140.0
max_height = 600.0
button_gap = 6.0
icon_size = 32.0

[light.link]
underline_enabled = true
background_color = "#00000000"
hover_background = "#3daee918"
hover_text_color = "#2980b9"
active_text_color = "#2980b9"
disabled_text_color = "#bcc0bf"

[light.spinner]
diameter = 36.0
min_diameter = 16.0
stroke_width = 2.0

[light.combo_box]
min_height = 32.0
min_width = 120.0
arrow_icon_size = 20.0
arrow_area_width = 20.0
hover_background = "#93cee9"
disabled_background = "#f0f0f0"
disabled_text_color = "#bcc0bf"


[light.combo_box.border]
padding_horizontal = 6.0
[light.segmented_control]
segment_height = 30.0
separator_width = 1.0
active_background = "#3daee9"
active_text_color = "#fcfcfc"
hover_background = "#dee0e2"


[light.segmented_control.border]
padding_horizontal = 8.0
[light.card]

[light.expander]
header_height = 40.0
arrow_icon_size = 10.0
hover_background = "#dee0e2"
arrow_color = "#232629"

