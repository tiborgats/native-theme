# KDE Breeze theme - sourced from KDE/breeze repository
# BreezeLight.colors and BreezeDark.colors
name = "KDE Breeze"

# === Light variant (BreezeLight.colors) ===

[light]
icon_theme = "freedesktop"

[light.colors]
accent = "#3daee9"
background = "#eff0f1"
foreground = "#232629"
surface = "#ffffff"
border = "#bcc0bf"
muted = "#707d8a"
shadow = "#00000040"

primary_background = "#3daee9"
primary_foreground = "#fcfcfc"

secondary_background = "#bcc0bf"
secondary_foreground = "#232629"

danger = "#da4453"
danger_foreground = "#fcfcfc"
warning = "#f67400"
warning_foreground = "#232629"
success = "#27ae60"
success_foreground = "#fcfcfc"
info = "#3daee9"
info_foreground = "#fcfcfc"

selection = "#3daee9"
selection_foreground = "#fcfcfc"
link = "#2980b9"
focus_ring = "#3daee9"

sidebar = "#dee0e2"
sidebar_foreground = "#232629"
tooltip = "#f7f7f7"
tooltip_foreground = "#232629"
popover = "#ffffff"
popover_foreground = "#232629"

button = "#fcfcfc"
button_foreground = "#232629"
input = "#ffffff"
input_foreground = "#232629"
disabled = "#bcc0bf"
separator = "#c4c8c6"
alternate_row = "#f5f6f7"

[light.fonts]
family = "Noto Sans"
size = 10.0
mono_family = "Hack"
mono_size = 10.0

[light.geometry]
radius = 4.0
radius_lg = 8.0
frame_width = 1.0
disabled_opacity = 0.5
border_opacity = 0.2
scroll_width = 10.0
shadow = true

[light.spacing]
xxs = 2.0
xs = 4.0
s = 6.0
m = 8.0
l = 12.0
xl = 16.0
xxl = 24.0

[light.widget_metrics.button]
min_width = 80.0
padding_horizontal = 6.0
icon_spacing = 4.0

[light.widget_metrics.checkbox]
indicator_size = 20.0
spacing = 4.0

[light.widget_metrics.input]
padding_horizontal = 6.0

[light.widget_metrics.scrollbar]
width = 21.0
min_thumb_height = 20.0
slider_width = 8.0

[light.widget_metrics.slider]
track_height = 6.0
thumb_size = 20.0
tick_length = 8.0

[light.widget_metrics.progress_bar]
height = 6.0
min_width = 14.0

[light.widget_metrics.tab]
min_width = 80.0
min_height = 30.0
padding_horizontal = 8.0
padding_vertical = 4.0

[light.widget_metrics.menu_item]
padding_horizontal = 4.0
padding_vertical = 4.0
icon_spacing = 8.0

[light.widget_metrics.tooltip]
padding = 3.0

[light.widget_metrics.list_item]
padding_horizontal = 2.0
padding_vertical = 1.0

[light.widget_metrics.toolbar]
item_spacing = 0.0
padding = 6.0

[light.widget_metrics.splitter]
width = 1.0

