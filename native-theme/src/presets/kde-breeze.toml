danger = "#da4453"
danger_foreground = "#fcfcfc"
warning = "#f67400"
warning_foreground = "#fcfcfc"
success = "#27ae60"
success_foreground = "#fcfcfc"
info = "#3daee9"
info_foreground = "#fcfcfc"

selection = "#3daee9"
selection_foreground = "#fcfcfc"
link = "#1d99f3"
focus_ring = "#3daee9"

sidebar = "#272c31"
sidebar_foreground = "#fcfcfc"
tooltip = "#31363b"
tooltip_foreground = "#fcfcfc"
popover = "#31363b"
popover_foreground = "#fcfcfc"

button = "#31363b"
button_foreground = "#fcfcfc"
input = "#1b1e20"
input_foreground = "#fcfcfc"
disabled = "#4d545b"
separator = "#3e4550"
alternate_row = "#2a2e32"

[dark.fonts]
